<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Prospect - Soulwinning Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .dark .guide-card {
            background-color: #111827 !important;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }
        input, textarea {
            background: rgba(99, 102, 241, 0.05) !important;
            border: 1px solid rgba(99, 102, 241, 0.1) !important;
            outline: none !important;
        }
        input:focus, textarea:focus {
            border-color: #6366f1 !important;
            ring: 1px solid #6366f1 !important;
        }

              
        button, 
        .preset-btn, 
        .type-btn,
        [role="button"] {
            transition: all 0.2s ease-in-out !important;
        }
        
        button:active, 
        .preset-btn:active, 
        .type-btn:active,
        [role="button"]:active {
            transform: scale(0.95) !important;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.7) !important;
            outline: none !important;
        }
        
    
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-[50]">
        <div class="flex items-center gap-2">
            <button onclick="window.history.back()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 active:scale-90 transition-all mr-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-600 dark:text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 19l-7-7 7-7" /></svg>
            </button>

            <div class="w-10 h-8 bg-indigo-600 rounded-lg flex items-center justify-center overflow-hidden shrink-0">
                <span class="font-bold text-white text-[10px] leading-none text-center">SWT</span>
            </div>

            <h1 class="text-lg font-black tracking-tight hidden sm:block leading-none">
                <span class="text-slate-800 dark:text-white">Soulwinning</span><span class="text-indigo-600">Tracker</span>
            </h1>
        </div>
        
        <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 transition-all">
            <svg id="sun-icon" class="w-5 h-5 hidden text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
            <svg id="moon-icon" class="w-5 h-5 text-slate-600 dark:text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
        </button>
    </nav>

    <main class="flex-1 flex items-start justify-center p-6 py-8 relative z-10 overflow-y-auto">
        <div id="prospect-card" class="guide-card w-full max-w-xl bg-white dark:bg-[#111827] rounded-[2rem] p-6 shadow-2xl flex flex-col items-center gap-5 ring-1 ring-black/5 dark:ring-white/5">
            
            <div class="flex flex-col items-center gap-3">
                <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/20 shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" /></svg>
                </div>
                <h2 class="text-xl font-black uppercase tracking-widest text-slate-800 dark:text-white">Prospect Details</h2>
            </div>

            <form id="prospect-form" class="w-full flex flex-col gap-4">
                <div>
                    <label class="text-[10px] font-black text-indigo-500 uppercase tracking-widest ml-1 mb-1 block">Full Name</label>
                    <input type="text" id="p-name" required placeholder="Enter name..." class="w-full p-4 rounded-2xl dark:text-white">
                </div>

                <div>
                    <label class="text-[10px] font-black text-indigo-500 uppercase tracking-widest ml-1 mb-1 block">Contact Number</label>
                    <input type="tel" id="p-phone" required placeholder="Enter contact number..." class="w-full p-4 rounded-2xl dark:text-white">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[8px] font-black text-indigo-500 uppercase tracking-widest ml-1 mb-1 block">SW Date</label>
                        <input type="date" id="p-date" required class="w-full p-4 rounded-2xl dark:text-white">
                    </div>
                    <div>
                        <label class="text-[8px] font-black text-indigo-500 uppercase tracking-widest ml-1 mb-1 block">SW Location</label>
                        <input type="text" id="p-location" required placeholder="Village/City" class="w-full p-4 rounded-2xl dark:text-white">
                    </div>
                </div>

                <div class="p-4 bg-indigo-50/50 dark:bg-indigo-900/10 border border-indigo-100 dark:border-indigo-900/20 rounded-xl flex items-center gap-3">
                    <div class="p-2 bg-indigo-600 rounded-lg shrink-0 shadow-lg shadow-indigo-500/20">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 16v-4m0-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-[8px] font-black text-indigo-600 dark:text-indigo-400 uppercase tracking-widest mb-0.5">Auto-Fill Active</p>
                        <p id="user-display" class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wide leading-tight">Identifying Soulwinner...</p>
                    </div>
                </div>

                <button type="submit" id="submit-btn" 
                    class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest transition-all 
                    hover:bg-indigo-700 hover:shadow-[0_6px_20px_rgba(99,102,241,0.3)] active:scale-95 shadow-lg shadow-indigo-500/20 flex items-center justify-center gap-2 mt-2">
                    <span>Save Prospect</span>                    
                </button>
            </form>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-500 z-[150] pointer-events-none text-sm font-bold border border-white/10"></div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const PSK = "sweeterthanhoney1611";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw5n8q3W6JDSoAXQ6x_Z7ePQjJMkOP3QYZW-O7fCnkxexlAcCDfuiwBCjII4rng-q6CNA/exec";
        
        let globalDisplayName = "Unknown User";
        let globalChurchName = "No Church"; 

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                t.classList.remove('opacity-100', 'translate-y-0');
                t.classList.add('opacity-0', 'translate-y-10');
            }, 3000);
        };

        window.toggleDarkMode = () => {
            const isDark = document.getElementById('main-html').classList.toggle('dark');
            document.getElementById('sun-icon').classList.toggle('hidden', !isDark);
            document.getElementById('moon-icon').classList.toggle('hidden', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };
        if(localStorage.getItem('theme') === 'dark') toggleDarkMode();

        onAuthStateChanged(auth, (user) => {
            if (!user) return window.location.replace("index.html");

            const cachedData = sessionStorage.getItem('userContext');
            if (cachedData) {
                const profile = JSON.parse(cachedData);
                globalDisplayName = profile.displayName || user.displayName || user.email;
                
                // Extraction of Church Name for Column G
                if (profile.churchNames) {
                    globalChurchName = Object.values(profile.churchNames)[0] || "General";
                }
            } else {
                globalDisplayName = user.displayName || user.email || "Soulwinner";
            }

            document.getElementById('user-display').innerText = `Logged in as: ${globalDisplayName}`;
            document.getElementById('p-date').valueAsDate = new Date(); 
        });

        document.getElementById('prospect-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerText = "Processing...";

            const payload = {
                psk: PSK,
                name: document.getElementById('p-name').value,
                contact: document.getElementById('p-phone').value,
                swDate: document.getElementById('p-date').value,
                swLocation: document.getElementById('p-location').value,
                soulwinner: globalDisplayName,
                church: globalChurchName 
            };

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });
                
                showToast(`Success! Recorded for ${globalChurchName} ✓`);
                
                document.getElementById('prospect-form').reset();
                setTimeout(() => {
                    window.history.back();
                }, 1500);

            } catch (err) {
                showToast("Submission failed. Check connection.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
