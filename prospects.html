<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Follow-ups - Soulwinning Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        input, textarea {
            background: rgba(99, 102, 241, 0.05) !important;
            border: 1px solid rgba(99, 102, 241, 0.1) !important;
            outline: none !important;
        }
        input:focus, textarea:focus {
            border-color: #6366f1 !important;
            ring: 1px solid #6366f1 !important;
        }
        button, .preset-btn, .type-btn, [role="button"] { transition: all 0.2s ease-in-out !important; }
        button:active, .preset-btn:active, .type-btn:active, [role="button"]:active {
            transform: scale(0.95) !important;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.7) !important;
            outline: none !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 transition-colors duration-300">

    <nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-[100] w-full">
        <div class="flex items-center gap-2">
            <button onclick="window.history.back()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all mr-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-600 dark:text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 19l-7-7 7-7" /></svg>
            </button>
            <div class="w-10 h-8 bg-indigo-600 rounded-lg flex items-center justify-center overflow-hidden">
                <span class="font-bold text-white text-[10px] leading-none text-center">SWT</span>
            </div>
            <h1 class="text-lg brand-text"><span class="brand-word-1">Soulwinning</span><span class="brand-word-2">Tracker</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all">
                <svg id="sun-icon" class="w-5 h-5 hidden text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
                <svg id="moon-icon" class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
            </button>
        </div>
    </nav>

    <main class="flex-1 flex flex-col items-center p-6 py-8 relative z-10 overflow-y-auto">
        <div class="w-full max-w-xl flex flex-col items-center gap-8">
            
            <div class="flex flex-col items-center gap-3">
                <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/20 shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" /></svg>
                </div>
                <h2 class="text-xl font-black uppercase tracking-widest text-slate-800 dark:text-white">Follow-up Details</h2>
            </div>

            <form id="prospect-form" class="w-full flex flex-col gap-6">
                <div>
                    <label class="text-[10px] font-black text-indigo-500 uppercase tracking-widest ml-1 mb-1 block">Full Name</label>
                    <input type="text" id="p-name" required placeholder="Enter name..." class="w-full p-3 rounded-xl dark:text-white">
                </div>
                <div>
                    <label class="text-[10px] font-black text-indigo-500 uppercase tracking-widest ml-1 mb-1 block">Contact Number</label>
                    <input type="tel" id="p-phone" required placeholder="Enter contact number..." class="w-full p-3 rounded-xl dark:text-white">
                </div>
                <div>
                    <label class="text-[10px] font-black text-indigo-500 uppercase tracking-widest ml-1 mb-1 block">SW Date</label>
                    <input type="date" id="p-date" required class="w-full p-3 rounded-xl dark:text-white text-center">
                </div>
                <div>
                    <label class="text-[10px] font-black text-indigo-500 uppercase tracking-widest ml-1 mb-1 block">SW Location</label>
                    <input type="text" id="p-location" required placeholder="Village/City" class="w-full p-3 rounded-xl dark:text-white">
                </div>

                <div class="p-4 bg-indigo-50/50 dark:bg-indigo-900/10 border border-indigo-100 dark:border-indigo-900/20 rounded-xl flex items-center gap-3">
                    <div class="p-2 bg-indigo-600 rounded-lg shrink-0 shadow-lg shadow-indigo-500/20">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M12 16v-4m0-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    </div>
                    <div>
                        <p class="text-[8px] font-black text-indigo-600 dark:text-indigo-400 uppercase tracking-widest mb-0.5">Auto-Fill Active</p>
                        <p id="user-display" class="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wide leading-tight">Identifying Soulwinner...</p>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest transition-all hover:bg-indigo-700 hover:shadow-[0_6px_20px_rgba(99,102,241,0.3)] active:scale-95 shadow-lg shadow-indigo-500/20 flex items-center justify-center gap-2 mt-2">
                    <span>Save Follow-up</span>                    
                </button>
            </form>

            <div class="w-full mt-10">
                <button onclick="toggleFollowUpList()" class="w-full py-4 flex items-center justify-between border-b dark:border-slate-800 group">
                    <label class="text-[13px] font-black text-slate-400 dark:text-slate-200 uppercase tracking-[0.4em] leading-none cursor-pointer group-hover:text-indigo-500 transition-colors text-center">
                        My Follow-up List
                    </label>
                    <i id="list-chevron" class="bi bi-chevron-down text-slate-400 group-hover:text-indigo-500 transition-all duration-300"></i>
                </button>

                <div id="followup-container" class="hidden w-full pt-8">
                    <div id="followup-list" class="w-full space-y-6 pb-24">
                        <div class="flex flex-col items-center justify-center py-20 animate-pulse">
                            <i class="bi bi-arrow-repeat text-indigo-500 text-2xl mb-4 animate-spin"></i>
                            <p class="text-center text-slate-400 italic text-xs uppercase tracking-widest">Gathering follow-ups...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="delete-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6 hidden z-[200]">
        <div class="bg-white dark:bg-slate-900 w-full max-w-xs rounded-[2.5rem] p-8 border dark:border-slate-800 shadow-2xl text-center">
            <div class="w-12 h-12 bg-red-100 dark:bg-red-900/30 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="bi bi-exclamation-triangle-fill text-xl"></i>
            </div>
            <h3 class="text-xl font-bold dark:text-white mb-2">Remove Follow-up?</h3>
            <p class="text-[11px] text-slate-500 dark:text-slate-400 mb-8 leading-relaxed">This record will be permanently deleted from your follow-up sheet.</p>
            <div class="flex flex-col gap-2">
                <button id="final-confirm-btn" class="w-full py-4 bg-red-600 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest active:scale-95 transition-all">Confirm Delete</button>
                <button onclick="closeDeleteModal()" class="w-full py-4 text-slate-500 font-bold uppercase text-[10px] tracking-widest">Cancel</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-500 z-[150] pointer-events-none text-sm font-bold border border-white/10"></div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    
        let PSK = "";
        let SCRIPT_URL = "";
        let user = null;
        let userProfile = null;
        let pendingDeleteId = null;
    
        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            if (!t) return;
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                t.classList.remove('opacity-100', 'translate-y-0');
                t.classList.add('opacity-0', 'translate-y-10');
            }, 3000);
        };
    
        window.toggleDarkMode = () => {
            const isDark = document.getElementById('main-html').classList.toggle('dark');
            document.getElementById('sun-icon')?.classList.toggle('hidden', !isDark);
            document.getElementById('moon-icon')?.classList.toggle('hidden', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };
        if(localStorage.getItem('theme') === 'dark') toggleDarkMode();
    
        // SURGICAL FIX: Toggle Function for Accordion
        window.toggleFollowUpList = () => {
            const container = document.getElementById('followup-container');
            const chevron = document.getElementById('list-chevron');
            const isHidden = container.classList.contains('hidden');

            if (isHidden) {
                container.classList.remove('hidden');
                chevron.style.transform = 'rotate(180deg)';
                loadFollowUps(); // Load data only when opening
            } else {
                container.classList.add('hidden');
                chevron.style.transform = 'rotate(0deg)';
            }
        };

        onAuthStateChanged(auth, async (u) => {
            if (!u) return window.location.replace("index.html");
            if (!u.emailVerified) {
                const form = document.getElementById('prospect-form');
                if (form) form.innerHTML = `<div class="text-center opacity-40 py-20 uppercase font-black tracking-widest text-[10px]">Please verify your email.</div>`;
                return;
            }
            user = u;
            userProfile = JSON.parse(sessionStorage.getItem('userContext') || "{}");
    
            try {
                const configSnap = await getDoc(doc(db, "system", "gatekeeper"));
                if (configSnap.exists()) {
                    const config = configSnap.data();
                    SCRIPT_URL = config.prospectScriptUrl;
                    PSK = config.masterPsk;
                    // REMOVED: Immediate loadFollowUps() call to keep it hidden
                }
            } catch (e) { console.error("Gatekeeper error:", e); }
    
            const display = document.getElementById('user-display');
            if (display) display.innerText = `Logged in as: ${userProfile.displayName || user.email}`;
            const dateInput = document.getElementById('p-date');
            if (dateInput) dateInput.valueAsDate = new Date(); 
        });
    
        window.togglePrivacy = (rowId, fullNum) => {
            const numEl = document.getElementById(`num-${rowId}`);
            const eyeEl = document.getElementById(`eye-${rowId}`);
            if (!numEl || !eyeEl) return;
    
            const masked = fullNum.length > 6 
                ? `${fullNum.substring(0, 4)}****${fullNum.slice(-2)}` 
                : fullNum;
            
            if (numEl.innerText.includes("*")) {
                numEl.innerText = fullNum;
                eyeEl.classList.replace('bi-eye-slash', 'bi-eye');
                numEl.classList.add('text-indigo-500');
            } else {
                numEl.innerText = masked;
                eyeEl.classList.replace('bi-eye', 'bi-eye-slash');
                numEl.classList.remove('text-indigo-500');
            }
        };
    
        window.loadFollowUps = async () => {
            const list = document.getElementById('followup-list');
            if (!list || !SCRIPT_URL || !PSK || !user) return;
        
            try {
                const res = await fetch(`${SCRIPT_URL}?key=${PSK}`);
                const data = await res.json();
                const myData = data.filter(p => p["Soulwinner Name"] === user.uid);
                
                if (myData.length === 0) {
                    list.innerHTML = `<div class="text-center opacity-40 py-10 uppercase font-black tracking-widest text-[10px]">No Follow-ups Found</div>`;
                    return;
                }
        
                myData.sort((a, b) => new Date(b["SW Date"]) - new Date(a["SW Date"]));
        
                let html = "";
                myData.forEach((p, index) => {
                    const isAlt = index % 2 !== 0;
                    const themeBorder = isAlt ? 'border-sky-500/30' : 'border-cyan-400/30';
                    const themeBg = isAlt ? 'bg-sky-500' : 'bg-cyan-400';
                    const themeText = isAlt ? 'text-sky-400' : 'text-cyan-400';
                    
                    const rawDate = p["SW Date"] || "";
                    let formattedDate = "Recent";
                    if (rawDate) {
                        const d = new Date(rawDate);
                        formattedDate = !isNaN(d) ? d.toLocaleDateString(undefined, { 
                            month: 'short', day: 'numeric', year: 'numeric' 
                        }) : rawDate;
                    }
        
                    const rawNum = String(p["Contact Number"] || "");
                    const maskedNum = rawNum.length > 6 
                        ? `${rawNum.substring(0, 4)}****${rawNum.slice(-2)}` 
                        : rawNum;
        
                    html += `
                        <div class="bg-white dark:bg-[#111827] w-full rounded-2xl border-2 ${themeBorder} relative text-left transition-all duration-300 overflow-hidden shadow-xl dark:shadow-cyan-500/5">
                            <div class="p-6 pl-8 relative">
                                <div class="absolute left-0 top-4 bottom-4 w-1.5 rounded-r-full ${themeBg}"></div>
                                <div class="flex justify-between items-start">
                                    <div class="flex-1">
                                        <p class="text-[10px] font-black ${themeText} uppercase tracking-[0.2em] mb-3">
                                            <i class="bi bi-calendar3 mr-1"></i> ${formattedDate}
                                        </p>
                                        <h4 class="text-xl font-black dark:text-white uppercase tracking-tight leading-tight mb-2">${p["Prospect Name"]}</h4>
                                        <div class="flex items-center gap-3 mt-1 mb-3">
                                             <div class="flex items-center gap-2">
                                                <i class="bi bi-telephone-fill ${themeText} text-sm opacity-70"></i>
                                                <p id="num-${p.rowId}" class="text-lg font-mono text-slate-500 dark:text-slate-300 font-bold tracking-tight">${maskedNum}</p>
                                             </div>
                                             <button onclick="togglePrivacy('${p.rowId}', '${rawNum}')" class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-400 hover:text-indigo-500 transition-all">
                                                <i id="eye-${p.rowId}" class="bi bi-eye-slash text-sm"></i>
                                             </button>
                                        </div>
                                        <div class="flex items-center gap-1.5 opacity-70">
                                            <i class="bi bi-geo-alt-fill ${themeText} text-[10px]"></i>
                                            <p class="text-[11px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-wider">${p["SW Location"]}</p>
                                        </div>
                                    </div>
                                    <div class="flex flex-col gap-2">
                                        <button onclick="confirmDelete('${p.rowId}')" class="w-10 h-10 flex items-center justify-center rounded-xl bg-rose-500/10 text-rose-500 border border-rose-500/20 active:scale-90"><i class="bi bi-trash3-fill"></i></button>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                });
                list.innerHTML = html;
            } catch (e) { 
                console.error("Load error:", e);
                list.innerHTML = `<div class="text-center py-10 uppercase font-black tracking-widest text-[10px]">Sync Error. Check Network.</div>`;
            }
        };
    
        window.confirmDelete = (rowId) => {
            pendingDeleteId = rowId;
            document.getElementById('delete-modal')?.classList.remove('hidden');
        };
    
        window.closeDeleteModal = () => {
            document.getElementById('delete-modal')?.classList.add('hidden');
            pendingDeleteId = null;
        };
    
        document.getElementById('final-confirm-btn').onclick = async () => {
            if(!pendingDeleteId || !user) return;
            const btn = document.getElementById('final-confirm-btn');
            btn.disabled = true; btn.innerText = "DELETING...";
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors',
                    body: JSON.stringify({ psk: PSK, action: 'delete', rowId: parseInt(pendingDeleteId), uid: user.uid })
                });
                showToast("Prospect Deleted ✓");
                closeDeleteModal();
                loadFollowUps();
            } catch (e) { showToast("Error deleting."); }
            finally { btn.disabled = false; btn.innerText = "CONFIRM DELETE"; }
        };
    
        document.getElementById('prospect-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!SCRIPT_URL || !PSK) return showToast("System Loading...");
    
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "SAVING...";
    
            const payload = {
                psk: PSK,
                action: "add",
                name: document.getElementById('p-name').value,
                contact: document.getElementById('p-phone').value,
                swDate: document.getElementById('p-date').value,
                swLocation: document.getElementById('p-location').value,
                soulwinner: user.uid,
                church: userProfile.churchId?.[0] || "General"
            };
    
            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                showToast("Success! ✓");
                document.getElementById('prospect-form').reset();
                document.getElementById('p-date').valueAsDate = new Date();
                
                // SURGICAL UX: Open list and refresh after saving
                const container = document.getElementById('followup-container');
                const chevron = document.getElementById('list-chevron');
                if (container.classList.contains('hidden')) {
                    container.classList.remove('hidden');
                    chevron.style.transform = 'rotate(180deg)';
                }
                loadFollowUps();
            } catch (err) { showToast("Error saving."); }
            finally { btn.disabled = false; btn.innerText = "SAVE FOLLOW-UP"; }
        });
    </script>
</body>
</html>
