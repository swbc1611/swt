<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulwinning Tracker - Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-2">
            <div class="w-10 h-8 bg-indigo-600 rounded-lg flex items-center justify-center overflow-hidden">
                <span class="font-bold text-white text-[10px] leading-none text-center">SWT</span>
            </div>
            <h1 class="text-lg brand-text">
                <span class="brand-word-1">Soulwinning</span><span class="brand-word-2">Tracker</span>
            </h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 transition-all">
                <svg id="sun-icon" class="w-5 h-5 hidden text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
                <svg id="moon-icon" class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
            </button>
            <button onclick="history.back()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 font-bold text-[10px] uppercase">Back</button>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto p-6">
        <header class="text-center mb-10">
            <div class="flex flex-col items-center gap-6 mb-8">
                <div class="w-16 h-14 bg-indigo-600 rounded-[1.25rem] flex items-center justify-center shadow-2xl shadow-indigo-500/20">
                    <span class="font-bold text-white text-xl leading-none">SWT</span>
                </div>
                <h2 class="text-3xl brand-text justify-center">
                    <span class="brand-word-1 dark:text-white">Leader</span><span class="brand-word-2">board</span>
                </h2>
            </div>
            
            <div class="bg-white dark:bg-slate-900 border dark:border-slate-800 p-6 rounded-[2.5rem] shadow-sm space-y-3 max-w-sm mx-auto">
                <select id="churchFilter" class="w-full bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 p-3 rounded-2xl text-xs font-bold outline-none dark:text-white">
                    </select>
                <select id="dateRange" onchange="toggleCustomDate()" class="w-full bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 p-3 rounded-2xl text-xs font-bold outline-none dark:text-white">
                    <option value="all">All-Time Records</option>
                    <option value="today">Today</option>
                    <option value="week">This Week</option>
                    <option value="month">This Month</option>
                    <option value="custom">Custom Range</option>
                </select>

                <div id="custom-date-container" class="hidden flex gap-2">
                    <input type="date" id="startDate" class="flex-1 bg-slate-50 border rounded-xl text-[10px] p-2 dark:bg-slate-800 dark:border-slate-700 dark:text-white">
                    <input type="date" id="endDate" class="flex-1 bg-slate-50 border rounded-xl text-[10px] p-2 dark:bg-slate-800 dark:border-slate-700 dark:text-white">
                </div>

                <button onclick="fetchLeaderboardData()" class="w-full py-3 bg-indigo-600 text-white rounded-2xl font-bold text-xs uppercase active:scale-95 transition-all shadow-lg shadow-indigo-500/20">Load Rankings</button>
            </div>
        </header>

        <section class="bg-white dark:bg-slate-900 rounded-[2.5rem] border dark:border-slate-800 overflow-hidden shadow-sm min-h-[400px]">
            <div id="leaderboard-list" class="divide-y dark:divide-slate-800">
                <p class="p-10 text-center text-slate-400 text-sm italic">Filter and click Load to see rankings...</p>
            </div>
        </section>

        <div class="flex justify-between items-center mt-8 px-4">
            <button id="prevBtn" onclick="prevPage()" class="text-[10px] font-bold text-slate-400 uppercase disabled:opacity-20 transition-all" disabled>Previous</button>
            <span id="pageIndicator" class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">Page 1</span>
            <button id="nextBtn" onclick="nextPage()" class="text-[10px] font-bold text-slate-400 uppercase disabled:opacity-20 transition-all" disabled>Next</button>
        </div>

        <!--<p class="mt-12 text-center text-[10px] text-slate-400 uppercase font-bold tracking-[0.2em]">Independent Baptist Ministry Tool</p>-->
    </main>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, getDocs, collection, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let userProfile = null;
        let sortedLeaderboard = [];
        let currentPage = 1;
        const rowsPerPage = 10;

        const initTheme = () => {
            const isDark = localStorage.getItem('theme') === 'dark';
            const html = document.getElementById('main-html');
            if (isDark) {
                html.classList.add('dark');
                document.getElementById('sun-icon').classList.remove('hidden');
                document.getElementById('moon-icon').classList.add('hidden');
            } else {
                html.classList.remove('dark');
                document.getElementById('sun-icon').classList.add('hidden');
                document.getElementById('moon-icon').classList.remove('hidden');
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.replace("index.html"); return; }
            const snap = await getDoc(doc(db, "profiles", user.uid));
            if (!snap.exists()) { window.location.replace("onboarding.html"); return; }
            userProfile = snap.data();

            if (userProfile.role === 'member') {
                window.location.replace("member.html");
                return;
            }

            await setupChurchFilter();
            initTheme();
        });

        async function setupChurchFilter() {
            const filter = document.getElementById('churchFilter');
            filter.innerHTML = "";

            if (userProfile.role === 'superadmin') {
                filter.innerHTML = '<option value="global">Global (All Churches)</option>';
                const churches = await getDocs(collection(db, "churches"));
                churches.forEach(c => filter.innerHTML += `<option value="${c.id}">${c.data().name}</option>`);
            } else {
                for (const id of userProfile.churchId) {
                    const cSnap = await getDoc(doc(db, "churches", id));
                    if (cSnap.exists()) filter.innerHTML += `<option value="${id}">${cSnap.data().name}</option>`;
                }
            }
        }

        window.toggleCustomDate = () => {
            const range = document.getElementById('dateRange').value;
            document.getElementById('custom-date-container').classList.toggle('hidden', range !== 'custom');
        };

        window.fetchLeaderboardData = async () => {
            const churchId = document.getElementById('churchFilter').value;
            const range = document.getElementById('dateRange').value;
            const listElement = document.getElementById('leaderboard-list');
            
            listElement.innerHTML = '<p class="p-10 text-center text-slate-400 text-sm italic">Calculating...</p>';

            try {
                let q;
                if (churchId === 'global') {
                    q = query(collection(db, "salvations"));
                } else {
                    q = query(collection(db, "salvations"), where("churchId", "==", churchId));
                }

                const snap = await getDocs(q);
                const userTotals = {};
                const now = new Date();
                now.setHours(0,0,0,0);

                snap.forEach(d => {
                    const data = d.data();
                    const eventDate = new Date(data.eventDate);
                    const eventDay = new Date(data.eventDate);
                    eventDay.setHours(0,0,0,0);

                    let isIncluded = (range === 'all');
                    if (range === 'today') isIncluded = eventDay.getTime() === now.getTime();
                    else if (range === 'week') {
                        const sunday = new Date(now);
                        sunday.setDate(now.getDate() - now.getDay());
                        isIncluded = eventDay >= sunday;
                    }
                    else if (range === 'month') {
                        isIncluded = eventDate.getMonth() === now.getMonth() && eventDate.getFullYear() === now.getFullYear();
                    }
                    else if (range === 'custom') {
                        const s = new Date(document.getElementById('startDate').value); s.setHours(0,0,0,0);
                        const e = new Date(document.getElementById('endDate').value); e.setHours(23,59,59);
                        isIncluded = eventDate >= s && eventDate <= e;
                    }

                    if (isIncluded) {
                        const uid = data.userId;
                        if (!userTotals[uid]) {
                            userTotals[uid] = { name: data.userEmail.split('@')[0], count: 0 };
                        }
                        userTotals[uid].count += data.count;
                    }
                });

                sortedLeaderboard = Object.values(userTotals).sort((a, b) => b.count - a.count);
                currentPage = 1;
                displayPage();

            } catch (e) { 
                console.error(e); 
                listElement.innerHTML = '<p class="p-10 text-center text-red-400 text-sm italic">Error loading data.</p>';
            }
        };

        function displayPage() {
            const list = document.getElementById('leaderboard-list');
            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageItems = sortedLeaderboard.slice(start, end);

            if (pageItems.length === 0) {
                list.innerHTML = '<p class="p-10 text-center text-slate-400 text-sm italic">No records found.</p>';
            } else {
                let html = "";
                pageItems.forEach((item, index) => {
                    const rank = start + index + 1;
                    html += `
                        <div class="px-8 py-5 flex justify-between items-center transition-all hover:bg-slate-50 dark:hover:bg-slate-800/20">
                            <div class="flex items-center gap-4">
                                <span class="text-xs font-black ${rank <= 3 ? 'text-indigo-600' : 'text-slate-300'} w-4">#${rank}</span>
                                <span class="font-bold text-sm dark:text-white capitalize">${item.name}</span>
                            </div>
                            <span class="text-xl font-black text-indigo-600">${item.count}</span>
                        </div>`;
                });
                list.innerHTML = html;
            }

            document.getElementById('pageIndicator').innerText = `Page ${currentPage}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = end >= sortedLeaderboard.length;
        }

        window.nextPage = () => { currentPage++; displayPage(); window.scrollTo(0,0); };
        window.prevPage = () => { currentPage--; displayPage(); window.scrollTo(0,0); };

        window.toggleDarkMode = () => {
            const html = document.getElementById('main-html');
            const isDark = html.classList.toggle('dark');
            document.getElementById('sun-icon').classList.toggle('hidden', !isDark);
            document.getElementById('moon-icon').classList.toggle('hidden', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };
    </script>
</body>
</html>
