<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapLibre Picker - SWT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { background-color: #0f172a; color: white; }
        #map { height: 400px; border-radius: 1.5rem; border: 2px solid rgba(99, 102, 241, 0.2); }
        .map-overlay { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="p-6 flex flex-col items-center">

    <div class="w-full max-w-md space-y-6">
        <header class="text-center">
            <h1 class="text-2xl font-black text-indigo-400 uppercase tracking-tighter italic">Precision Pin</h1>
            <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Vector Map Acquisition</p>
        </header>

        <div class="relative group">
            <div id="map"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none z-10">
                <i class="bi bi-plus text-indigo-500 text-3xl opacity-50"></i>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="locateMe()" class="py-4 bg-indigo-600 rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2">
                <i class="bi bi-crosshair"></i> GPS Locate
            </button>
            <button onclick="copyLocation()" class="py-4 bg-slate-800 rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition-all border border-white/5 flex items-center justify-center gap-2">
                <i class="bi bi-clipboard-check"></i> Copy URL
            </button>
        </div>

        <div class="map-overlay p-5 rounded-[2rem] border border-white/5">
            <div class="flex justify-between mb-2">
                <span class="text-[9px] font-black text-indigo-400 uppercase tracking-widest">Active Pin</span>
                <span id="coords" class="text-[10px] font-mono text-slate-400">15.145, 120.588</span>
            </div>
            <p id="address" class="text-xs font-bold text-slate-200 line-clamp-2">Move the map to select outreach site...</p>
        </div>
    </div>

    <script>
        // Using a public-ready vector style (No API key needed for this basic test)
        const style = "https://demotiles.maplibre.org/style.json"; 
        
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json', // Brighter, clearer vector style
            center: [120.588, 15.145], // [lng, lat]
            zoom: 13
        });

        // Add a draggable marker
        const marker = new maplibregl.Marker({ color: "#6366f1", draggable: true })
            .setLngLat([120.588, 15.145])
            .addTo(map);

        function updateUI(lng, lat) {
            document.getElementById('coords').innerText = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
            // In production, you'd call a reverse-geocoder here
            document.getElementById('address').innerText = "Location locked. Ready to share.";
        }

        // Event: Click to move marker
        map.on('click', (e) => {
            marker.setLngLat(e.lngLat);
            updateUI(e.lngLat.lng, e.lngLat.lat);
        });

        // Event: Drag marker
        marker.on('dragend', () => {
            const lngLat = marker.getLngLat();
            updateUI(lngLat.lng, lngLat.lat);
        });

        function locateMe() {
            if (!navigator.geolocation) return alert("GPS not supported");
            navigator.geolocation.getCurrentPosition(pos => {
                const { latitude, longitude } = pos.coords;
                map.flyTo({ center: [longitude, latitude], zoom: 16 });
                marker.setLngLat([longitude, latitude]);
                updateUI(longitude, latitude);
            });
        }

        function copyLocation() {
            const lngLat = marker.getLngLat();
            const url = `https://www.google.com/maps?q=${lngLat.lat},${lngLat.lng}`;
            navigator.clipboard.writeText(url).then(() => alert("Maps Link Copied!"));
        }
    </script>
</body>
</html>
