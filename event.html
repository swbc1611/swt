<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Detail MapLibre - SWT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { background-color: #0f172a; color: white; }
        #map { height: 450px; border-radius: 1.5rem; }
        /* Custom Marker pulse to make it more visible */
        .custom-marker {
            width: 20px; height: 20px;
            background: #6366f1; border: 3px solid white;
            border-radius: 50%; box-shadow: 0 0 15px rgba(99,102,241,0.6);
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div class="w-full max-w-md space-y-4">
        <div id="map" class="shadow-2xl border border-indigo-500/20"></div>

        <div class="flex gap-2">
            <button onclick="locateMe()" class="flex-1 py-4 bg-indigo-600 rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2">
                <i class="bi bi-crosshair"></i> Locate Me
            </button>
            <button onclick="copyLocation()" class="flex-1 py-4 bg-slate-800 rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 border border-white/5 flex items-center justify-center gap-2">
                <i class="bi bi-send-fill"></i> Share Link
            </button>
        </div>

        <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5 text-center">
            <p id="address" class="text-[11px] font-bold text-slate-300">Tap to mark exact street location</p>
            <p id="coords" class="text-[9px] font-mono text-indigo-400 mt-1">Ready</p>
        </div>
    </div>

    <script>
        // SURGICAL FIX: Using MapTiler's high-detail streets style
        // Replace "YOUR_API_KEY" with a free key from maptiler.com for production
        const styleUrl = "https://api.maptiler.com/maps/streets-v2/style.json?key=get_your_own_key_at_maptiler.com";
        
        // For this PoC, I'm using a direct OSM-backed vector style that includes labels
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://tiles.openfreemap.org/styles/bright', // High-detail, free street labels
            center: [120.588, 15.145], 
            zoom: 14
        });

        const el = document.createElement('div');
        el.className = 'custom-marker';

        const marker = new maplibregl.Marker({ element: el, draggable: true })
            .setLngLat([120.588, 15.145])
            .addTo(map);

        function updateUI(lng, lat) {
            document.getElementById('coords').innerText = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
            document.getElementById('address').innerText = "Pin dropped on street level.";
        }

        map.on('click', (e) => {
            marker.setLngLat(e.lngLat);
            updateUI(e.lngLat.lng, e.lngLat.lat);
        });

        marker.on('dragend', () => {
            const lngLat = marker.getLngLat();
            updateUI(lngLat.lng, lngLat.lat);
        });

        function locateMe() {
            navigator.geolocation.getCurrentPosition(pos => {
                const { latitude, longitude } = pos.coords;
                map.flyTo({ center: [longitude, latitude], zoom: 17, speed: 1.5 });
                marker.setLngLat([longitude, latitude]);
                updateUI(longitude, latitude);
            });
        }

        function copyLocation() {
            const lngLat = marker.getLngLat();
            const url = `https://www.google.com/maps?q=${lngLat.lat},${lngLat.lng}`;
            navigator.clipboard.writeText(url).then(() => alert("Street location copied!"));
        }
    </script>
</body>
</html>
