<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pin Picker PoC - Soulwinning Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 350px; border-radius: 1.5rem; z-index: 10; }
        .dark-ui { background-color: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="dark-ui p-6 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-md space-y-6">
        <header class="text-center mb-8">
            <h1 class="text-2xl font-black text-indigo-400 uppercase tracking-tighter">Pin Acquisition PoC</h1>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-1">Get exact coordinates for outreach</p>
        </header>

        <div class="relative group">
            <input type="text" id="addrSearch" placeholder="Type city or landmark..." 
                class="w-full p-4 bg-slate-800 rounded-2xl outline-none border border-white/5 pr-12 text-sm focus:border-indigo-500 transition-all">
            <button onclick="searchPlace()" class="absolute right-3 top-3 bg-indigo-600 p-2 rounded-xl hover:bg-indigo-500 transition-colors">
                <i class="bi bi-search"></i>
            </button>
        </div>

        <div id="map" class="shadow-2xl border border-white/10"></div>

        <div class="grid grid-cols-2 gap-3">
            <button onclick="locateMe()" class="flex items-center justify-center gap-2 py-4 bg-emerald-600 text-white rounded-2xl font-bold text-[10px] uppercase tracking-widest active:scale-95 transition-all">
                <i class="bi bi-crosshair"></i> Use My GPS
            </button>
            <button onclick="copyCoords()" class="flex items-center justify-center gap-2 py-4 bg-slate-800 text-slate-300 rounded-2xl font-bold text-[10px] uppercase tracking-widest active:scale-95 transition-all border border-white/5">
                <i class="bi bi-clipboard"></i> Copy Link
            </button>
        </div>

        <div class="glass p-5 rounded-[2rem] space-y-3">
            <div class="flex justify-between items-center">
                <span class="text-[9px] font-black text-slate-500 uppercase">Selected Coordinates</span>
                <span id="coord-badge" class="text-[10px] font-mono text-indigo-400">0.00, 0.00</span>
            </div>
            <p id="display-address" class="text-xs text-slate-300 italic">Tap map or search to pick a location...</p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker;
        // Default to Philippines (Manila/Angeles area)
        const defaultPos = [15.145, 120.588]; 

        function initMap() {
            map = L.map('map').setView(defaultPos, 13);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            marker = L.marker(defaultPos, { draggable: true }).addTo(map);

            // Update on click
            map.on('click', function(e) {
                updatePosition(e.latlng.lat, e.latlng.lng);
            });

            // Update on drag
            marker.on('dragend', function() {
                const pos = marker.getLatLng();
                updatePosition(pos.lat, pos.lng);
            });
        }

        async function updatePosition(lat, lng) {
            marker.setLatLng([lat, lng]);
            map.panTo([lat, lng]);
            document.getElementById('coord-badge').innerText = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
            
            // Simple Reverse Geocoding (Convert Lat/Lng to Name)
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const data = await res.json();
                document.getElementById('display-address').innerText = data.display_name || "Location Found";
            } catch (e) {
                document.getElementById('display-address').innerText = "Coordinates Saved";
            }
        }

        function locateMe() {
            if (!navigator.geolocation) return alert("Geolocation not supported");
            
            document.getElementById('display-address').innerText = "Acquiring GPS...";
            navigator.geolocation.getCurrentPosition((pos) => {
                updatePosition(pos.coords.latitude, pos.coords.longitude);
                map.setZoom(16);
            }, () => alert("Unable to retrieve location"));
        }

        async function searchPlace() {
            const query = document.getElementById('addrSearch').value;
            if(!query) return;
            
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
            const data = await res.json();
            
            if(data.length > 0) {
                updatePosition(parseFloat(data[0].lat), parseFloat(data[0].lon));
            } else {
                alert("Place not found");
            }
        }

        function copyCoords() {
            const coords = document.getElementById('coord-badge').innerText;
            const googleMapsUrl = `https://www.google.com/maps?q=${coords}`;
            navigator.clipboard.writeText(googleMapsUrl).then(() => {
                alert("Google Maps Link Copied!");
            });
        }

        window.onload = initMap;
    </script>
</body>
</html>
