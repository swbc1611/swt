<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Detail MapLibre + Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    
    <style>
        body { background-color: #0f172a; color: white; overflow: hidden; }
        #map { height: 500px; width: 100%; border-radius: 2rem; }
        .search-container {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .custom-marker {
            width: 22px; height: 22px;
            background: #6366f1; border: 3px solid white;
            border-radius: 50%; box-shadow: 0 0 20px rgba(99,102,241,0.8);
            cursor: pointer;
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-md space-y-4">
        
        <div class="search-container p-2 rounded-2xl flex items-center gap-2 shadow-2xl">
            <div class="pl-3 text-indigo-400"><i class="bi bi-search"></i></div>
            <input type="text" id="mapSearch" placeholder="Search street or barangay..." 
                class="bg-transparent border-none outline-none text-sm w-full py-2 text-white placeholder:text-slate-500">
            <button onclick="searchAddress()" class="bg-indigo-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all">
                Find
            </button>
        </div>

        <div id="map" class="shadow-2xl border border-indigo-500/20 relative">
             <button onclick="locateMe()" class="absolute bottom-4 right-4 w-12 h-12 bg-white text-slate-900 rounded-full shadow-xl flex items-center justify-center z-10 active:scale-90 transition-all">
                <i class="bi bi-crosshair2 text-xl"></i>
            </button>
        </div>

        <div class="flex gap-3">
            <button onclick="copyLocation()" class="flex-1 py-4 bg-slate-800 rounded-2xl font-black text-[10px] uppercase tracking-widest border border-white/5 flex items-center justify-center gap-2 active:scale-95 transition-all">
                <i class="bi bi-geo-alt-fill text-red-500"></i> Copy Maps Link
            </button>
        </div>

        <div id="location-info" class="text-center py-2">
            <p id="address-text" class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">Tap to drop pin</p>
            <p id="coords-text" class="text-[9px] font-mono text-slate-600 mt-1">0.000, 0.000</p>
        </div>
    </div>

    <script>
        // High-detail free street style
        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://tiles.openfreemap.org/styles/bright', 
            center: [120.5887, 15.1451], // Angeles/Mabalacat area
            zoom: 14
        });

        // Custom Marker
        const el = document.createElement('div');
        el.className = 'custom-marker';
        const marker = new maplibregl.Marker({ element: el, draggable: true })
            .setLngLat([120.5887, 15.1451])
            .addTo(map);

        function updateDisplay(lng, lat) {
            document.getElementById('coords-text').innerText = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
            document.getElementById('address-text').innerText = "Location Locked";
        }

        // Map Click Interaction
        map.on('click', (e) => {
            marker.setLngLat(e.lngLat);
            updateDisplay(e.lngLat.lng, e.lngLat.lat);
        });

        marker.on('dragend', () => {
            const lngLat = marker.getLngLat();
            updateDisplay(lngLat.lng, lngLat.lat);
        });

        // --- SEARCH LOGIC (Nominatim) ---
        async function searchAddress() {
            const query = document.getElementById('mapSearch').value;
            if(!query) return;

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}, Philippines`);
                const data = await response.json();

                if(data.length > 0) {
                    const { lat, lon } = data[0];
                    const coords = [parseFloat(lon), parseFloat(lat)];
                    
                    map.flyTo({ center: coords, zoom: 17, speed: 1.2 });
                    marker.setLngLat(coords);
                    updateDisplay(coords[0], coords[1]);
                } else {
                    alert("Location not found. Try adding the city name.");
                }
            } catch (err) {
                console.error("Search failed:", err);
            }
        }

        // Handle "Enter" key in search
        document.getElementById('mapSearch').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchAddress();
        });

        function locateMe() {
            navigator.geolocation.getCurrentPosition(pos => {
                const coords = [pos.coords.longitude, pos.coords.latitude];
                map.flyTo({ center: coords, zoom: 18 });
                marker.setLngLat(coords);
                updateDisplay(coords[0], coords[1]);
            });
        }

        function copyLocation() {
            const lngLat = marker.getLngLat();
            const url = `https://www.google.com/maps?q=${lngLat.lat},${lngLat.lng}`;
            navigator.clipboard.writeText(url).then(() => alert("Google Maps link copied!"));
        }
    </script>
</body>
</html>
