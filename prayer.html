<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prayer Board - Soulwinning Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .guide-card { background-color: white; transition: all 0.3s ease; }
        .dark .guide-card { background-color: #111827 !important; }
        textarea, input {
            background: rgba(79, 70, 229, 0.05) !important; 
            border: 1px solid rgba(79, 70, 229, 0.1) !important;
            outline: none !important;
            transition: all 0.2s ease;
        }
        textarea:focus, input:focus {
            border-color: #4f46e5 !important;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1) !important;
        }
        button, .preset-btn, .type-btn, [role="button"] { transition: all 0.2s ease-in-out !important; }
        button:active, .preset-btn:active, .type-btn:active, [role="button"]:active {
            transform: scale(0.95) !important;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.2) !important;
            outline: none !important;
        }        
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300 font-sans">

    <nav class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-[50]">
        <div class="flex items-center gap-2">
            <button onclick="window.history.back()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 active:scale-90 transition-all mr-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-600 dark:text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 19l-7-7 7-7" /></svg>
            </button>
            <div class="w-10 h-8 bg-indigo-600 rounded-lg flex items-center justify-center overflow-hidden shrink-0">
                <span class="font-bold text-white text-[10px] leading-none text-center">SWT</span>
            </div>
            <h1 class="text-lg font-black tracking-tight hidden sm:block leading-none">
                <span class="text-slate-800 dark:text-white">Soulwinning</span><span class="text-indigo-600">Tracker</span>
            </h1>
        </div>
        
        <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 transition-all">
            <svg id="sun-icon" class="w-5 h-5 hidden text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
            <svg id="moon-icon" class="w-5 h-5 text-slate-600 dark:text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
        </button>
    </nav>

    <main class="flex-1 flex flex-col items-center px-6 py-10 relative z-10 overflow-y-auto w-full max-w-xl mx-auto">
        <div id="prospect-card" class="guide-card w-full bg-white dark:bg-[#111827] rounded-[2.5rem] p-8 flex flex-col items-center gap-6 border-2 border-indigo-100 dark:border-slate-800 relative mb-4">
            <div class="flex flex-col items-center gap-3">
                <div class="w-16 h-16 bg-teal-600 rounded-2xl flex items-center justify-center shadow-lg shadow-teal-600/30 shrink-0">
                    <i class="fas fa-person-praying fa-2x text-white"></i>
                </div>
                <h2 class="text-xl font-black uppercase tracking-[.25em] text-slate-800 dark:text-white">Post a Request</h2>
            </div>
        
            <div class="w-full flex flex-col gap-5">
                <div>
                    <label class="text-[10px] font-black text-indigo-500 dark:text-indigo-400 uppercase tracking-[0.2em] ml-1 mb-3 block text-center">
                        How may we join you in prayer?
                    </label>
                    <textarea id="prayerInput" placeholder="Enter your petition..." class="w-full p-6 rounded-2xl dark:text-white h-36 resize-none transition-all focus:ring-4 focus:ring-indigo-500/10"></textarea>
                </div>
                <button id="postBtn" onclick="addPrayer()" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black uppercase text-[11px] tracking-[0.2em] transition-all hover:bg-indigo-700 active:scale-95 flex items-center justify-center gap-2 shadow-lg shadow-indigo-600/50">
                    <i class="bi bi-send-fill text-[10px] opacity-70"></i>
                    <span>Share with the Brethren</span>                    
                </button>
            </div>
        </div>

        <div class="w-full py-6 flex flex-col items-center justify-center">
            <label class="text-[13px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.4em] block text-center leading-none">
                Active Requests
            </label>
        </div>
        
        <div class="w-full flex justify-center mb-10">
            <div class="bg-slate-100 dark:bg-slate-800/50 p-1.5 rounded-2xl flex items-center w-full max-w-[320px] border dark:border-slate-700/50">
                <button id="filter-all" onclick="setPrayerFilter('all')" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all duration-300 bg-indigo-600 text-white shadow-lg shadow-indigo-500/20">All Requests</button>
                <button id="filter-mine" onclick="setPrayerFilter('mine')" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all duration-300 text-slate-400 dark:text-slate-500 bg-transparent">My Requests</button>
            </div>
        </div>
        
        <div id="prayer-list" class="w-full space-y-8 pb-24">
            <div class="flex flex-col items-center justify-center py-20 animate-pulse">
                <i class="bi bi-arrow-repeat text-indigo-500 text-2xl mb-4 animate-spin"></i>
                <p class="text-center text-slate-400 italic text-xs uppercase tracking-widest">Gathering requests...</p>
            </div>
        </div>
    </main>

    <div id="delete-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6 hidden z-[200]">
        <div class="bg-white dark:bg-slate-900 w-full max-w-xs rounded-[2.5rem] p-8 border dark:border-slate-800 shadow-2xl text-center">
            <div class="w-12 h-12 bg-red-100 dark:bg-red-900/30 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="bi bi-exclamation-triangle-fill text-xl"></i>
            </div>
            <h3 class="text-xl font-bold dark:text-white mb-2">Remove Request?</h3>
            <p class="text-[11px] text-slate-500 dark:text-slate-400 mb-8 leading-relaxed">This action will permanently remove your request from the public board.</p>
            <div class="flex flex-col gap-2">
                <button id="final-confirm-btn" class="w-full py-4 bg-red-600 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest active:scale-95 transition-all">Delete Request</button>
                <button onclick="closeDeleteModal()" class="w-full py-4 text-slate-500 font-bold uppercase text-[10px] tracking-widest">Cancel</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-500 z-[150] pointer-events-none text-sm font-bold border border-white/10"></div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const API_URL = 'https://script.google.com/macros/s/AKfycbz1hpkFNIh2s0EZcuckZn5Zu6D2m9AA4Lwh9nVVjASkQg_jgVDLxwqZj2LJ07oBLsK38A/exec';
        const PSK = 'sweeterthanhoney1611'; 

        let user = null;
        let userProfile = JSON.parse(sessionStorage.getItem('userContext') || "{}");
        let currentPrayerFilter = 'all';
        let pendingDeleteId = null;

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                t.classList.remove('opacity-100', 'translate-y-0');
                t.classList.add('opacity-0', 'translate-y-10');
            }, 3000);
        };

        window.toggleDarkMode = () => {
            const isDark = document.getElementById('main-html').classList.toggle('dark');
            document.getElementById('sun-icon').classList.toggle('hidden', !isDark);
            document.getElementById('moon-icon').classList.toggle('hidden', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };
        if(localStorage.getItem('theme') === 'dark') toggleDarkMode();

        onAuthStateChanged(auth, (u) => {
            if (!u) { window.location.replace("index.html"); return; }
            user = u;
            loadPrayers();
        });

        window.setPrayerFilter = (filter) => {
            if (currentPrayerFilter === filter) return;
            currentPrayerFilter = filter;
            const allBtn = document.getElementById('filter-all');
            const mineBtn = document.getElementById('filter-mine');
            const active = "flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all duration-300 bg-indigo-600 text-white shadow-lg shadow-indigo-500/20";
            const inactive = "flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all duration-300 text-slate-400 dark:text-slate-500 bg-transparent";
            allBtn.className = (filter === 'all') ? active : inactive;
            mineBtn.className = (filter === 'mine') ? active : inactive;
            document.getElementById('prayer-list').innerHTML = `<div class="flex flex-col items-center justify-center py-20 animate-pulse"><i class="bi bi-arrow-repeat text-indigo-500 text-2xl mb-4 animate-spin"></i><p class="text-center text-slate-400 italic text-xs uppercase tracking-widest">Gathering requests...</p></div>`;
            loadPrayers();
        };
        
        window.loadPrayers = async () => {
            const list = document.getElementById('prayer-list');
            try {
                const res = await fetch(`${API_URL}?key=${PSK}`);
                let rawData = await res.json();
                
                let data = (currentPrayerFilter === 'mine') 
                    ? rawData.filter(p => p.UserID == user.uid) 
                    : rawData;
        
                const grouped = data.reduce((acc, curr) => {
                    if (!acc[curr.UserID]) { 
                        acc[curr.UserID] = { 
                            userName: curr.Name, 
                            lastActive: new Date(curr.Date).getTime(), 
                            prayers: [] 
                        }; 
                    }
                    const prayerTime = new Date(curr.Date).getTime();
                    if (prayerTime > acc[curr.UserID].lastActive) acc[curr.UserID].lastActive = prayerTime;
                    acc[curr.UserID].prayers.push(curr);
                    return acc;
                }, {});
        
                const sortedGroups = Object.values(grouped).sort((a, b) => b.lastActive - a.lastActive);
                let html = "";
                
                sortedGroups.forEach((group, index) => {
                    group.prayers.sort((a, b) => new Date(b.Date) - new Date(a.Date));
                    
                    const isAlt = index % 2 !== 0;
                    // High-Contrast Accent Colors
                    const themeColor = isAlt ? 'sky-500' : 'cyan-400';
                    const themeBorder = isAlt ? 'border-sky-500/30' : 'border-cyan-400/30';
                    const themeBg = isAlt ? 'bg-sky-500' : 'bg-cyan-400';
                    const themeText = isAlt ? 'text-sky-400' : 'text-cyan-400';
        
                    html += `
                        <div class="bg-white dark:bg-[#111827] w-full rounded-3xl border-2 ${themeBorder} relative text-left mb-10 transition-all duration-300 overflow-hidden shadow-xl dark:shadow-cyan-500/5">
                            
                            <div class="px-7 py-4 bg-slate-50 dark:bg-slate-800/40 flex items-center justify-between border-b ${themeBorder}">
                                <div class="flex items-center gap-2">
                                    <i class="bi bi-person-circle ${themeText} text-xs"></i>
                                    <span class="text-[10px] font-black ${themeText} uppercase tracking-[0.25em]">${group.userName}</span>
                                </div>
                                <span class="text-[9px] font-black text-zinc-900 uppercase bg-emerald-400 px-3 py-1 rounded-full shadow-lg shadow-emerald-500/20">
                                    ${group.prayers.length} ${group.prayers.length === 1 ? 'Request' : 'Requests'}
                                </span>
                            </div>
        
                            <div class="flex flex-col">
                                ${group.prayers.map((p, pIndex) => `
                                    <div class="p-7 pl-9 relative ${pIndex % 2 !== 0 ? 'bg-black/5 dark:bg-white/5' : ''} ${pIndex !== group.prayers.length - 1 ? 'border-b border-white/5' : ''}">
                                        
                                        <div class="absolute left-0 top-4 bottom-4 w-1 rounded-r-full ${themeBg}"></div>
        
                                        <div class="flex justify-between items-start gap-6">
                                            <p class="text-sm text-slate-700 dark:text-slate-100 leading-relaxed font-semibold italic mb-4">"${p.Request}"</p>
                                            ${p.UserID == user.uid ? `
                                                <button onclick="deletePrayer('${p.ID}')" class="shrink-0 w-8 h-8 flex items-center justify-center rounded-xl bg-rose-500/10 text-rose-500 hover:bg-rose-500 hover:text-white transition-all border border-rose-500/20 active:scale-90">
                                                    <i class="bi bi-trash3-fill text-[10px]"></i>
                                                </button>` : ''}
                                        </div>
                                        <div class="flex items-center gap-2 text-[9px] text-slate-400 font-extrabold uppercase tracking-widest opacity-80">
                                            <i class="bi bi-clock-fill ${themeText} opacity-40"></i>
                                            ${new Date(p.Date).toLocaleDateString(undefined, {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}
                                        </div>
                                    </div>`).join('')}
                            </div>
                        </div>`;
                });
                list.innerHTML = html || `<div class="text-center opacity-40 py-20 uppercase font-black tracking-widest text-[10px]">${currentPrayerFilter === 'mine' ? 'You have no active requests' : 'No active petitions'}</div>`;
            } catch (e) { list.innerHTML = "Error loading."; }
        };
        
        window.addPrayer = async () => {
            const req = document.getElementById('prayerInput').value.trim();
            if(!req) return;
            const btn = document.getElementById('postBtn');
            btn.disabled = true; btn.innerText = "POSTING...";
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ key: PSK, action: 'add', uid: user.uid, name: userProfile.displayName || "Brethren", request: req })
                });
                document.getElementById('prayerInput').value = "";
                showToast("Request Shared ✓");
                setTimeout(() => { btn.disabled = false; btn.innerText = "SHARE WITH THE BRETHREN"; loadPrayers(); }, 1000);
            } catch (e) { showToast("Network Error."); btn.disabled = false; }
        };

        // SURGICAL MODAL LOGIC
        window.deletePrayer = (id) => {
            pendingDeleteId = id;
            document.getElementById('delete-modal').classList.remove('hidden');
        };

        window.closeDeleteModal = () => {
            document.getElementById('delete-modal').classList.add('hidden');
            pendingDeleteId = null;
        };

        document.getElementById('final-confirm-btn').onclick = async () => {
            if(!pendingDeleteId) return;
            const btn = document.getElementById('final-confirm-btn');
            btn.disabled = true; btn.innerText = "REMOVING...";
            try {
                await fetch(API_URL, {
                    method: 'POST', mode: 'no-cors',
                    body: JSON.stringify({ key: PSK, action: 'delete', id: pendingDeleteId, uid: user.uid })
                });
                showToast("Request Removed ✓");
                closeDeleteModal();
                setTimeout(() => loadPrayers(), 500);
            } catch (e) { showToast("Error deleting."); }
            finally { btn.disabled = false; btn.innerText = "DELETE REQUEST"; }
        };
    </script>
</body>
</html>
