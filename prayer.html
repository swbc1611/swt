<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prayer Board - SWT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 px-6 py-4 flex items-center gap-4 sticky top-0 z-10">
        <button onclick="history.back()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800"><i class="bi bi-chevron-left"></i></button>
        <h1 class="text-lg font-bold">Prayer Board</h1>
    </nav>

    <main class="max-w-2xl mx-auto p-6 pb-32">
        <div class="p-6 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[2.5rem] shadow-sm mb-8">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Post a Request</h2>
            <textarea id="prayerInput" placeholder="How can we pray for you?" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl text-sm mb-4 outline-none dark:text-white h-24 resize-none"></textarea>
            <button id="postBtn" onclick="addPrayer()" class="w-full py-4 bg-rose-500 text-white rounded-2xl font-bold text-xs uppercase shadow-lg shadow-rose-500/30">Post to Board</button>
        </div>

        <div id="prayer-list" class="space-y-4">
            <p class="text-center text-slate-400 py-10 italic animate-pulse">Loading prayers...</p>
        </div>
    </main>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const API_URL = 'YOUR_APPS_SCRIPT_URL_HERE';
        let user = null;
        let userProfile = JSON.parse(sessionStorage.getItem('userContext') || "{}");

        onAuthStateChanged(auth, (u) => {
            if (!u) { window.location.replace("index.html"); return; }
            user = u;
            loadPrayers();
        });

        window.loadPrayers = async () => {
            const list = document.getElementById('prayer-list');
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                list.innerHTML = data.length ? data.map(p => `
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-[2rem] border dark:border-slate-800 shadow-sm relative group">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[9px] font-black text-rose-500 uppercase tracking-tighter">${p.Name}</span>
                            ${p.UserID == user.uid ? `<button onclick="deletePrayer('${p.ID}')" class="text-slate-400 hover:text-rose-500 transition-colors"><i class="bi bi-trash3-fill"></i></button>` : ''}
                        </div>
                        <p class="text-sm dark:text-slate-200 leading-relaxed font-medium">${p.Request}</p>
                        <span class="block mt-4 text-[8px] text-slate-400 uppercase font-bold">${new Date(p.Date).toLocaleDateString(undefined, {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}</span>
                    </div>
                `).join('') : '<p class="text-center text-slate-400 py-10 italic">No prayer requests yet.</p>';
            } catch (e) { list.innerHTML = "Error loading prayers."; }
        };

        window.addPrayer = async () => {
            const req = document.getElementById('prayerInput').value.trim();
            if(!req) return;
            const btn = document.getElementById('postBtn');
            btn.disabled = true; btn.innerText = "POSTING...";
            
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'add', uid: user.uid, name: userProfile.displayName || "Unknown", request: req })
            });
            
            document.getElementById('prayerInput').value = "";
            btn.disabled = false; btn.innerText = "POST TO BOARD";
            loadPrayers();
        };

        window.deletePrayer = async (id) => {
            if(!confirm("Remove this request?")) return;
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'delete', id: id, uid: user.uid })
            });
            loadPrayers();
        };
    </script>
</body>
</html>
