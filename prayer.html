<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prayer Board - Soulwinning Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .guide-card {
            background-color: white;
            transition: all 0.3s ease;
        }
        .dark .guide-card {
            background-color: #111827 !important;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }
        textarea {
            background: rgba(225, 29, 72, 0.05) !important; /* Rose tint */
            border: 1px solid rgba(225, 29, 72, 0.1) !important;
            outline: none !important;
        }
        textarea:focus {
            border-color: #f43f5e !important;
            ring: 1px solid #f43f5e !important;
        }
        button, 
        .preset-btn, 
        .type-btn,
        [role="button"] {
            transition: all 0.2s ease-in-out !important;
        }
        
        button:active, 
        .preset-btn:active, 
        .type-btn:active,
        [role="button"]:active {
            transform: scale(0.95) !important;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.7) !important;
            outline: none !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300 font-sans">

    <nav class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-[50]">
        <div class="flex items-center gap-2">
            <button onclick="window.history.back()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 active:scale-90 transition-all mr-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-600 dark:text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 19l-7-7 7-7" /></svg>
            </button>

            <div class="w-10 h-8 bg-rose-500 rounded-lg flex items-center justify-center overflow-hidden shrink-0">
                <span class="font-bold text-white text-[10px] leading-none text-center">PRY</span>
            </div>

            <h1 class="text-lg font-black tracking-tight hidden sm:block leading-none">
                <span class="text-slate-900 dark:text-white">Prayer</span><span class="text-rose-500">Board</span>
            </h1>
        </div>
        
        <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 transition-all">
            <svg id="sun-icon" class="w-5 h-5 hidden text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
            <svg id="moon-icon" class="w-5 h-5 text-slate-600 dark:text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
        </button>
    </nav>

    <main class="flex-1 flex flex-col items-center p-6 py-8 relative z-10 overflow-y-auto w-full max-w-xl mx-auto">
        <div id="prospect-card" class="guide-card w-full bg-white dark:bg-[#111827] rounded-[2rem] p-8 shadow-2xl flex flex-col items-center gap-6 ring-1 ring-black/5 dark:ring-white/5 mb-8">
            
            <div class="flex flex-col items-center gap-3">
                <div class="w-14 h-14 bg-rose-500 rounded-2xl flex items-center justify-center shadow-lg shadow-rose-500/20 shrink-0">
                    <i class="bi bi-heart-fill text-white text-2xl"></i>
                </div>
                <h2 class="text-xl font-black uppercase tracking-widest text-slate-800 dark:text-white">Post a Request</h2>
            </div>

            <div class="w-full flex flex-col gap-4">
                <div>
                    <label class="text-[10px] font-black text-rose-500 uppercase tracking-widest ml-1 mb-2 block">How can we pray for you?</label>
                    <textarea id="prayerInput" placeholder="Enter your request..." class="w-full p-4 rounded-2xl dark:text-white h-28 resize-none"></textarea>
                </div>

                <button id="postBtn" onclick="addPrayer()" 
                    class="w-full py-4 bg-rose-500 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest transition-all 
                    hover:bg-rose-600 hover:shadow-[0_6px_20px_rgba(244,63,94,0.3)] active:scale-95 shadow-lg shadow-rose-500/20 flex items-center justify-center gap-2 mt-2">
                    <span>Share with the Brethren</span>                    
                </button>
            </div>
        </div>

        <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6 block">Active Petitions</label>

        <div id="prayer-list" class="w-full space-y-4 pb-20">
            <p class="text-center text-slate-400 py-10 italic animate-pulse text-xs uppercase tracking-widest">Gathering requests...</p>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-rose-600 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-500 z-[150] pointer-events-none text-sm font-bold border border-white/10"></div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const API_URL = 'https://script.google.com/macros/s/AKfycbz1hpkFNIh2s0EZcuckZn5Zu6D2m9AA4Lwh9nVVjASkQg_jgVDLxwqZj2LJ07oBLsK38A/exec';
        const PSK = 'sweeterthanhoney1611'; 

        let user = null;
        let userProfile = JSON.parse(sessionStorage.getItem('userContext') || "{}");

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                t.classList.remove('opacity-100', 'translate-y-0');
                t.classList.add('opacity-0', 'translate-y-10');
            }, 3000);
        };

        window.toggleDarkMode = () => {
            const isDark = document.getElementById('main-html').classList.toggle('dark');
            document.getElementById('sun-icon').classList.toggle('hidden', !isDark);
            document.getElementById('moon-icon').classList.toggle('hidden', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };
        if(localStorage.getItem('theme') === 'dark') toggleDarkMode();

        onAuthStateChanged(auth, (u) => {
            if (!u) { window.location.replace("index.html"); return; }
            user = u;
            loadPrayers();
        });

        window.loadPrayers = async () => {
            const list = document.getElementById('prayer-list');
            try {
                const res = await fetch(`${API_URL}?key=${PSK}`);
                const data = await res.json();
                
                list.innerHTML = data.length ? data.map(p => `
                    <div class="bg-white dark:bg-[#111827] p-7 rounded-[2rem] border dark:border-slate-800 shadow-sm relative text-left ring-1 ring-black/5 dark:ring-white/5 border-l-4 border-l-rose-500">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[10px] font-black text-rose-500 uppercase tracking-widest">${p.Name}</span>
                            ${p.UserID == user.uid ? `
                                <button onclick="deletePrayer('${p.ID}')" class="w-8 h-8 flex items-center justify-center rounded-lg bg-slate-50 dark:bg-slate-800 text-slate-400 hover:text-rose-500 transition-all border dark:border-slate-700">
                                    <i class="bi bi-trash3-fill text-[10px]"></i>
                                </button>` : ''}
                        </div>
                        <p class="text-sm dark:text-slate-200 leading-relaxed font-medium mb-4">"${p.Request}"</p>
                        <div class="flex items-center gap-2 text-[8px] text-slate-400 font-bold uppercase tracking-widest opacity-60">
                            <i class="bi bi-clock"></i>
                            ${new Date(p.Date).toLocaleDateString(undefined, {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}
                        </div>
                    </div>
                `).join('') : '<p class="text-center text-slate-400 py-10 italic text-xs uppercase tracking-widest">No active requests</p>';
            } catch (e) { list.innerHTML = "Error connecting to Board."; }
        };

        window.addPrayer = async () => {
            const req = document.getElementById('prayerInput').value.trim();
            if(!req) return;
            const btn = document.getElementById('postBtn');
            btn.disabled = true; btn.innerText = "POSTING...";
            
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ key: PSK, action: 'add', uid: user.uid, name: userProfile.displayName || "Brethren", request: req })
                });
                document.getElementById('prayerInput').value = "";
                showToast("Request Shared ✓");
                setTimeout(() => {
                    btn.disabled = false; btn.innerText = "SHARE WITH THE BRETHREN";
                    loadPrayers();
                }, 1000);
            } catch (e) { showToast("Network Error."); btn.disabled = false; }
        };

        window.deletePrayer = async (id) => {
            if(!confirm("Remove your request?")) return;
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ key: PSK, action: 'delete', id: id, uid: user.uid })
                });
                showToast("Request Removed ✓");
                setTimeout(() => loadPrayers(), 1000);
            } catch (e) { showToast("Error deleting."); }
        };
    </script>
</body>
</html>
