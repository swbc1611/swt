<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prayer Board - Soulwinning Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        button, .preset-btn, .type-btn, [role="button"] {
            transition: all 0.3s ease-in-out !important;
            box-sizing: border-box !important;
            border: 1px solid transparent;
        }
        button:active, .preset-btn:active, .type-btn:active, [role="button"]:active {
            transform: scale(0.98) !important;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.1) !important;
        }
    
        .dash-row {
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            width: 100% !important;
            border-radius: 1.25rem !important;
            padding: 1.25rem !important;
            margin-bottom: 0.75rem !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(30, 41, 59, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
        }
    
        #main-html:not(.dark) .dash-row {
            background: white !important;
            border: 1px solid rgba(0, 0, 0, 0.05) !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.03) !important;
        }
    
        .dash-row:hover { background: rgba(30, 41, 59, 0.7) !important; }
        #main-html:not(.dark) .dash-row:hover { background: #f8fafc !important; transform: translateY(-1px); }

        #main-html:not(.dark) .dash-row span,
        #main-html:not(.dark) .text-slate-300 { color: #1e293b !important; }
        #main-html:not(.dark) .dash-row i { color: #64748b !important; }

        textarea, input {
            background: rgba(79, 70, 229, 0.05) !important; 
            border: 1px solid rgba(79, 70, 229, 0.1) !important;
            outline: none !important;
            transition: all 0.2s ease;
        }
        
        /* THEME LOGIC FOR ACTION ZONES */
        :root { --action-zone-bg: rgba(255, 255, 255, 0.06); }
        #main-html:not(.dark) { --action-zone-bg: rgba(0, 0, 0, 0.08); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

    <nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-[100] w-full">
        <div class="flex items-center gap-2">
            <button onclick="window.history.back()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all mr-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-600 dark:text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 19l-7-7 7-7" /></svg>
            </button>
            <div class="w-10 h-8 bg-indigo-600 rounded-lg flex items-center justify-center overflow-hidden">
                <span class="font-bold text-white text-[10px] leading-none text-center">SWT</span>
            </div>
            <h1 class="text-lg brand-text"><span class="brand-word-1">Soulwinning</span><span class="brand-word-2">Tracker</span></h1>
        </div>
        <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all">
            <svg id="sun-icon" class="w-5 h-5 hidden text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
            <svg id="moon-icon" class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
        </button>
    </nav>

    <main class="flex-1 max-w-xl mx-auto w-full px-6 py-10">
        <div class="mb-12">
            <div class="flex items-center gap-4 mb-6 px-4">
                <div class="h-[1px] flex-1 bg-white/5 dark:bg-white/5"></div>
                <label class="text-[11px] font-black text-slate-400 dark:text-slate-200 uppercase tracking-[0.3em]">Post Petition</label>
                <div class="h-[1px] flex-1 bg-white/5 dark:bg-white/5"></div>
            </div>
            
            <div class="space-y-4">
                <textarea id="prayerInput" placeholder="How may we join you in prayer?" class="w-full p-6 rounded-[2rem] dark:text-white h-32 resize-none transition-all focus:ring-4 focus:ring-indigo-500/10"></textarea>
                <button id="postBtn" onclick="addPrayer()" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black uppercase text-[11px] tracking-[0.2em] shadow-lg shadow-indigo-600/30 active:scale-95 transition-all">
                    Share with the Brethren
                </button>
            </div>
        </div>

        <div class="flex justify-center mb-10">
            <div class="bg-slate-100 dark:bg-slate-800/50 p-1.5 rounded-2xl flex items-center w-full max-w-[320px] border dark:border-slate-700/50">
                <button id="filter-all" onclick="setPrayerFilter('all')" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all duration-300 bg-indigo-600 text-white shadow-lg">All</button>
                <button id="filter-mine" onclick="setPrayerFilter('mine')" class="flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all duration-300 text-slate-400 dark:text-slate-500 bg-transparent">Mine</button>
            </div>
        </div>

        <div class="flex items-center gap-4 mb-8 px-4">
            <div class="h-[1px] flex-1 bg-white/5 dark:bg-white/5"></div>
            <label class="text-[11px] font-black text-slate-400 dark:text-slate-200 uppercase tracking-[0.3em]">Active Requests</label>
            <div class="h-[1px] flex-1 bg-white/5 dark:bg-white/5"></div>
        </div>

        <div id="prayer-list" class="space-y-3 pb-24">
            <div class="flex flex-col items-center justify-center py-20 animate-pulse">
                <i class="bi bi-arrow-repeat text-indigo-500 text-2xl mb-4 animate-spin"></i>
                <p class="text-center text-slate-400 italic text-[10px] uppercase tracking-widest">Gathering requests...</p>
            </div>
        </div>
    </main>

    <div id="delete-modal" class="hidden fixed inset-0 z-[200] bg-black/80 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white dark:bg-slate-900 w-full max-w-xs rounded-[2.5rem] p-8 border dark:border-slate-800 shadow-2xl text-center">
            <h3 class="text-xl font-bold dark:text-white mb-2">Remove Request?</h3>
            <p class="text-[11px] text-slate-500 mb-8">This will permanently remove the petition.</p>
            <div class="flex flex-col gap-2">
                <button id="final-confirm-btn" class="w-full py-4 bg-red-600 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest">Delete Request</button>
                <button onclick="closeDeleteModal()" class="w-full py-4 text-slate-500 font-bold uppercase text-[10px]">Cancel</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-500 z-[150] pointer-events-none text-sm font-bold border border-white/10"></div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    
        const API_URL = 'https://script.google.com/macros/s/AKfycbwkXN89BFagPdcWxvxjcIcgIAtdvQZJBqBJOTM5WDnTmRecYTQmZy5JScJxGJ1M7QZsOA/exec';
        const PSK = 'sweeterthanhoney1611'; 
    
        let user = null;
        let userProfile = JSON.parse(sessionStorage.getItem('userContext') || "{}");
        let currentPrayerFilter = 'all';
        let pendingDeleteId = null;
    
        const getChurchId = () => (userProfile.churchId && userProfile.churchId.length > 0) ? userProfile.churchId[0] : null;
    
        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                t.classList.remove('opacity-100', 'translate-y-0');
                t.classList.add('opacity-0', 'translate-y-10');
            }, 3000);
        };
    
        window.toggleDarkMode = () => {
            const html = document.getElementById('main-html');
            const isDark = html.classList.toggle('dark');
            document.getElementById('sun-icon').classList.toggle('hidden', !isDark);
            document.getElementById('moon-icon').classList.toggle('hidden', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };
        if(localStorage.getItem('theme') === 'dark') {
            document.getElementById('main-html').classList.add('dark');
            document.getElementById('sun-icon').classList.remove('hidden');
            document.getElementById('moon-icon').classList.add('hidden');
        }
    
        onAuthStateChanged(auth, (u) => {
            if (!u) { window.location.replace("index.html"); return; }
            user = u;
            loadPrayers();
        });
    
        window.setPrayerFilter = (filter) => {
            currentPrayerFilter = filter;
            const active = "flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all duration-300 bg-indigo-600 text-white shadow-lg";
            const inactive = "flex-1 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all duration-300 text-slate-400 dark:text-slate-500 bg-transparent";
            document.getElementById('filter-all').className = (filter === 'all') ? active : inactive;
            document.getElementById('filter-mine').className = (filter === 'mine') ? active : inactive;
            loadPrayers();
        };
        
        window.loadPrayers = async () => {
            const list = document.getElementById('prayer-list');
            const churchId = getChurchId();
            if (!churchId) return list.innerHTML = `<div class="text-center py-20 uppercase font-black tracking-widest text-[10px] opacity-40">No Church Assigned.</div>`;
            
            try {
                const res = await fetch(`${API_URL}?key=${PSK}&church=${churchId}`);
                let data = await res.json();
                if (currentPrayerFilter === 'mine') data = data.filter(p => p.UserID == user.uid);
                
                let html = "";
                data.sort((a,b) => new Date(b.Date) - new Date(a.Date)).forEach((p) => {
                    const isMine = p.UserID == user.uid;
                    html += `
                        <div class="dash-row ${isMine ? 'unified-button' : ''}">
                            <div class="flex-1 flex flex-col items-start gap-1 p-5 overflow-hidden">
                                <span class="text-[9px] font-black text-indigo-500 uppercase tracking-widest">${p.Name}</span>
                                <p class="text-sm font-bold leading-relaxed text-slate-600 dark:text-slate-200">"${p.Request}"</p>
                                <span class="text-[8px] font-bold text-slate-400 uppercase mt-2">${new Date(p.Date).toLocaleDateString()}</span>
                            </div>
                            ${isMine ? `
                                <button onclick="deletePrayer('${p.ID}')" class="w-14 flex items-center justify-center transition-all rounded-r-[1.25rem]" style="background: var(--action-zone-bg) !important;">
                                    <i class="bi bi-trash3-fill text-rose-500"></i>
                                </button>
                            ` : ''}
                        </div>`;
                });
                list.innerHTML = html || `<div class="text-center py-20 uppercase font-black tracking-widest text-[10px] opacity-40">No petitions found.</div>`;
            } catch (e) { list.innerHTML = "Error loading."; }
        };
        
        window.addPrayer = async () => {
            const req = document.getElementById('prayerInput').value.trim();
            if(!req) return;
            const btn = document.getElementById('postBtn');
            btn.disabled = true; btn.innerText = "POSTING...";
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ key: PSK, action: 'add', uid: user.uid, name: userProfile.displayName || "Brethren", request: req, church: getChurchId() })
                });
                document.getElementById('prayerInput').value = "";
                showToast("Petition Shared ✓");
                setTimeout(loadPrayers, 1000);
            } catch (e) { showToast("Error."); }
            finally { btn.disabled = false; btn.innerText = "Share with the Brethren"; }
        };
    
        window.deletePrayer = (id) => { pendingDeleteId = id; document.getElementById('delete-modal').classList.remove('hidden'); };
        window.closeDeleteModal = () => { document.getElementById('delete-modal').classList.add('hidden'); pendingDeleteId = null; };
    
        document.getElementById('final-confirm-btn').onclick = async () => {
            if(!pendingDeleteId) return;
            const btn = document.getElementById('final-confirm-btn');
            btn.disabled = true; btn.innerText = "REMOVING...";
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ key: PSK, action: 'delete', id: pendingDeleteId, uid: user.uid }) });
                showToast("Removed ✓");
                closeDeleteModal();
                setTimeout(loadPrayers, 500);
            } catch (e) { showToast("Error."); }
            finally { btn.disabled = false; btn.innerText = "DELETE REQUEST"; }
        };
    </script>
</body>
</html>
