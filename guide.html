<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soulwinning Guide - Soulwinning Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        /* VIEWPORT LOCK: dvh for precision mobile height minus browser bars */
        body, html { 
            height: 100vh; 
            height: 100dvh; 
            overflow: hidden; 
            position: fixed; 
            width: 100%; 
        }
        
        /* DYNAMIC FOOTER ANIMATION */
        #prev-btn, #next-btn { 
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            white-space: nowrap; 
        }
        
        /* Force collapse using flex properties to trigger the sibling's flex-grow */
        .btn-collapse { flex: 0 0 0% !important; opacity: 0 !important; margin: 0 !important; padding: 0 !important; pointer-events: none; overflow: hidden; }
        .btn-expand { flex: 1 1 100% !important; }

        /* AGGRESSIVE COMPACT UI FOR SMALL DEVICES */
        @media (max-height: 740px) {
            nav { padding-top: 0.5rem !important; padding-bottom: 0.5rem !important; }
            .step-header { pt-5 !important; margin-bottom: 0.25rem !important; }
            .progress-spacing { margin-bottom: 0.5rem !important; }
            #verse-card { padding: 1.5rem !important; border-l-width: 8px !important; }
            footer { padding-top: 1rem !important; padding-bottom: 1rem !important; }
        }

        .step-active { height: 4px; background: #6366f1; transition: all 0.3s ease; box-shadow: 0 0 10px rgba(99,102,241,0.5); }
        .step-inactive { height: 4px; background: #1e293b; }
        
        .v-pagination { width: 32px; height: 32px; border-radius: 8px; font-size: 11px; font-weight: 900; transition: all 0.2s; cursor: pointer; }
        .v-active { background: #6366f1; color: white; transform: scale(1.1); box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
        .v-inactive { background: #1e293b; color: #64748b; border: 1px solid rgba(255,255,255,0.05); }

        @keyframes verseFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-verse { animation: verseFade 0.3s ease-out forwards; }

        #card-verses {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
            letter-spacing: -0.01em;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 flex flex-col transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center z-50 shrink-0">
        <div class="flex items-center gap-2">
            <button onclick="window.history.back()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 active:scale-90 transition-all mr-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-600 dark:text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 19l-7-7 7-7" /></svg>
            </button>
            <div class="w-10 h-8 bg-indigo-600 rounded-lg flex items-center justify-center overflow-hidden">
                <span class="font-bold text-white text-[10px] leading-none text-center">SWT</span>
            </div>
            <h1 class="text-lg brand-text hidden sm:block"><span class="brand-word-1">Soulwinning</span><span class="brand-word-2">Tracker</span></h1>
        </div>
        <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 transition-all">
            <svg id="sun-icon" class="w-5 h-5 hidden text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
            <svg id="moon-icon" class="w-5 h-5 text-slate-600 dark:text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
        </button>
    </nav>

    <main class="flex-1 flex flex-col items-center px-4 md:px-6 overflow-hidden">
        <div class="step-header w-full max-w-4xl mx-auto text-center shrink-0 pt-5 pb-1">
            <span id="step-counter" class="inline-block mb-4 text-[9px] font-black text-indigo-500 uppercase tracking-[0.3em]">Step 0 of 0</span>
            <div id="progress-bar-container" class="progress-spacing flex gap-1 justify-center mb-1"></div>
            
            <div class="flex items-center justify-center gap-3 pt-7">
                <div id="step-number-box" class="w-9 h-9 bg-teal-500 dark:bg-teal-600 rounded-md flex items-center justify-center shadow-lg shadow-teal-500/20 shrink-0">
                    <span id="current-order" class="text-white font-black text-lg leading-none">1</span>
                </div>
                <h2 id="card-title" class="text-lg md:text-3xl font-black uppercase tracking-tight leading-tight text-slate-800 dark:text-white text-left max-w-lg">...</h2>
            </div>
        </div>

        <div id="verse-container" class="flex-1 w-full flex items-center justify-center overflow-hidden py-1 px-6 min-h-0">
            <div id="verse-card" class="w-full h-full max-h-[85%] max-w-4xl bg-white dark:bg-slate-900 rounded-[2.5rem] md:rounded-[3.5rem] p-8 border-l-[12px] border-indigo-600 shadow-md ring-1 ring-black/5 dark:ring-white/10 flex items-center justify-center relative overflow-hidden">
                <p id="card-verses" class="font-bold italic text-slate-800 dark:text-white leading-tight text-center w-full whitespace-pre-line"></p>
            </div>
        </div>

        <div class="guidance-spacing w-full max-w-4xl mx-auto shrink-0 flex flex-col items-center pt-1 pb-1">
            <div id="verse-pagination" class="flex gap-3 mb-4"></div>
            <div class="text-center max-w-md mb-1">
                <div class="inline-flex items-center gap-2 mb-0.5">
                    <div class="w-1.5 h-1.5 rounded-full bg-indigo-500"></div>
                    <span class="text-[8px] font-black text-indigo-500 uppercase tracking-widest">Guidance</span>
                </div>
                <p id="card-guidance" class="text-[9px] font-bold text-slate-500 dark:text-slate-400 uppercase leading-relaxed"></p>
            </div>
        </div>
    </main>

    <footer class="bg-white dark:bg-slate-900 border-t dark:border-slate-800 px-6 py-5 z-50 shrink-0">
        <div class="flex flex-row items-stretch gap-0 max-w-lg mx-auto">
            <button id="prev-btn" onclick="changeStep(-1)" class="py-4 bg-indigo-800 text-slate-700 dark:text-slate-300 rounded-2xl font-black uppercase text-[10px] tracking-widest active:scale-95 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M15 19l-7-7 7-7" /></svg>
                Prev Step
            </button>
            <div id="btn-spacer" class="w-4 shrink-0 transition-all duration-500"></div>
            <button id="next-btn" onclick="changeStep(1)" class="py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl shadow-indigo-500/30 active:scale-95 flex items-center justify-center gap-2">
                Next Step
                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M9 5l7 7-7 7" /></svg>
            </button>
        </div>
    </footer>

    <div id="loading-state" class="absolute inset-0 bg-slate-50 dark:bg-[#0f172a] flex items-center justify-center z-[100]">
        <div class="animate-spin w-8 h-8 border-[3px] border-indigo-500 border-t-transparent rounded-full"></div>
    </div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let guideData = [];
        let currentIndex = 0;
        let verseSubIndex = 0;

        const initTheme = () => {
            if (localStorage.getItem('theme') === 'dark') {
                document.getElementById('main-html').classList.add('dark');
                document.getElementById('sun-icon')?.classList.remove('hidden');
                document.getElementById('moon-icon')?.classList.add('hidden');
            }
        };
        initTheme();

        window.toggleDarkMode = () => {
            const isDark = document.getElementById('main-html').classList.toggle('dark');
            document.getElementById('sun-icon')?.classList.toggle('hidden', !isDark);
            document.getElementById('moon-icon')?.classList.toggle('hidden', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            setTimeout(fitText, 50);
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) return window.location.replace("index.html");
            const snap = await getDoc(doc(db, "profiles", user.uid));
            if (snap.exists() && snap.data().guideUrl) loadSheet(snap.data().guideUrl);
            else window.location.replace("index.html");
        });

        async function loadSheet(rawUrl) {
            try {
                const match = rawUrl.match(/\/d\/(.+?)\//);
                const response = await fetch(`https://docs.google.com/spreadsheets/d/${match[1]}/gviz/tq?tqx=out:csv`);
                const csvText = await response.text();
                const rows = csvText.split('\n').map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/"/g, '').trim()));
                rows.shift();
                guideData = rows.map(r => ({ order: r[0], title: r[1], verses: r[2], guidance: r[4] })).filter(item => item.title);
                document.getElementById('loading-state').remove();
                buildProgress();
                renderStep();
            } catch (err) { window.location.replace("index.html"); }
        }

        function renderStep() {
            const data = guideData[currentIndex];
            const verses = data.verses.split('|');
            document.getElementById('current-order').innerText = data.order || (currentIndex + 1);
            document.getElementById('card-title').innerText = data.title;
            document.getElementById('card-guidance').innerText = data.guidance || "Continue to next step.";
            document.getElementById('step-counter').innerText = `Step ${currentIndex + 1} of ${guideData.length}`;

            const pag = document.getElementById('verse-pagination');
            pag.innerHTML = '';
            if(verses.length > 1) {
                verses.forEach((_, i) => {
                    const btn = document.createElement('div');
                    btn.className = `v-pagination flex items-center justify-center ${i === verseSubIndex ? 'v-active' : 'v-inactive'}`;
                    btn.innerText = i + 1;
                    btn.onclick = () => { verseSubIndex = i; renderVerseContent(); };
                    pag.appendChild(btn);
                });
            }
            renderVerseContent();
            updateProgress();
        }

        function renderVerseContent() {
            const verses = guideData[currentIndex].verses.split('|');
            const el = document.getElementById('card-verses');
            el.classList.remove('animate-verse');
            void el.offsetWidth;
            el.classList.add('animate-verse');
            el.innerText = verses[verseSubIndex].trim();

            const pBtns = document.querySelectorAll('.v-pagination');
            pBtns.forEach((btn, i) => {
                btn.className = `v-pagination flex items-center justify-center ${i === verseSubIndex ? 'v-active' : 'v-inactive'}`;
            });

            // UPDATED BUTTON ANIMATION LOGIC
            const pBtn = document.getElementById('prev-btn');
            const nBtn = document.getElementById('next-btn');
            const spacer = document.getElementById('btn-spacer');

            if (currentIndex === 0) {
                pBtn.className = "btn-collapse";
                nBtn.className = "py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl active:scale-95 flex items-center justify-center gap-2 btn-expand";
                spacer.className = "w-0 opacity-0";
            } else if (currentIndex === guideData.length - 1) {
                nBtn.className = "btn-collapse";
                pBtn.className = "py-4 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-2xl font-black uppercase text-[10px] tracking-widest active:scale-95 flex items-center justify-center gap-2 btn-expand";
                spacer.className = "w-0 opacity-0";
            } else {
                pBtn.className = "flex-1 py-4 bg-slate-200 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-2xl font-black uppercase text-[10px] tracking-widest active:scale-95 flex items-center justify-center gap-2";
                nBtn.className = "flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-xl active:scale-95 flex items-center justify-center gap-2";
                spacer.className = "w-4 shrink-0 transition-all";
            }

            fitText();
        }

        function fitText() {
            const el = document.getElementById('card-verses');
            const card = document.getElementById('verse-card');
            const maxHeight = card.offsetHeight - 60; 
            let size = 80; 
            el.style.fontSize = size + "px";
            while (el.scrollHeight > maxHeight && size > 14) {
                size -= 1;
                el.style.fontSize = size + "px";
            }
        }

        window.changeStep = (dir) => {
            if (currentIndex + dir >= 0 && currentIndex + dir < guideData.length) {
                currentIndex += dir;
                verseSubIndex = 0; 
                renderStep();
            }
        };

        function buildProgress() {
            const container = document.getElementById('progress-bar-container');
            container.innerHTML = '';
            guideData.forEach((_, i) => {
                const step = document.createElement('div');
                step.className = 'flex-1 step-inactive rounded-full';
                step.id = `bar-${i}`;
                container.appendChild(step);
            });
        }

        function updateProgress() {
            guideData.forEach((_, i) => {
                const bar = document.getElementById(`bar-${i}`);
                if (i <= currentIndex) {
                    bar.className = 'flex-1 step-active rounded-full';
                    bar.style.background = (i === currentIndex) ? '#6366f1' : '#312e81';
                } else {
                    bar.className = 'flex-1 step-inactive rounded-full';
                    bar.style.background = '';
                }
            });
        }

        window.addEventListener('resize', () => { setTimeout(fitText, 100); });
    </script>
</body>
</html>
