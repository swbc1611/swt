<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulwinning Guide - SWT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .card-container { perspective: 1000px; }
        .step-active { height: 4px; background: #eab308; transition: width 0.3s ease; }
        .step-inactive { height: 4px; background: #334155; }
        
        /* Smooth transitions for card content */
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive scaling for Tablet and PC */
        @media (min-width: 768px) {
            #card-title { font-size: 3.5rem; }
            #card-verses { font-size: 1.5rem; line-height: 2rem; }
            #card-guidance { font-size: 1rem; }
            .guide-card { max-width: 700px; min-height: 500px; }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

    <header class="w-full max-w-3xl mx-auto p-6">
        <div class="flex items-center justify-between mb-6">
            <button onclick="window.location.href='index.html'" class="flex items-center gap-2 text-slate-400 hover:text-indigo-500 font-bold uppercase text-[10px] tracking-widest transition-all">
                <i class="bi bi-arrow-left text-xl"></i> Dashboard
            </button>
            <span id="step-counter" class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">Loading...</span>
        </div>
        
        <div id="progress-bar-container" class="flex gap-1.5">
            </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-6 card-container">
        <div id="guide-card" class="guide-card w-full max-w-md bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[3.5rem] p-8 md:p-14 shadow-2xl flex flex-col justify-between hidden">
            
            <div class="space-y-8">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 md:w-16 md:h-16 bg-yellow-500 rounded-2xl flex items-center justify-center shadow-lg shadow-yellow-500/20 rotate-3">
                        <span id="current-order" class="text-black font-black text-xl md:text-2xl">1</span>
                    </div>
                    <div class="h-px flex-1 bg-slate-100 dark:bg-slate-800"></div>
                </div>

                <div class="space-y-4 fade-in">
                    <h1 id="card-title" class="text-4xl md:text-6xl font-black uppercase tracking-tighter text-indigo-600 dark:text-yellow-500 leading-none">
                        TITLE
                    </h1>
                    <div class="relative p-6 bg-slate-50 dark:bg-slate-800/40 rounded-[2rem] border-l-8 border-indigo-600">
                        <i class="bi bi-quote absolute top-2 right-4 text-4xl text-slate-200 dark:text-slate-700"></i>
                        <p id="card-verses" class="text-base md:text-xl font-medium italic text-slate-600 dark:text-slate-300 relative z-10">
                            Scripture text goes here.
                        </p>
                    </div>
                </div>

                <div class="fade-in" style="animation-delay: 0.1s;">
                    <div class="flex items-start gap-4 p-5 bg-indigo-50 dark:bg-indigo-900/10 border border-indigo-100 dark:border-indigo-900/30 rounded-2xl">
                        <div class="p-2 bg-indigo-600 rounded-lg">
                            <i class="bi bi-lightbulb-fill text-white text-sm"></i>
                        </div>
                        <div>
                            <p class="text-[10px] font-black text-indigo-600 dark:text-indigo-400 uppercase tracking-widest mb-1">Guidance</p>
                            <p id="card-guidance" class="text-xs md:text-sm font-bold text-slate-500 dark:text-slate-400 leading-relaxed uppercase">
                                Action steps...
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex gap-4 mt-12">
                <button id="prev-btn" onclick="changeStep(-1)" class="flex-1 py-5 bg-slate-100 dark:bg-slate-800 dark:text-slate-300 rounded-[1.5rem] font-black uppercase text-[10px] tracking-widest transition-all hover:bg-slate-200 dark:hover:bg-slate-700 disabled:opacity-30 active:scale-95">
                    Back
                </button>
                <button id="next-btn" onclick="changeStep(1)" class="flex-[2] py-5 bg-indigo-600 text-white rounded-[1.5rem] font-black uppercase text-[10px] tracking-widest shadow-xl shadow-indigo-500/20 transition-all hover:bg-indigo-700 active:scale-95">
                    Next Step <i class="bi bi-chevron-right ml-1"></i>
                </button>
            </div>
        </div>

        <div id="loading-state" class="text-center">
            <div class="animate-spin inline-block w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full mb-4"></div>
            <p class="text-sm font-bold text-slate-400 uppercase tracking-widest">Opening Guide...</p>
        </div>
    </main>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let guideData = [];
        let currentIndex = 0;

        // 1. SECURITY GATEKEEPER
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.replace("index.html"); // Boot unauthenticated users
                return;
            }
            
            const docSnap = await getDoc(doc(db, "profiles", user.uid));
            if (docSnap.exists() && docSnap.data().guideUrl) {
                loadSheet(docSnap.data().guideUrl);
            } else {
                alert("No guide link found. Add one in settings first.");
                window.location.href = "index.html";
            }
        });

        // 2. DATA FETCHING
        async function loadSheet(rawUrl) {
            try {
                // Regex to extract the ID and force CSV output
                const match = rawUrl.match(/\/d\/(.+?)\//);
                if (!match) throw new Error("Invalid URL");
                
                const exportUrl = `https://docs.google.com/spreadsheets/d/${match[1]}/gviz/tq?tqx=out:csv`;
                
                const response = await fetch(exportUrl);
                const csvText = await response.text();
                
                // Parse CSV with support for quoted commas
                const rows = csvText.split('\n').map(row => 
                    row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/"/g, '').trim())
                );
                
                rows.shift(); // Remove headers
                guideData = rows.map(r => ({
                    order: r[0],
                    title: r[1],
                    verses: r[2],
                    type: r[3],
                    guidance: r[4]
                })).filter(item => item.title); // Filter empty rows

                if (guideData.length === 0) throw new Error("Sheet is empty");

                document.getElementById('loading-state').remove();
                document.getElementById('guide-card').classList.remove('hidden');
                
                buildProgress();
                renderCard();
            } catch (err) {
                console.error(err);
                alert("Failed to load guide. Make sure the sheet is set to 'Anyone with the link can view'.");
                window.location.href = "index.html";
            }
        }

        // 3. UI RENDERING
        function renderCard() {
            const data = guideData[currentIndex];
            
            // UI Updates
            document.getElementById('current-order').innerText = data.order || (currentIndex + 1);
            document.getElementById('card-title').innerText = data.title;
            document.getElementById('card-verses').innerText = data.verses || "No verses listed.";
            document.getElementById('card-guidance').innerText = data.guidance || "Proceed to the next step.";
            document.getElementById('step-counter').innerText = `Step ${currentIndex + 1} of ${guideData.length}`;
            
            // Button States
            document.getElementById('prev-btn').disabled = currentIndex === 0;
            document.getElementById('next-btn').innerHTML = (currentIndex === guideData.length - 1) ? 
                'Finish <i class="bi bi-flag-fill ml-1"></i>' : 'Next Step <i class="bi bi-chevron-right ml-1"></i>';

            updateProgress();
        }

        window.changeStep = (dir) => {
            if (currentIndex + dir >= 0 && currentIndex + dir < guideData.length) {
                currentIndex += dir;
                renderCard();
            } else if (currentIndex + dir === guideData.length) {
                window.location.replace("index.html"); // End of guide
            }
        };

        function buildProgress() {
            const container = document.getElementById('progress-bar-container');
            container.innerHTML = '';
            guideData.forEach((_, i) => {
                const step = document.createElement('div');
                step.className = 'flex-1 step-inactive rounded-full';
                step.id = `bar-${i}`;
                container.appendChild(step);
            });
        }

        function updateProgress() {
            guideData.forEach((_, i) => {
                const bar = document.getElementById(`bar-${i}`);
                if (i <= currentIndex) {
                    bar.classList.replace('step-inactive', 'step-active');
                    if (i === currentIndex) bar.style.background = '#eab308'; // Highlight current
                    else bar.style.background = '#4f46e5'; // Indigo for completed
                } else {
                    bar.classList.replace('step-active', 'step-inactive');
                    bar.style.background = '';
                }
            });
        }

        // Initialize Theme
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
    </script>
</body>
</html>
