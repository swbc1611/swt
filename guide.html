<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulwinning Guide - SWT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .step-active { height: 4px; background: #6366f1; transition: width 0.3s ease; }
        .step-inactive { height: 4px; background: #1e293b; }
        .guide-card { border: 1px solid rgba(255,255,255,0.05); }

        /* Custom Scrollbar for Verse Box */
        #verse-scroll-area::-webkit-scrollbar { width: 4px; }
        #verse-scroll-area::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        #verse-scroll-area { scrollbar-width: thin; scrollbar-color: #6366f1 transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <button onclick="window.history.back()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 active:scale-90 transition-all mr-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-600 dark:text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 19l-7-7 7-7" /></svg>
            </button>
            <div class="flex items-center gap-2">
                <div class="w-10 h-8 bg-indigo-600 rounded-lg flex items-center justify-center overflow-hidden">
                    <span class="font-bold text-white text-[10px] leading-none text-center">SWT</span>
                </div>
                <h1 class="text-lg brand-text hidden sm:block"><span class="brand-word-1">Soulwinning</span><span class="brand-word-2">Tracker</span></h1>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span id="step-counter" class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Step 0 of 0</span>
        </div>
    </nav>

    <div class="w-full max-w-4xl mx-auto px-6 pt-6">
        <div id="progress-bar-container" class="flex gap-2"></div>
    </div>

    <main class="flex-1 flex items-center justify-center p-6">
        <div id="guide-card" class="guide-card w-full max-w-2xl bg-white dark:bg-slate-900 rounded-[2rem] p-8 md:p-12 shadow-2xl hidden flex flex-col gap-8">
            
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20 shrink-0">
                    <span id="current-order" class="text-white font-black text-2xl">1</span>
                </div>
                <h2 id="card-title" class="text-2xl md:text-4xl font-black uppercase tracking-tight text-slate-800 dark:text-white leading-tight">
                    Loading...
                </h2>
            </div>

            <div class="relative p-6 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border-l-4 border-indigo-500">
                <i class="bi bi-quote absolute top-2 right-4 text-3xl text-slate-200 dark:text-slate-700"></i>
                <div id="verse-scroll-area" class="max-height-[200px] overflow-y-auto pr-2">
                    <div id="card-verses" class="text-lg md:text-xl font-medium italic text-slate-600 dark:text-slate-300 relative z-10 leading-relaxed">
                        Scripture text goes here.
                    </div>
                </div>
            </div>

            <div class="p-5 bg-indigo-50 dark:bg-indigo-900/10 border border-indigo-100 dark:border-indigo-900/30 rounded-2xl flex items-start gap-4">
                <div class="p-2 bg-indigo-600 rounded-lg shrink-0">
                    <i class="bi bi-lightbulb-fill text-white text-sm"></i>
                </div>
                <div>
                    <p class="text-[10px] font-black text-indigo-600 dark:text-indigo-400 uppercase tracking-widest mb-1">Guidance</p>
                    <p id="card-guidance" class="text-xs md:text-sm font-bold text-slate-500 dark:text-slate-400 leading-relaxed uppercase">
                        Action steps...
                    </p>
                </div>
            </div>

            <div class="flex gap-4 pt-4">
                <button id="prev-btn" onclick="changeStep(-1)" 
                    class="flex-1 py-4 bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 rounded-xl font-bold uppercase text-xs tracking-widest transition-all 
                    hover:bg-slate-200 dark:hover:bg-slate-700 active:scale-95 disabled:opacity-30 disabled:pointer-events-none">
                    Back
                </button>
                
                <button id="next-btn" onclick="changeStep(1)" 
                    class="flex-[2] py-4 bg-indigo-600 text-white rounded-xl font-black uppercase text-xs tracking-widest transition-all 
                    hover:bg-indigo-700 hover:shadow-[0_8px_20px_rgba(99,102,241,0.3)] active:scale-95 shadow-lg shadow-indigo-500/20">
                    Next Step <i class="bi bi-chevron-right ml-1"></i>
                </button>
            </div>
        </div>

        <div id="loading-state" class="text-center">
            <div class="animate-spin inline-block w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full mb-4"></div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">Preparing Guide</p>
        </div>
    </main>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let guideData = [];
        let currentIndex = 0;

        onAuthStateChanged(auth, async (user) => {
            if (!user) return window.location.replace("index.html");
            const snap = await getDoc(doc(db, "profiles", user.uid));
            if (snap.exists() && snap.data().guideUrl) {
                loadSheet(snap.data().guideUrl);
            } else {
                window.location.replace("index.html");
            }
        });

        async function loadSheet(rawUrl) {
            try {
                const match = rawUrl.match(/\/d\/(.+?)\//);
                const exportUrl = `https://docs.google.com/spreadsheets/d/${match[1]}/gviz/tq?tqx=out:csv`;
                const response = await fetch(exportUrl);
                const csvText = await response.text();
                
                const rows = csvText.split('\n').map(row => 
                    row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/"/g, '').trim())
                );
                
                rows.shift();
                guideData = rows.map(r => ({
                    order: r[0], title: r[1], verses: r[2], type: r[3], guidance: r[4]
                })).filter(item => item.title);

                document.getElementById('loading-state').remove();
                document.getElementById('guide-card').classList.remove('hidden');
                buildProgress();
                renderCard();
            } catch (err) {
                console.error(err);
                window.location.replace("index.html");
            }
        }

        function renderCard() {
            const data = guideData[currentIndex];
            const verseContainer = document.getElementById('card-verses');
            
            document.getElementById('current-order').innerText = data.order || (currentIndex + 1);
            document.getElementById('card-title').innerText = data.title;
            
            // DELIMITER LOGIC (|)
            if (data.verses && data.verses.includes('|')) {
                const verseArray = data.verses.split('|');
                verseContainer.innerHTML = verseArray.map(v => 
                    `<div class="mb-4 last:mb-0 border-l-2 border-indigo-500/30 pl-4 py-1">${v.trim()}</div>`
                ).join('');
            } else {
                verseContainer.innerText = data.verses || "";
            }

            document.getElementById('card-guidance').innerText = data.guidance || "Continue to next step.";
            document.getElementById('step-counter').innerText = `Step ${currentIndex + 1} of ${guideData.length}`;
            
            document.getElementById('prev-btn').disabled = currentIndex === 0;
            
            if (currentIndex === guideData.length - 1) {
                document.getElementById('next-btn').innerHTML = 'Finish <i class="bi bi-check-lg ml-1"></i>';
            } else {
                document.getElementById('next-btn').innerHTML = 'Next Step <i class="bi bi-chevron-right ml-1"></i>';
            }

            // Scroll verse container back to top on new card
            document.getElementById('verse-scroll-area').scrollTop = 0;
            updateProgress();
        }

        window.changeStep = (dir) => {
            if (currentIndex + dir >= 0 && currentIndex + dir < guideData.length) {
                currentIndex += dir;
                renderCard();
            } else if (currentIndex + dir === guideData.length) {
                if (window.history.length > 1) {
                    window.history.back();
                } else {
                    window.location.replace("index.html");
                }
            }
        };

        function buildProgress() {
            const container = document.getElementById('progress-bar-container');
            container.innerHTML = '';
            guideData.forEach((_, i) => {
                const step = document.createElement('div');
                step.className = 'flex-1 step-inactive rounded-full';
                step.id = `bar-${i}`;
                container.appendChild(step);
            });
        }

        function updateProgress() {
            guideData.forEach((_, i) => {
                const bar = document.getElementById(`bar-${i}`);
                if (i <= currentIndex) {
                    bar.classList.replace('step-inactive', 'step-active');
                    bar.style.background = (i === currentIndex) ? '#6366f1' : '#312e81';
                } else {
                    bar.classList.replace('step-active', 'step-inactive');
                    bar.style.background = '';
                }
            });
        }

        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
    </script>
</body>
</html>
