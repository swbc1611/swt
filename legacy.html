<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Church Legacy - Soulwinning Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>        
        button, .preset-btn, .type-btn, [role="button"] {
            transition: all 0.2s ease-in-out !important;
        }
        button:active, .preset-btn:active, .type-btn:active, [role="button"]:active {
            transform: scale(0.95) !important;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.7) !important;
            outline: none !important;
        }
        input, select, textarea {
            background: rgba(245, 158, 11, 0.05) !important; 
            border: 1px solid rgba(245, 158, 11, 0.1) !important;
            outline: none !important;
            transition: all 0.2s ease;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #f59e0b !important;
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1) !important;
        }
        /* Surgical Fix: Hiding default number spinners */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-2">
            <button onclick="window.history.back()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all mr-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-600 dark:text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 19l-7-7 7-7" /></svg>
            </button>
            <div class="w-10 h-8 bg-indigo-600 rounded-lg flex items-center justify-center overflow-hidden">
                <span class="font-bold text-white text-[10px] leading-none text-center">SWT</span>
            </div>
            <h1 class="text-lg brand-text"><span class="brand-word-1">Soulwinning</span><span class="brand-word-2">Tracker</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all">
                <svg id="sun-icon" class="w-5 h-5 hidden text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
                <svg id="moon-icon" class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 pb-32 text-center">
        <header class="mb-10">
            <div id="role-display" class="badge-base badge-role mb-2 uppercase text-[10px] tracking-widest font-bold">PASTOR</div>
            <h2 id="user-display-name" class="text-4xl font-extrabold tracking-tight mb-3">...</h2>
            <div id="church-list-tags" class="flex flex-wrap justify-center gap-2 mt-2"></div>
            
            <h3 class="text-2xl font-bold mt-8 text-amber-500 uppercase tracking-tighter">Church Legacy</h3>
            <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest font-bold">Institutional Data Sync</p>
        </header>

        <div class="bg-white dark:bg-slate-900 border-2 border-amber-500/20 rounded-[2.5rem] p-8 shadow-sm mb-10 max-w-sm mx-auto">
            <div class="space-y-8">
                <div class="flex flex-col gap-2 text-left">
                    <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest ml-2 text-center">Period Selection</label>
                    <input id="histPeriod" type="month" class="p-4 rounded-2xl bg-slate-50 dark:bg-[#1e293b] border dark:border-slate-700 dark:text-white font-bold text-sm outline-none text-center uppercase tracking-widest">
                </div>

                <div class="flex flex-col gap-2">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 tracking-widest ml-2">Salvation Total</label>
                    <div class="flex items-center justify-between mb-6 bg-slate-50 dark:bg-[#1e293b] p-3 rounded-3xl border dark:border-slate-700/50">
                        <button onclick="stepCount(-10)" class="w-14 h-14 flex-shrink-0 rounded-2xl bg-white dark:bg-slate-700 font-bold text-xl hover:bg-slate-100 dark:text-white transition-all active:scale-95 flex items-center justify-center shadow-sm border dark:border-slate-600">-</button>
                        
                        <input id="histCount" type="number" value="0" min="0" max="99999"
                            class="w-full text-center text-5xl font-light bg-transparent text-amber-500 outline-none"
                            oninput="limitInput(this)">
                        
                        <button onclick="stepCount(10)" class="w-14 h-14 flex-shrink-0 rounded-2xl bg-amber-500 text-white font-bold text-xl hover:bg-amber-600 transition-all active:scale-95 flex items-center justify-center shadow-lg shadow-amber-500/30">+</button>
                    </div>
                </div>

                <div class="flex flex-col gap-2 text-left">
                    <label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest ml-2 text-center">Reference Note</label>
                    <textarea id="histNote" placeholder="Notes (e.g., Logbook 2018)" class="p-4 rounded-2xl bg-slate-50 dark:bg-[#1e293b] border dark:border-slate-700 dark:text-white text-xs italic resize-none h-20 outline-none"></textarea>
                </div>

                <button id="saveBtn" onclick="saveLegacyData()" class="w-full py-5 bg-amber-500 text-white rounded-2xl font-black uppercase text-[11px] tracking-widest shadow-lg shadow-amber-500/30 active:scale-95 transition-all">
                    Update Church Record
                </button>
            </div>
        </div>

        <div class="w-full py-4 text-center">
            <label class="text-[12px] font-black text-slate-400 uppercase tracking-[0.4em] block leading-none">Record Ledger</label>
        </div>

        <div id="legacy-list" class="w-full space-y-4 mt-6">
            <div class="text-center py-20 text-slate-400 italic font-bold uppercase tracking-widest text-[10px]">Gathering history...</div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-amber-600 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-500 z-[150] pointer-events-none text-sm font-bold"></div>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, setDoc, getDocs, deleteDoc, collection, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let userProfile = JSON.parse(sessionStorage.getItem('userContext') || "{}");

        // SURGICAL THEME INITIALIZATION (Zero-Regression)
        const initTheme = () => {
            const isDark = localStorage.getItem('theme') === 'dark' || 
                          (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
            const html = document.getElementById('main-html');
            const sun = document.getElementById('sun-icon');
            const moon = document.getElementById('moon-icon');

            if (isDark) {
                html.classList.add('dark');
                if(sun) sun.classList.remove('hidden');
                if(moon) moon.classList.add('hidden');
            } else {
                html.classList.remove('dark');
                if(sun) sun.classList.add('hidden');
                if(moon) moon.classList.remove('hidden');
            }
        };
        initTheme();

        // Initialization of Values
        const now = new Date();
        document.getElementById('histPeriod').value = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

        window.toggleDarkMode = () => {
            const html = document.getElementById('main-html');
            const sun = document.getElementById('sun-icon');
            const moon = document.getElementById('moon-icon');
            const isDark = html.classList.toggle('dark');
            if(sun) sun.classList.toggle('hidden', !isDark);
            if(moon) moon.classList.toggle('hidden', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        window.stepCount = (val) => {
            const el = document.getElementById('histCount');
            const newVal = (parseInt(el.value) || 0) + val;
            el.value = newVal < 0 ? 0 : newVal;
        };

        window.limitInput = (el) => {
            let val = parseInt(el.value);
            if (val < 0 || isNaN(val)) el.value = 0;
            if (val > 99999) el.value = 99999;
        };

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                t.classList.remove('opacity-100', 'translate-y-0');
                t.classList.add('opacity-0', 'translate-y-10');
            }, 3000);
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user || userProfile.role !== 'pastor') { window.location.replace("index.html"); return; }
            document.getElementById('user-display-name').innerText = userProfile.displayName;
            
            const tagContainer = document.getElementById('church-list-tags');
            let tagsHtml = "";
            Object.values(userProfile.churchNames || {}).forEach(name => {
                tagsHtml += `<span class="bg-amber-100 dark:bg-amber-900/30 text-amber-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase">${name}</span>`;
            });
            tagContainer.innerHTML = tagsHtml;

            loadLegacyList();
        });

        window.saveLegacyData = async () => {
            const periodValue = document.getElementById('histPeriod').value;
            if(!periodValue) return showToast("⚠️ Select a period");
            
            const [year, month] = periodValue.split('-').map(n => parseInt(n));
            const count = parseInt(document.getElementById('histCount').value);
            const note = document.getElementById('histNote').value.trim();

            if (!count || count < 1) return showToast("⚠️ Valid count required");

            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.innerText = "SAVING...";

            try {
                const docId = `${userProfile.churchId[0]}_${year}_${month}`;
                await setDoc(doc(db, "churchHistoricalTotals", docId), {
                    churchId: userProfile.churchId[0],
                    month, year, salvationCount: count, note,
                    type: "Legacy", // Categorized as Legacy for Reporting
                    updatedBy: auth.currentUser.uid,
                    lastUpdated: serverTimestamp()
                }, { merge: true });

                showToast("✅ Record Updated");
                loadLegacyList();
                document.getElementById('histCount').value = "0";
                document.getElementById('histNote').value = "";
            } catch (e) { showToast("❌ Sync Error"); }
            finally { btn.disabled = false; btn.innerText = "UPDATE CHURCH RECORD"; }
        };

        window.loadLegacyList = async () => {
            const list = document.getElementById('legacy-list');
            const churchId = userProfile.churchId[0];
            try {
                const q = query(collection(db, "churchHistoricalTotals"), where("churchId", "==", churchId));
                const snap = await getDocs(q);
                let html = "";
                const docs = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (b.year - a.year) || (b.month - a.month));
                docs.forEach(d => {
                    const mName = new Date(2000, d.month - 1).toLocaleString('en-US', {month:'long'});
                    html += `
                        <div class="bg-white dark:bg-slate-900 p-6 rounded-[2.5rem] border dark:border-slate-800 flex items-center justify-between shadow-sm border-l-4 border-amber-500">
                            <div class="text-left">
                                <h4 class="text-[10px] font-black uppercase tracking-widest text-slate-400">${mName} ${d.year}</h4>
                                <p class="text-2xl font-black text-amber-500">${d.salvationCount.toLocaleString()}</p>
                                ${d.note ? `<p class="text-[10px] text-slate-500 italic mt-1 truncate max-w-[200px]">"${d.note}"</p>` : ''}
                            </div>
                            <button onclick="deleteLegacy('${d.id}')" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-red-500/10 text-red-500 active:scale-90 transition-all border border-red-500/10">
                                <i class="bi bi-trash3-fill"></i>
                            </button>
                        </div>`;
                });
                list.innerHTML = html || `<p class="text-center py-20 opacity-30 uppercase font-black text-[10px] tracking-widest">No history recorded</p>`;
            } catch(e) { list.innerHTML = "Load Error"; }
        };

        window.deleteLegacy = async (id) => {
            if(!confirm("Permanently remove this historical record?")) return;
            try {
                await deleteDoc(doc(db, "churchHistoricalTotals", id));
                showToast("🗑️ Record Removed");
                loadLegacyList();
            } catch(e) { showToast("Delete Error"); }
        };
    </script>
</body>
</html>
