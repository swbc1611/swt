<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member - Soulwinning Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>tailwind.config = { darkMode: 'class' }</script>

    <style>        
        button, 
        .preset-btn, 
        .type-btn,
        [role="button"] {
            transition: all 0.2s ease-in-out !important;
        }
        
        button:active, 
        .preset-btn:active, 
        .type-btn:active,
        [role="button"]:active {
            transform: scale(0.95) !important;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.7) !important;
            outline: none !important;
        }
        
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-2">
            <div class="w-10 h-8 bg-indigo-600 rounded-lg flex items-center justify-center overflow-hidden">
                <span class="font-bold text-white text-[10px] leading-none text-center">SWT</span>
            </div>
            <h1 class="text-lg brand-text"><span class="brand-word-1">Soulwinning</span><span class="brand-word-2">Tracker</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all">
                <svg id="sun-icon" class="w-5 h-5 hidden text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
                <svg id="moon-icon" class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
            </button>
            <button onclick="handleLogout()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:text-red-500 transition-all ml-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 pb-40 text-center">
        <header class="mb-10">
            <div id="role-display" class="badge-base badge-role mb-2 uppercase tracking-widest font-bold">MEMBER</div>
            
            <div class="flex items-center justify-center gap-2 mb-3">
                <h2 id="user-display-name" class="text-4xl font-extrabold tracking-tight">...</h2>
                <button onclick="openNameModal()" class="ml-2 w-8 h-8 inline-flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 border border-slate-200 dark:border-slate-700 transition-all active:scale-90">
                    <i class="bi bi-pencil-fill text-[12px]"></i>
                </button>
            </div>

            <div id="church-list-tags" class="flex flex-wrap justify-center gap-2 mt-2"></div>
            
            <div class="mt-10 max-w-sm mx-auto space-y-8">
                <div>
                    <label class="block text-[12px] font-bold text-slate-400 uppercase mb-3 tracking-widest">Personal</label>
                    <div class="p-8 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[3rem] shadow-sm flex flex-col gap-4">
                        <button onclick="window.location.href='prospects.html'" class="w-full flex items-center justify-center gap-3 py-4 bg-indigo-600 text-white rounded-2xl text-[10px] font-black uppercase transition-all shadow-lg shadow-indigo-500/30 active:scale-95">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                            </svg>
                            Record Prospect Contacts
                        </button>

                        <button onclick="window.location.href='history.html'" class="w-full flex items-center justify-center gap-2 py-4 bg-indigo-600 text-white rounded-2xl text-[10px] font-bold uppercase transition-all shadow-lg shadow-indigo-500/30 active:scale-95">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>
                            My History
                        </button>

                        <button onclick="window.location.href='avatar.html'" class="w-full flex items-center justify-center gap-2 py-4 bg-amber-500 text-white rounded-2xl text-[10px] font-bold uppercase transition-all shadow-lg shadow-amber-500/20 active:scale-95">
                            <i class="bi bi-star-fill text-sm"></i>
                            Achievements
                        </button>

                        <button onclick="openPassModal()" class="w-full flex items-center justify-center gap-2 py-4 bg-indigo-800 text-slate-500 dark:text-slate-400 rounded-2xl text-[10px] font-bold uppercase transition-all active:scale-95">
                            <i class="bi bi-key-fill"></i> Change Account Password
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-[12px] font-bold text-slate-400 uppercase mb-3 tracking-widest">Tools</label>
                    <div class="p-8 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[3rem] shadow-sm flex flex-col gap-4">
                        <div class="w-full flex items-stretch bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-500/30 overflow-hidden group active:scale-95 transition-all">
                            <button onclick="goToGuide()" class="flex-1 flex items-center justify-center gap-2.5 py-4 text-white text-[10px] font-black uppercase tracking-widest transition-all">
                                <i class="bi bi-book-half text-sm"></i>
                                Soulwinning Guide
                            </button>
                            
                            <button onclick="openGuideSettings()" class="w-16 flex items-center justify-center bg-indigo-700 text-white/70 hover:text-white border-l border-indigo-500/30 transition-all">
                                <i class="bi bi-gear-fill text-lg"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </header>
    </main>

    <div class="fixed bottom-0 left-0 right-0 z-[100] bg-white/80 dark:bg-[#0f172a]/80 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800 px-6 py-4">
        <div class="max-w-4xl mx-auto flex justify-center items-center">
            <button onclick="openModal()" class="relative flex items-center justify-center w-16 h-16 bg-indigo-600 text-white rounded-full shadow-[0_8px_30px_rgb(79,70,229,0.4)] hover:shadow-[0_8px_40px_rgb(79,70,229,0.6)] active:scale-90 transition-all duration-300">
                <i class="bi bi-plus-lg text-3xl"></i>
                <span class="absolute inset-0 rounded-full bg-indigo-500 animate-ping opacity-20"></span>
            </button>
        </div>
    </div>

    <div id="nameModal" class="hidden fixed inset-0 z-[150] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-slate-900 border dark:border-slate-800 w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-center">
            <h2 class="text-xl font-bold dark:text-white mb-2">Edit Display Name</h2>
            <input id="newNameInput" type="text" placeholder="Your Name" maxlength="20" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl outline-none text-sm dark:text-white mb-4">
            <div class="flex gap-2">
                <button onclick="closeNameModal()" class="flex-1 py-3 text-slate-500 font-bold text-xs uppercase tracking-widest">Cancel</button>
                <button id="saveNameBtn" onclick="saveDisplayName()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg">Save</button>
            </div>
        </div>
    </div>

    <div id="guideSettingsModal" class="hidden fixed inset-0 z-[150] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-slate-900 border dark:border-slate-800 w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-center">
            <h2 class="text-xl font-bold dark:text-white mb-2">Guide Settings</h2>
            <p class="text-[10px] text-slate-400 mb-6 uppercase tracking-widest">Paste your Google Sheets URL</p>
            <input id="guideUrlInput" type="text" placeholder="https://docs.google.com/spreadsheets/d/..." class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl outline-none text-[10px] dark:text-white mb-4">
            <div class="flex gap-2">
                <button onclick="closeGuideSettings()" class="flex-1 py-3 text-slate-500 font-bold text-xs uppercase tracking-widest">Cancel</button>
                <button id="saveGuideBtn" onclick="saveGuideUrl()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg">Save URL</button>
            </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6 hidden z-[120]">
        <div class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 border dark:border-slate-800 text-center shadow-2xl">
            <h3 class="text-xl font-bold mb-6 dark:text-white">Log Salvation</h3>
            <div class="mb-4 text-left">
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 tracking-widest ml-2 text-center">Soulwinning Type</label>
                <select id="soulType" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl text-sm outline-none dark:text-white font-bold">
                    <option value="" disabled selected>Select Type...</option><option value="Regular">Regular</option><option value="School">School</option><option value="Event">Event</option>
                </select>
            </div>
            <div class="flex items-center justify-between mb-6 bg-slate-50 dark:bg-slate-800/50 p-3 rounded-3xl">
                <button onclick="decrement()" class="w-14 h-14 flex-shrink-0 rounded-2xl bg-white dark:bg-slate-700 font-bold text-xl hover:bg-slate-100 dark:text-white transition-all active:scale-95 flex items-center justify-center">-</button>
                
                <input id="soulCount" type="number" value="1" min="1" max="999"
                    class="w-full text-center text-5xl font-light bg-transparent text-indigo-600 outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none"
                    oninput="limitInput(this)">
                
                <button onclick="increment()" class="w-14 h-14 flex-shrink-0 rounded-2xl bg-indigo-600 text-white font-bold text-xl hover:bg-indigo-700 transition-all active:scale-95 flex items-center justify-center">+</button>
            </div>
            <input id="soulDateTime" type="datetime-local" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl text-sm mb-4 outline-none dark:text-white">
            <input id="soulNote" type="text" placeholder="Notes..." class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl text-sm mb-8 outline-none dark:text-white">
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-4 text-slate-400 font-bold uppercase text-xs">Cancel</button>
                <button id="submit-btn" onclick="handleDataSubmit()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold uppercase text-xs">Submit</button>
            </div>
        </div>
    </div>

    <div id="pass-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6 hidden z-[120]">
        <div class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 border dark:border-slate-800 text-center shadow-2xl">
            <h3 class="text-xl font-bold mb-6 dark:text-white text-center ml-2">Update Password</h3>
            <div class="space-y-4">
                <input id="oldPass" type="password" placeholder="Current Password" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl text-sm outline-none dark:text-white font-medium">
                <input id="newPass" type="password" placeholder="New Password" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl text-sm outline-none dark:text-white font-medium">
                <input id="confirmPass" type="password" placeholder="Confirm New Password" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl text-sm outline-none dark:text-white font-medium">
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="closePassModal()" class="flex-1 py-4 text-slate-400 font-bold uppercase text-[10px]">Cancel</button>
                <button id="pass-btn" onclick="handlePassUpdate()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold uppercase text-[10px]">Update</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-500 z-[150] pointer-events-none text-sm font-bold"></div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut, EmailAuthProvider, reauthenticateWithCredential, updatePassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, collection, setDoc, updateDoc, arrayUnion, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let userProfile = null;

        const initTheme = () => {
            const isDark = localStorage.getItem('theme') === 'dark';
            if (isDark) {
                document.getElementById('main-html').classList.add('dark');
                document.getElementById('sun-icon').classList.remove('hidden');
                document.getElementById('moon-icon').classList.add('hidden');
            }
        };
        initTheme();

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-10'), 3000);
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { sessionStorage.clear(); window.location.replace("index.html"); return; }
            try {
                const snap = await getDoc(doc(db, "profiles", user.uid));
                if (!snap.exists()) { window.location.replace("index.html"); return; }
                userProfile = snap.data();
                if (userProfile.status === 'inactive') {
                    await signOut(auth); sessionStorage.clear(); window.location.replace("index.html"); return;
                }
                if (userProfile.role !== 'member') { window.location.replace("pastor.html"); return; }

                let churchNames = {};
                for(const code of (userProfile.churchId || [])) {
                    const d = await getDoc(doc(db, "churches", code));
                    if(d.exists()) churchNames[code] = d.data().name;
                }

                sessionStorage.setItem('userContext', JSON.stringify({ ...userProfile, churchNames }));
                renderProfileUI(userProfile, churchNames);
            } catch (e) { console.error(e); window.location.replace("index.html"); }
        });

        function renderProfileUI(profile, namesMap = null) {
            document.getElementById('user-display-name').innerText = profile.displayName || "Soulwinner";
            document.getElementById('role-display').innerText = profile.role.toUpperCase();
            const tagContainer = document.getElementById('church-list-tags');
            const dataToUse = namesMap || profile.churchNames;
            let tagsHtml = "";
            if (dataToUse && Object.keys(dataToUse).length > 0) {
                Object.values(dataToUse).forEach(name => {
                    tagsHtml += `<span class="bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase">${name}</span>`;
                });
            } else {
                tagsHtml = `<span class="text-slate-500 text-[10px]">No Church Assigned</span>`;
            }
            tagContainer.innerHTML = tagsHtml;
        }

        // --- NAME MODAL LOGIC ---
        window.openNameModal = () => {
            document.getElementById('newNameInput').value = userProfile.displayName || "";
            document.getElementById('nameModal').classList.remove('hidden');
        };
        window.closeNameModal = () => document.getElementById('nameModal').classList.add('hidden');
        window.saveDisplayName = async () => {
            const newName = document.getElementById('newNameInput').value.trim();
            if (!newName) return showToast("Name required.");
            
            const btn = document.getElementById('saveNameBtn');
            btn.innerText = "SAVING..."; btn.disabled = true;
            
            try {
                await updateDoc(doc(db, "profiles", auth.currentUser.uid), { displayName: newName });
                userProfile.displayName = newName;
                sessionStorage.setItem('userContext', JSON.stringify(userProfile));
                document.getElementById('user-display-name').innerText = newName;
                showToast("Name updated! ✓");
                closeNameModal();
            } catch (e) { 
                showToast("Error updating name."); 
            }
            finally { 
                btn.innerText = "SAVE"; 
                btn.disabled = false; 
            }
        };

        // --- GUIDE LOGIC ---
        window.openGuideSettings = () => {
            document.getElementById('guideUrlInput').value = userProfile.guideUrl || "";
            document.getElementById('guideSettingsModal').classList.remove('hidden');
        };
        window.closeGuideSettings = () => document.getElementById('guideSettingsModal').classList.add('hidden');
        window.saveGuideUrl = async () => {
            const url = document.getElementById('guideUrlInput').value.trim();
            if (!url) return showToast("⚠️ URL required.");

            const btn = document.getElementById('saveGuideBtn');
            btn.disabled = true;
            btn.innerText = "SAVING...";

            try {
                // 1. Update Firestore first
                await updateDoc(doc(db, "profiles", auth.currentUser.uid), { guideUrl: url });
                
                // 2. SURGICAL FIX: Directly update the global userProfile variable
                userProfile.guideUrl = url;
                
                // 3. SURGICAL FIX: Merge with existing sessionStorage to prevent data loss
                const existingData = JSON.parse(sessionStorage.getItem('userContext') || "{}");
                const mergedData = { ...existingData, ...userProfile, guideUrl: url };
                
                sessionStorage.setItem('userContext', JSON.stringify(mergedData));
                
                // 4. Update the local variable again to ensure absolute parity
                userProfile = mergedData;

                showToast("✅ Guide URL saved & synced!");
                closeGuideSettings();
            } catch (e) { 
                console.error("Sync Failure:", e);
                showToast("❌ Error saving URL."); 
            } finally {
                btn.disabled = false;
                btn.innerText = "Save URL";
            }
        };

        window.goToGuide = () => {
            // Check session storage directly as a fallback to ensure zero-failure
            const sessionContext = JSON.parse(sessionStorage.getItem('userContext') || "{}");
            const finalUrl = userProfile?.guideUrl || sessionContext.guideUrl;

            if (!finalUrl) return showToast("⚠️ No guides saved yet.");
            window.location.href = "guide.html";
        };

        window.toggleDarkMode = () => { 
            const isDark = document.getElementById('main-html').classList.toggle('dark'); 
            document.getElementById('sun-icon').classList.toggle('hidden', !isDark);
            document.getElementById('moon-icon').classList.toggle('hidden', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light'); 
        };

        window.handlePassUpdate = async () => {
            const oldP = document.getElementById('oldPass').value;
            const newP = document.getElementById('newPass').value;
            const confP = document.getElementById('confirmPass').value;
            const btn = document.getElementById('pass-btn');

            if(!oldP || !newP) return showToast("Fill all fields.");
            if(newP !== confP) return showToast("Passwords mismatch.");
            if(newP.length < 6) return showToast("Min 6 chars.");

            btn.innerText = "Processing..."; btn.disabled = true;
            try {
                const cred = EmailAuthProvider.credential(auth.currentUser.email, oldP);
                await reauthenticateWithCredential(auth.currentUser, cred);
                await updatePassword(auth.currentUser, newP);
                showToast("Password updated.");
                closePassModal();
            } catch(e) { 
                showToast(e.code === 'auth/wrong-password' ? "Wrong current password." : "Update failed.");
            } finally { btn.innerText = "Update"; btn.disabled = false; }
        };

        // SURGICAL UPDATE: Type-Sensitive Bucket Logging
        window.handleDataSubmit = async () => {
            const type = document.getElementById('soulType').value;
            if (!type) return showToast("Please select a soulwinning type.");
            const btn = document.getElementById('submit-btn'); 
            btn.innerText = "Saving..."; 
            btn.disabled = true;
            try {
                const uid = auth.currentUser.uid;
                const churchId = userProfile.churchId[0];
                const eventDateStr = document.getElementById('soulDateTime').value;
                const dateId = eventDateStr.split('T')[0];
                const monthId = dateId.substring(0, 7);

                await addDoc(collection(db, "salvations"), {
                    count: Number(document.getElementById('soulCount').value),
                    type,
                    note: document.getElementById('soulNote').value,
                    eventDate: eventDateStr,
                    userId: uid,
                    churchId,
                    timestamp: serverTimestamp()
                });

                // Update type-specific members array (e.g., Regular_members)
                const typeKey = `${type}_members`;
                const statsUpdate = {};
                statsUpdate[typeKey] = arrayUnion(uid);

                await setDoc(doc(db, `churches/${churchId}/daily_stats`, dateId), statsUpdate, { merge: true });
                await setDoc(doc(db, `churches/${churchId}/monthly_stats`, monthId), statsUpdate, { merge: true });

                closeModal();
                showToast("Record Saved. Thank you.");
            } catch(e) { 
                showToast("Error saving record."); 
            } finally { 
                btn.innerText = "Submit"; btn.disabled = false; 
            }
        };

        window.handleLogout = () => signOut(auth).then(() => { sessionStorage.clear(); window.location.replace("index.html"); });
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        window.openModal = () => { 
            document.getElementById('modal').classList.remove('hidden'); 
            document.getElementById('soulCount').value = 1; 
            document.getElementById('soulType').value = ""; 
            document.getElementById('soulDateTime').value = new Date(Date.now() - new Date().getTimezoneOffset()*60000).toISOString().slice(0, 16); 
            document.getElementById('soulNote').value = ""; 
        };
        window.openPassModal = () => document.getElementById('pass-modal').classList.remove('hidden');
        window.closePassModal = () => document.getElementById('pass-modal').classList.add('hidden');
        window.limitInput = (el) => {
            let val = parseInt(el.value);
            if (val > 999) el.value = 999; // Force cap at 999
            if (val < 1) el.value = 1;      // Force minimum at 1
        };
        
        window.increment = () => {
            const el = document.getElementById('soulCount');
            const current = parseInt(el.value) || 0;
            if (current < 999) {
                el.value = current + 1;
            } else {
                showToast("Maximum limit reached"); // Optional [Inference]
            }
        };
        
        window.decrement = () => {
            const el = document.getElementById('soulCount');
            const current = parseInt(el.value) || 0;
            if (current > 1) {
                el.value = current - 1;
            }
        };
    </script>
</body>
</html>
