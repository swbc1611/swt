<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Soulwinning Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <meta name="referrer" content="no-referrer">
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 min-h-screen flex items-center justify-center p-6 transition-colors duration-300">

    <div id="reset-card" class="w-full max-w-sm bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[3rem] p-8 shadow-2xl text-center">
        <div class="mb-8">
            <div class="w-12 h-10 bg-indigo-600 rounded-xl flex items-center justify-center mx-auto mb-4">
                <span class="font-bold text-white text-xs">SWT</span>
            </div>
            <h2 class="text-2xl font-black tracking-tight">New Password</h2>
            <p id="user-email" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2">Verifying Request...</p>
        </div>

        <div id="form-container" class="hidden space-y-4">
            <div class="text-left">
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-2 tracking-widest">New Password</label>
                <input type="password" id="new-password" placeholder="••••••••" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl text-sm outline-none dark:text-white">
            </div>
            <div class="text-left">
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-2 tracking-widest">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="••••••••" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl text-sm outline-none dark:text-white">
            </div>
            
            <button id="submit-reset" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold uppercase text-xs shadow-lg shadow-indigo-500/30 active:scale-95 transition-all mt-4">
                Update Password
            </button>
        </div>

        <div id="status-message" class="py-10">
            <div class="animate-spin inline-block w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full mb-4"></div>
            <p class="text-sm text-slate-400 italic">Validating secure token...</p>
        </div>

        <div id="success-container" class="hidden py-6">
            <div class="w-16 h-16 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="bi bi-check-lg text-3xl"></i>
            </div>
            <h3 class="text-lg font-bold mb-2">Password Updated</h3>
            <p class="text-sm text-slate-400 mb-8">You can now sign in with your new credentials.</p>
            <button onclick="window.location.href='index.html'" class="w-full py-4 bg-slate-100 dark:bg-slate-800 rounded-2xl font-bold uppercase text-xs">
                Back to Login
            </button>
        </div>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { verifyPasswordResetCode, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const urlParams = new URLSearchParams(window.location.search);
        const oobCode = urlParams.get('oobCode');

        const formContainer = document.getElementById('form-container');
        const statusMessage = document.getElementById('status-message');
        const successContainer = document.getElementById('success-container');
        const emailLabel = document.getElementById('user-email');

        // 1. Initial Validation (Security Check)
        if (!oobCode) {
            statusMessage.innerHTML = `<p class="text-red-500 font-bold">Invalid link. Please request a new one.</p>`;
        } else {
            verifyPasswordResetCode(auth, oobCode)
                .then((email) => {
                    emailLabel.innerText = email;
                    statusMessage.classList.add('hidden');
                    formContainer.classList.remove('hidden');
                })
                .catch((error) => {
                    statusMessage.innerHTML = `<p class="text-red-500 font-bold text-sm">This link has expired or has already been used.</p>`;
                });
        }

        // 2. Submit Logic
        document.getElementById('submit-reset').onclick = async () => {
            const newPass = document.getElementById('new-password').value;
            const confirmPass = document.getElementById('confirm-password').value;

            if (newPass.length < 6) return alert("Password must be at least 6 characters.");
            if (newPass !== confirmPass) return alert("Passwords do not match.");

            try {
                await confirmPasswordReset(auth, oobCode, newPass);
                formContainer.classList.add('hidden');
                successContainer.classList.remove('hidden');
                emailLabel.classList.add('hidden');
            } catch (error) {
                alert("Error resetting password: " + error.message);
            }
        };
    </script>
</body>
</html>
