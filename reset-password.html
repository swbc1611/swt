<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Soulwinning Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <style>        
        button, 
        .preset-btn, 
        .type-btn,
        [role="button"] {
            transition: all 0.2s ease-in-out !important;
        }
        
        button:active, 
        .preset-btn:active, 
        .type-btn:active,
        [role="button"]:active {
            transform: scale(0.95) !important;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.7) !important;
            outline: none !important;
        }
        
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 min-h-screen flex items-center justify-center p-6 transition-colors duration-300">

    <div id="reset-card" class="w-full max-w-sm bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[3rem] p-8 shadow-2xl text-center">
        <div class="mb-8">
            <div class="w-16 h-14 bg-indigo-600 rounded-[1.25rem] flex items-center justify-center mx-auto mb-6 shadow-xl shadow-indigo-500/20">
                <span class="font-bold text-white text-xl">SWT</span>
            </div>
            <h2 class="text-2xl font-black tracking-tight dark:text-white">New Password</h2>
            <p id="user-email" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-2 px-4 py-1 bg-slate-100 dark:bg-slate-800 rounded-full inline-block">Verifying Request...</p>
        </div>

        <div id="form-container" class="hidden space-y-4">
            <div class="text-left">
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-4 tracking-widest">New Password</label>
                <input type="password" id="new-password" placeholder="••••••••" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl text-sm outline-none dark:text-white focus:border-indigo-500 transition-all">
            </div>
            <div class="text-left">
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-4 tracking-widest">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="••••••••" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl text-sm outline-none dark:text-white focus:border-indigo-500 transition-all">
            </div>
            
            <button id="submit-reset" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold uppercase text-xs shadow-lg shadow-indigo-500/30 hover:bg-indigo-700 active:scale-95 transition-all mt-4">
                Update Password
            </button>
        </div>

        <div id="status-message" class="py-10">
            <div class="animate-spin inline-block w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full mb-4"></div>
            <p class="text-sm text-slate-400 italic">Validating secure token...</p>
        </div>

        <div id="success-container" class="hidden py-6">
            <div class="w-16 h-16 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="bi bi-check-lg text-3xl"></i>
            </div>
            <h3 class="text-lg font-bold mb-2 dark:text-white">Password Updated</h3>
            <p class="text-sm text-slate-400 mb-8">You can now sign in with your new credentials.</p>
            <button onclick="window.location.href='index.html'" class="w-full py-4 bg-slate-100 dark:bg-slate-800 dark:text-white rounded-2xl font-bold uppercase text-xs hover:bg-slate-200 dark:hover:bg-slate-700 transition-all">
                Back to Login
            </button>
        </div>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { verifyPasswordResetCode, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Extract oobCode from the URL provided by the Switchboard in index.html
        const urlParams = new URLSearchParams(window.location.search);
        const oobCode = urlParams.get('oobCode');

        const formContainer = document.getElementById('form-container');
        const statusMessage = document.getElementById('status-message');
        const successContainer = document.getElementById('success-container');
        const emailLabel = document.getElementById('user-email');

        // Dark mode support from localStorage
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        // 1. Initial Validation
        if (!oobCode) {
            statusMessage.innerHTML = `<p class="text-red-500 font-bold">Invalid or missing link. Please request a new reset email.</p>`;
        } else {
            verifyPasswordResetCode(auth, oobCode)
                .then((email) => {
                    emailLabel.innerText = email;
                    statusMessage.classList.add('hidden');
                    formContainer.classList.remove('hidden');
                })
                .catch((error) => {
                    console.error(error);
                    statusMessage.innerHTML = `<p class="text-red-500 font-bold text-sm">This link has expired or has already been used.</p>`;
                });
        }

        // 2. Submit Logic
        document.getElementById('submit-reset').onclick = async () => {
            const btn = document.getElementById('submit-reset');
            const newPass = document.getElementById('new-password').value;
            const confirmPass = document.getElementById('confirm-password').value;

            if (newPass.length < 6) return alert("Password must be at least 6 characters.");
            if (newPass !== confirmPass) return alert("Passwords do not match.");

            btn.innerText = "UPDATING...";
            btn.disabled = true;

            try {
                await confirmPasswordReset(auth, oobCode, newPass);
                formContainer.classList.add('hidden');
                successContainer.classList.remove('hidden');
                emailLabel.classList.add('hidden');
            } catch (error) {
                btn.innerText = "UPDATE PASSWORD";
                btn.disabled = false;
                alert("Error: " + error.message);
            }
        };
    </script>
</body>
</html>
