<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulwinning Tracker - Superadmin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>tailwind.config = { darkMode: 'class' }</script>

    <style>        
        button, 
        .preset-btn, 
        .type-btn,
        [role="button"] {
            transition: all 0.2s ease-in-out !important;
        }
        
        button:active, 
        .preset-btn:active, 
        .type-btn:active,
        [role="button"]:active {
            transform: scale(0.95) !important;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.7) !important;
            outline: none !important;
        }
        
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-2">
            <div class="w-10 h-8 bg-indigo-600 rounded-lg flex items-center justify-center overflow-hidden">
                <span class="font-bold text-white text-[10px] leading-none text-center">SWT</span>
            </div>
            <h1 class="text-lg brand-text"><span class="brand-word-1">Soulwinning</span><span class="brand-word-2">Tracker</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all">
                <svg id="sun-icon" class="w-5 h-5 hidden text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
                <svg id="moon-icon" class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
            </button>
            <button onclick="handleLogout()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:text-red-500 transition-all ml-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 pb-32 text-center">
        <header class="mb-10">
            <div id="role-display" class="badge-base badge-role mb-2 uppercase tracking-widest font-bold bg-amber-100 text-amber-600 px-4 py-1 rounded-full inline-block text-[10px]">Superadmin</div>
            
            <div class="flex items-center justify-center gap-2 mb-8">
                <h2 id="user-display-name" class="text-4xl font-extrabold tracking-tight">...</h2>
                <button onclick="openNameModal()" class="w-8 h-8 inline-flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-400 hover:text-amber-500 border border-slate-200 dark:border-slate-700 transition-all active:scale-90">
                    <i class="bi bi-pencil-fill text-[12px]"></i>
                </button>
            </div>
            
            <div class="max-w-sm mx-auto mb-10">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">System Tools</label>
                <div class="p-6 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[2rem] shadow-sm ring-1 ring-black/5 dark:ring-white/5">
                    <button onclick="openAdminManager()" class="w-full py-4 text-[10px] font-bold bg-amber-500/10 text-amber-600 dark:text-amber-500 rounded-2xl uppercase active:scale-95 transition-all flex items-center justify-center gap-2 group shadow-lg shadow-amber-500/50">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transition-transform group-hover:rotate-12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                        </svg>
                        Manage Pastor Invite Codes
                    </button>
                </div>
            </div>

            <div class="max-w-sm mx-auto">
                <label class="block text-[12px] font-bold text-slate-400 uppercase mb-3 tracking-widest text-center">Global Reports</label>
                <div class="p-6 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[2.5rem] shadow-sm ring-1 ring-black/5 dark:ring-white/5">
                    
                    <select id="churchFilter" class="w-full bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 px-4 py-3 rounded-2xl text-xs font-bold mb-4 pr-10 dark:text-white outline-none">
                        <option value="all">Global Total (All Churches)</option>
                    </select>

                    <div class="space-y-6">
                        <div>
                            <label class="block text-[9px] font-bold text-slate-400 uppercase mb-3 tracking-widest text-center">Soulwinning Type</label>
                            <div class="flex gap-2">
                                <button id="type-all" onclick="setActiveType('all')" class="type-btn flex-1 py-3 bg-indigo-600 text-white border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200">All</button>
                                <button id="type-Regular" onclick="setActiveType('Regular')" class="type-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800/50 border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 shadow-sm text-slate-500">Regular</button>
                                <button id="type-School" onclick="setActiveType('School')" class="type-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800/50 border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 shadow-sm text-slate-500">School</button>
                                <button id="type-Event" onclick="setActiveType('Event')" class="type-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800/50 border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 shadow-sm text-slate-500">Event</button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-[9px] font-bold text-slate-400 uppercase mb-3 tracking-widest text-center">Quick Presets</label>
                            <div class="flex gap-2">
                                <button id="btn-today" onclick="setActivePreset('today')" class="preset-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800/50 border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 active:scale-95 text-slate-500 dark:text-slate-400">Today</button>
                                <button id="btn-week" onclick="setActivePreset('week')" class="preset-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800/50 border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 active:scale-95 text-slate-500 dark:text-slate-400">Week</button>
                                <button id="btn-month" onclick="setActivePreset('month')" class="preset-btn flex-1 py-3 bg-indigo-600 text-white rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 active:scale-95 shadow-lg shadow-indigo-500/50">Month</button>
                            </div>
                        </div>

                        <div class="border-t dark:border-slate-800 pt-4">
                            <label class="block text-[9px] font-bold text-slate-400 uppercase mb-4 ml-2 tracking-widest text-center">Custom Selection</label>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="flex flex-col gap-1.5">
                                    <label for="customDate" class="text-[8px] font-extrabold text-slate-400 uppercase text-center">Specific Day</label>
                                    <input type="date" id="customDate" oninput="handleCustomInput('date')" class="bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 p-3 rounded-xl text-[10px] font-bold dark:text-white outline-none transition-all duration-300">
                                </div>
                                <div class="flex flex-col gap-1.5">
                                    <label for="customMonth" class="text-[8px] font-extrabold text-slate-400 uppercase text-center">Whole Month</label>
                                    <input type="month" id="customMonth" oninput="handleCustomInput('month')" class="bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 p-3 rounded-xl text-[10px] font-bold dark:text-white outline-none transition-all duration-300">
                                </div>
                            </div>
                        </div>

                        <button onclick="loadStats()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold text-xs uppercase active:scale-95 transition-all shadow-lg shadow-indigo-500/50">Generate Report</button>
                    </div>
                </div>
            </div>
        </header>

        <div id="stats-container" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="mb-6">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center mb-1">Results for</label>
                <h3 id="reportDateLabel" class="text-indigo-500 font-bold text-sm uppercase tracking-wider">...</h3>
            </div>
            
            <div class="bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[2rem] shadow-sm max-w-lg mx-auto overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-[10px] uppercase font-bold tracking-widest text-slate-400">
                        <thead class="bg-slate-50 dark:bg-slate-800/50 border-b dark:border-slate-800">
                            <tr>
                                <th class="px-6 py-4 text-left">Type</th>
                                <th class="px-6 py-4 text-center text-indigo-600">Total</th>
                                <th class="px-6 py-4 text-center">Participants</th>
                            </tr>
                        </thead>
                        <tbody id="matrix-body" class="divide-y dark:divide-slate-800 text-slate-600 dark:text-slate-300">
                            </tbody>
                        <tfoot class="bg-indigo-50 dark:bg-indigo-900/20 border-t-2 border-indigo-500/20">
                            <tr class="text-indigo-600 dark:text-indigo-400">
                                <td class="px-6 py-4 text-left">Grand Total</td>
                                <td id="matrix-grand-souls" class="px-6 py-4 text-center text-lg font-black">0</td>
                                <td id="matrix-grand-sw" class="px-6 py-4 text-center text-lg font-black">0</td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="nameModal" class="hidden fixed inset-0 z-[150] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-slate-900 border dark:border-slate-800 w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-center">
            <h2 class="text-xl font-bold dark:text-white mb-2">Edit Display Name</h2>
            <p class="text-[10px] text-slate-400 mb-6 uppercase tracking-widest">How should you appear in reports?</p>
            <input id="newNameInput" type="text" placeholder="Your Name" maxlength="20" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl outline-none text-sm dark:text-white mb-4">
            <div class="flex gap-2">
                <button onclick="closeNameModal()" class="flex-1 py-3 text-slate-500 font-bold text-xs uppercase tracking-widest">Cancel</button>
                <button id="saveNameBtn" onclick="saveDisplayName()" class="flex-1 py-3 bg-amber-500 text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-amber-500/20">Save</button>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6 hidden z-50">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-[2.5rem] p-8 border shadow-2xl">
            <h3 class="text-xl font-bold mb-6 text-center dark:text-white">Pastor Invites</h3>
            <div id="invite-list" class="space-y-2 mb-6 max-h-48 overflow-y-auto pr-2 custom-scroll text-left"></div>
            <div class="border-t dark:border-slate-800 pt-6">
                <input id="newInviteCode" type="text" placeholder="NEW PASTOR CODE" class="w-full p-4 mb-4 bg-slate-50 border dark:border-slate-700 rounded-2xl outline-none dark:bg-slate-800 dark:text-white font-bold text-center uppercase tracking-widest text-indigo-600">
                <div class="flex gap-3">
                    <button onclick="closeAdminManager()" class="flex-1 py-4 text-slate-400 font-bold uppercase text-xs">Close</button>
                    <button onclick="addInviteCode()" class="flex-1 py-4 bg-amber-500 text-white rounded-2xl font-bold uppercase text-xs shadow-lg shadow-indigo-500/50">Generate</button>
                </div>
            </div>
        </div>
    </div>

    <div id="confirm-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6 hidden z-[200]">
        <div class="bg-white dark:bg-slate-900 w-full max-w-xs rounded-[2.5rem] p-8 border dark:border-slate-800 shadow-2xl text-center">
            <div class="w-16 h-16 bg-red-100 dark:bg-red-50/10 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
            </div>
            <h3 id="confirm-title" class="text-lg font-bold mb-2 dark:text-white">Confirm Action</h3>
            <p id="confirm-body" class="text-xs text-slate-500 dark:text-slate-400 mb-8 leading-relaxed">Are you sure you want to proceed?</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 py-4 bg-slate-100 dark:bg-slate-800 text-slate-500 font-bold uppercase text-[10px] rounded-2xl">Cancel</button>
                <button id="confirm-proceed-btn" class="flex-1 py-4 bg-red-50 text-white font-bold uppercase text-[10px] rounded-2xl shadow-lg shadow-red-500/20 active:scale-95 transition-all">Proceed</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-500 z-[100] pointer-events-none text-sm font-bold"></div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, getDocs, collection, query, where, setDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, getAggregateFromServer, sum, count } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let userProfile = null;
        let currentPreset = 'month';
        let currentType = 'all';

        const initTheme = () => {
            if (localStorage.getItem('theme') === 'dark') {
                document.getElementById('main-html').classList.add('dark');
                document.getElementById('sun-icon').classList.remove('hidden');
                document.getElementById('moon-icon').classList.add('hidden');
            }
        };
        initTheme();

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            if(!t) return;
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-10'), 3000);
        };

        // --- SURGICAL LOGIC: Display Name Management ---
        window.openNameModal = () => {
            document.getElementById('newNameInput').value = userProfile.displayName || "";
            document.getElementById('nameModal').classList.remove('hidden');
        };
        window.closeNameModal = () => document.getElementById('nameModal').classList.add('hidden');
        window.saveDisplayName = async () => {
            const newName = document.getElementById('newNameInput').value.trim();
            if (!newName) return showToast("Name required.");
            const btn = document.getElementById('saveNameBtn');
            btn.innerText = "SAVING..."; btn.disabled = true;
            try {
                await updateDoc(doc(db, "profiles", auth.currentUser.uid), { displayName: newName });
                userProfile.displayName = newName;
                document.getElementById('user-display-name').innerText = newName;
                showToast("Name updated! ✓");
                closeNameModal();
            } catch (e) { showToast("Error updating name."); }
            finally { btn.innerText = "SAVE"; btn.disabled = false; }
        };

        /*window.setActiveType = (type) => {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-lg', 'shadow-indigo-500/50');
                btn.classList.add('bg-slate-100', 'dark:bg-slate-800/50', 'text-slate-500');
            });
            const activeBtn = document.getElementById(`type-${type}`);
            if (activeBtn) {
                activeBtn.classList.remove('bg-slate-100', 'dark:bg-slate-800/50', 'text-slate-500');
                activeBtn.classList.add('bg-indigo-600', 'text-white', 'shadow-lg', 'shadow-indigo-500/50');
            }
        };*/
        window.setActiveType = (type) => {
            currentType = type;
            const inactive = "type-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800/50 text-slate-500 dark:text-slate-400 border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 active:scale-95";
            const active = "type-btn flex-1 py-3 bg-indigo-600 text-white border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 active:scale-95 shadow-lg shadow-indigo-500/50";
            
            document.querySelectorAll('.type-btn').forEach(btn => btn.className = inactive);
            const activeBtn = document.getElementById(`type-${type}`);
            if (activeBtn) activeBtn.className = active;
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.replace("index.html"); return; }
            try {
                const snap = await getDoc(doc(db, "profiles", user.uid));
                if (!snap.exists() || snap.data().role !== 'superadmin') { 
                    window.location.replace("index.html"); 
                    return; 
                }
                userProfile = snap.data();
                if (userProfile.status === 'inactive') {
                    await signOut(auth);
                    window.location.replace("index.html");
                    return;
                }
                document.getElementById('user-display-name').innerText = userProfile.displayName;
                await populateAllChurches();
                setActivePreset('month'); 
                setActiveType('all');
            } catch (e) {
                console.error(e);
                window.location.replace("index.html");
            }
        });

        async function populateAllChurches() {
            const filter = document.getElementById('churchFilter');
            const snap = await getDocs(collection(db, "churches"));
            filter.innerHTML = '<option value="all">Global Total (All Churches)</option>';
            snap.forEach(d => {
                filter.innerHTML += `<option value="${d.id}">${d.data().name}</option>`;
            });
        }

        window.setActivePreset = (p) => {
            currentPreset = p;
            const dateInput = document.getElementById('customDate');
            const monthInput = document.getElementById('customMonth');
            dateInput.value = ""; 
            monthInput.value = "";
            [dateInput, monthInput].forEach(input => {
                input.classList.remove('border-indigo-500', 'ring-2', 'ring-indigo-500/50', 'bg-indigo-500/10');
            });

            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.className = "preset-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800/50 text-slate-500 dark:text-slate-400 border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 active:scale-95";
            });
            const activeBtn = document.getElementById(`btn-${p}`);
            if (activeBtn) activeBtn.className = "preset-btn flex-1 py-3 bg-indigo-600 text-white rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 active:scale-95 shadow-lg shadow-indigo-500/50";
        };

        window.handleCustomInput = (type) => {
            currentPreset = null;
            const dateInput = document.getElementById('customDate');
            const monthInput = document.getElementById('customMonth');

            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.className = "preset-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800/50 text-slate-500 border border-transparent rounded-2xl text-[10px] font-bold uppercase";
            });

            if (type === 'date') {
                dateInput.classList.add('border-indigo-500', 'ring-2', 'ring-indigo-500/50', 'bg-indigo-500/10');
                monthInput.value = "";
                monthInput.classList.remove('border-indigo-500', 'ring-2', 'ring-indigo-500/50', 'bg-indigo-500/10');
            } else {
                monthInput.classList.add('border-indigo-500', 'ring-2', 'ring-indigo-500/50', 'bg-indigo-500/10');
                dateInput.value = "";
                dateInput.classList.remove('border-indigo-500', 'ring-2', 'ring-indigo-500/50', 'bg-indigo-500/10');
            }
        };

        window.loadStats = async () => {
            const filterEl = document.getElementById('churchFilter');
            const selCh = filterEl.value;
            const cDate = document.getElementById('customDate').value;
            const cMonth = document.getElementById('customMonth').value;
            const label = document.getElementById('reportDateLabel');
            const matrixBody = document.getElementById('matrix-body');

            document.getElementById('stats-container').classList.remove('hidden');
            matrixBody.innerHTML = '<tr><td colspan="3" class="py-8 italic text-slate-400">Loading Report...</td></tr>';

            try {
                const now = new Date();
                let startLimit = ""; let endLimit = ""; let bucketPaths = [];
                const getLocalDateStr = (d) => d.toLocaleDateString('en-CA');

                if (cDate) {
                    startLimit = cDate + "T00:00"; endLimit = cDate + "T23:59";
                    label.innerText = new Date(cDate).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                    bucketPaths.push(`daily_stats/${cDate}`);
                } else if (cMonth) {
                    startLimit = cMonth + "-01T00:00"; endLimit = cMonth + "-31T23:59";
                    label.innerText = new Date(cMonth).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                    bucketPaths.push(`monthly_stats/${cMonth}`);
                } else if (currentPreset === 'today') {
                    const str = getLocalDateStr(now);
                    startLimit = str + "T00:00"; endLimit = str + "T23:59";
                    label.innerText = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    bucketPaths.push(`daily_stats/${str}`);
                } else if (currentPreset === 'week') {
                    const start = new Date(now); start.setDate(now.getDate() - now.getDay());
                    const end = new Date(start); end.setDate(start.getDate() + 6);
                    startLimit = getLocalDateStr(start) + "T00:00"; endLimit = getLocalDateStr(end) + "T23:59";
                    const fmt = { month: 'short', day: 'numeric' };
                    label.innerText = `${start.toLocaleDateString('en-US', fmt)} - ${end.toLocaleDateString('en-US', fmt)}`;
                    for(let i=0; i<7; i++) {
                        const d = new Date(start); d.setDate(start.getDate() + i);
                        bucketPaths.push(`daily_stats/${getLocalDateStr(d)}`);
                    }
                } else if (currentPreset === 'month') {
                    const str = getLocalDateStr(now).substring(0, 7);
                    startLimit = str + "-01T00:00"; endLimit = str + "-31T23:59";
                    label.innerText = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                    bucketPaths.push(`monthly_stats/${str}`);
                }

                const types = currentType === 'all' ? ['Regular', 'School', 'Event'] : [currentType];
                const totals = {};
                const participants = {};
                const globalUnique = new Set();

                for (const t of types) {
                    let qConstraints = [where("eventDate", ">=", startLimit), where("eventDate", "<=", endLimit), where("type", "==", t)];
                    if (selCh !== 'all') qConstraints.push(where("churchId", "==", selCh));
                    const snap = await getAggregateFromServer(query(collection(db, "salvations"), ...qConstraints), { total: sum('count') });
                    totals[t] = snap.data().total || 0;
                    participants[t] = new Set();
                }

                let churchesToScan = [];
                if (selCh === 'all') {
                    const churchListSnap = await getDocs(collection(db, "churches"));
                    churchListSnap.forEach(d => churchesToScan.push(d.id));
                } else {
                    churchesToScan = [selCh];
                }

                for (const chId of churchesToScan) {
                    for (const path of bucketPaths) {
                        const bSnap = await getDoc(doc(db, `churches/${chId}/${path}`));
                        if (bSnap.exists()) {
                            const data = bSnap.data();
                            for (const t of types) {
                                (data[`${t}_members`] || []).forEach(id => {
                                    participants[t].add(id);
                                    globalUnique.add(id);
                                });
                            }
                        }
                    }
                }

                let html = "";
                let grandSouls = 0;
                for (const t of types) {
                    grandSouls += totals[t];
                    html += `
                        <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
                            <td class="px-6 py-4 text-left font-extrabold text-slate-500">${t}</td>
                            <td class="px-6 py-4 text-center font-black text-indigo-600 text-lg">${totals[t]}</td>
                            <td class="px-6 py-4 text-center font-black text-slate-600 dark:text-slate-200 text-lg">${participants[t].size}</td>
                        </tr>`;
                }
                matrixBody.innerHTML = html;
                document.getElementById('matrix-grand-souls').innerText = grandSouls;
                document.getElementById('matrix-grand-sw').innerText = globalUnique.size;

            } catch (e) { console.error(e); showToast("❌ Error generating report."); }
        };

        window.openAdminManager = () => {
            document.getElementById('admin-modal').classList.remove('hidden');
            onSnapshot(collection(db, "pastor_invites"), (snap) => {
                let h = ""; 
                snap.forEach(d => h += `
                    <div class="p-3 bg-slate-50 dark:bg-slate-800/50 rounded-xl flex justify-between items-center border dark:border-slate-700">
                        <span class="font-mono font-bold text-indigo-600 dark:text-indigo-400">${d.id}</span>
                        <button onclick="handleRevokeRequest('${d.id}')" class="text-[10px] font-bold text-rose-500 uppercase hover:underline">Revoke</button>
                    </div>`);
                document.getElementById('invite-list').innerHTML = h || "<p class='text-center text-slate-400 text-xs italic'>No active codes.</p>";
            });
        };

        window.closeAdminManager = () => document.getElementById('admin-modal').classList.add('hidden');

        window.addInviteCode = async () => { 
            const c = document.getElementById('newInviteCode').value.toUpperCase().trim(); 
            if(!c) return showToast("⚠️ Enter a code first");
            try {
                await setDoc(doc(db, "pastor_invites", c), { createdAt: serverTimestamp() });
                document.getElementById('newInviteCode').value = ""; 
                showToast("✅ Code generated");
            } catch(e) { showToast("❌ Error creating code"); }
        };

        window.handleRevokeRequest = (id) => {
            openConfirmModal(
                "Revoke Invite Code?", 
                `Are you sure you want to delete ${id}? This cannot be undone.`,
                async () => {
                    try {
                        await deleteDoc(doc(db, 'pastor_invites', id));
                        showToast("🔥 Code revoked");
                    } catch(e) { showToast("❌ Error revoking code"); }
                }
            );
        };

        window.openConfirmModal = (title, body, onConfirm) => {
            document.getElementById('confirm-title').innerText = title;
            document.getElementById('confirm-body').innerText = body;
            const btn = document.getElementById('confirm-proceed-btn');
            const newBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(newBtn, btn);
            newBtn.onclick = () => { onConfirm(); closeConfirmModal(); };
            document.getElementById('confirm-modal').classList.remove('hidden');
        };

        window.closeConfirmModal = () => document.getElementById('confirm-modal').classList.add('hidden');
        window.toggleDarkMode = () => { 
            const html = document.getElementById('main-html');
            const sunIcon = document.getElementById('sun-icon');
            const moonIcon = document.getElementById('moon-icon');
        
            const isDark = html.classList.toggle('dark'); 
            localStorage.setItem('theme', isDark ? 'dark' : 'light'); 
        
            // --- THE FIX: Sync the icons with the state ---
            if (isDark) {
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        };
        window.handleLogout = () => signOut(auth).then(() => window.location.replace("index.html"));
    </script>
</body>
</html>
