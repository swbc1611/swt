<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulwinning Tracker - Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-slate-50 dark:bg-[#0f172a] flex items-center justify-center min-h-screen p-6 transition-colors duration-300">

    <div class="w-full max-w-sm text-center">
        <div class="flex flex-col items-center gap-6 mb-10">
            <div class="w-16 h-14 bg-indigo-600 rounded-[1.25rem] flex items-center justify-center shadow-2xl shadow-indigo-500/20">
                <span class="font-bold text-white text-xl leading-none">SWT</span>
            </div>
            <h1 class="text-3xl brand-text justify-center">
                <span class="brand-word-1 dark:text-white">Account</span><span class="brand-word-2">Setup</span>
            </h1>
        </div>

        <div class="bg-white dark:bg-slate-900 p-8 rounded-[3rem] border dark:border-slate-800 shadow-xl text-left">
            
            <div id="step-1">
                <p class="text-slate-400 text-sm mb-8 text-center">Choose your role to get started.</p>
                <button onclick="setRole('pastor')" class="w-full py-5 mb-4 bg-indigo-600 text-white rounded-3xl font-bold text-lg shadow-lg shadow-indigo-500/20 hover:bg-indigo-700 active:scale-95 transition-all">I am a Pastor</button>
                <button onclick="setRole('member')" class="w-full py-5 mb-8 bg-slate-100 dark:bg-slate-800 dark:text-white rounded-3xl font-bold text-lg hover:bg-slate-200 dark:hover:bg-slate-700 active:scale-95 transition-all">I am a Member</button>
                
                <div class="border-t dark:border-slate-800 pt-6 text-center">
                    <button onclick="handleSignOut()" class="text-xs font-bold text-red-500 hover:underline uppercase tracking-widest">Cancel and Sign Out</button>
                </div>
            </div>

            <div id="step-pastor" class="hidden space-y-4">
                <h3 class="text-xs font-bold text-indigo-500 uppercase ml-4 tracking-widest">Pastor Details</h3>
                <input id="p-invite" type="text" placeholder="APP INVITE CODE" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl outline-none text-center font-bold tracking-widest text-indigo-600 dark:text-indigo-400 uppercase">
                <input id="p-name" type="text" placeholder="Full Name" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl outline-none text-sm dark:text-white">
                <input id="p-church" type="text" placeholder="Church Name" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl outline-none text-sm dark:text-white">
                
                <div class="flex gap-3 pt-4">
                    <button onclick="goBack()" class="flex-1 py-4 text-slate-400 font-bold text-xs uppercase">Back</button>
                    <button id="p-btn" onclick="savePastor()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold text-xs uppercase shadow-lg shadow-indigo-500/20">Complete</button>
                </div>
            </div>

            <div id="step-member" class="hidden space-y-4">
                <h3 class="text-xs font-bold text-emerald-500 uppercase ml-4 tracking-widest">Member Details</h3>
                <input id="m-name" type="text" placeholder="Your Name" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl outline-none text-center text-sm dark:text-white">
                <input id="m-church-code" type="text" placeholder="CHURCH INVITE CODE" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl outline-none text-center font-bold tracking-widest text-indigo-600 dark:text-indigo-400 uppercase">
                
                <div class="flex gap-3 pt-4">
                    <button onclick="goBack()" class="flex-1 py-4 text-slate-400 font-bold text-xs uppercase">Back</button>
                    <button id="m-btn" onclick="saveMember()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold text-xs uppercase shadow-lg shadow-indigo-500/20">Complete</button>
                </div>
            </div>
        </div>

        <p class="mt-8 text-[10px] text-slate-400 uppercase font-bold tracking-[0.2em]">Soulwinning Baptist Church Ministry Tool</p>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-500 z-[100] pointer-events-none text-sm font-bold"></div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, setDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const initTheme = () => {
            if (localStorage.getItem('theme') === 'dark') {
                document.getElementById('main-html').classList.add('dark');
            }
        };
        initTheme();

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-10'), 3000);
        };

        onAuthStateChanged(auth, async (user) => { 
            if (!user) {
                window.location.replace("index.html"); 
            } else {
                const snap = await getDoc(doc(db, "profiles", user.uid));
                if (snap.exists()) {
                    const role = snap.data().role;
                    if (role === 'superadmin') window.location.replace("admin.html");
                    else if (role === 'pastor') window.location.replace("pastor.html");
                    else if (role === 'member') window.location.replace("member.html");
                }
            }
        });

        window.handleSignOut = () => {
            signOut(auth).then(() => window.location.replace("index.html"));
        };

        window.setRole = (r) => {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById(r === 'pastor' ? 'step-pastor' : 'step-member').classList.remove('hidden');
        };

        window.goBack = () => {
            document.getElementById('step-pastor').classList.add('hidden');
            document.getElementById('step-member').classList.add('hidden');
            document.getElementById('step-1').classList.remove('hidden');
        };

        window.savePastor = async () => {
            const code = document.getElementById('p-invite').value.toUpperCase().trim();
            const name = document.getElementById('p-name').value.trim();
            const church = document.getElementById('p-church').value.trim();
            const btn = document.getElementById('p-btn');

            if(!code || !name || !church) return showToast("All fields are required.");

            btn.innerText = "Saving..."; btn.disabled = true;
            try {
                const inviteRef = doc(db, "pastor_invites", code);
                const inviteSnap = await getDoc(inviteRef);
                
                if (!inviteSnap.exists()) {
                    showToast("Invalid Invite Code.");
                    throw new Error("Invalid Code");
                }

                const churchCode = Math.random().toString(36).substring(2, 8).toUpperCase();
                const uid = auth.currentUser.uid;

                // 1. Create the Church document
                await setDoc(doc(db, "churches", churchCode), { 
                    name: church, 
                    pastorId: uid,
                    createdAt: serverTimestamp()
                });

                // 2. Create the Profile document
                await setDoc(doc(db, "profiles", uid), { 
                    displayName: name, 
                    role: 'pastor', 
                    churchId: [churchCode], 
                    email: auth.currentUser.email,
                    status: 'active',
                    createdAt: serverTimestamp()
                });

                // 3. Consume the invite code
                await deleteDoc(inviteRef);
                
                showToast("Setup Complete! Redirecting...");
                setTimeout(() => window.location.replace("pastor.html"), 1500);

            } catch (e) {
                console.error(e);
                if (e.code === 'permission-denied') {
                    showToast("Permission Denied: Update Firestore Rules.");
                } else {
                    showToast(e.message || "Setup failed.");
                }
                btn.innerText = "Complete"; 
                btn.disabled = false;
            }
        };

        window.saveMember = async () => {
            const name = document.getElementById('m-name').value.trim();
            const code = document.getElementById('m-church-code').value.toUpperCase().trim();
            const btn = document.getElementById('m-btn');

            if(!name || !code) return showToast("All fields are required.");

            btn.innerText = "Saving..."; btn.disabled = true;
            try {
                const churchSnap = await getDoc(doc(db, "churches", code));
                if (!churchSnap.exists()) {
                    showToast("Invalid Church Code.");
                    throw new Error("Invalid Church");
                }

                await setDoc(doc(db, "profiles", auth.currentUser.uid), { 
                    displayName: name, 
                    role: 'member', 
                    churchId: [code], 
                    email: auth.currentUser.email,
                    status: 'active',
                    createdAt: serverTimestamp()
                });

                showToast("Welcome to the team!");
                setTimeout(() => window.location.replace("member.html"), 1500);

            } catch (e) {
                console.error(e);
                if (e.code === 'permission-denied') {
                    showToast("Permission Denied: Update Firestore Rules.");
                } else {
                    showToast(e.message || "Setup failed.");
                }
                btn.innerText = "Complete"; 
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
