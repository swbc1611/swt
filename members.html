<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Management - Soulwinning Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>        
        button, .preset-btn, .type-btn, [role="button"] {
            transition: all 0.2s ease-in-out !important;
        }
        
        button:active, .preset-btn:active, .type-btn:active, [role="button"]:active {
            transform: scale(0.95) !important;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.7) !important;
            outline: none !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 transition-colors duration-300">

    <nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-[100] w-full">
        <div class="flex items-center gap-2">
            <button onclick="window.location.href='pastor.html'" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all mr-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-600 dark:text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 19l-7-7 7-7" /></svg>
            </button>
            <div class="w-10 h-8 bg-indigo-600 rounded-lg flex items-center justify-center overflow-hidden">
                <span class="font-bold text-white text-[10px] leading-none text-center">SWT</span>
            </div>
            <h1 class="text-lg brand-text"><span class="brand-word-1">Soulwinning</span><span class="brand-word-2">Tracker</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all">
                <svg id="sun-icon" class="w-5 h-5 hidden text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
                <svg id="moon-icon" class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 pb-32">
        <header class="mb-12 flex flex-col items-center text-center">
            <div id="role-display" class="mb-4 px-4 py-1 rounded-full bg-amber-500/10 text-amber-500 border border-amber-500/20 uppercase tracking-[0.3em] text-[10px] font-black shadow-[0_0_15px_rgba(245,158,11,0.1)]">PASTOR</div>
            <h2 id="user-display-name" class="text-4xl font-extrabold tracking-tight mb-3 text-slate-900 dark:text-white">...</h2>
            <div id="church-list-tags" class="flex flex-wrap justify-center gap-2 mt-2"></div>

            <h3 class="text-2xl font-black mt-10 text-indigo-500 uppercase tracking-tighter">Member Management</h3>
            <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-[0.3em] font-black opacity-60">Activate or Deactivate Member Access</p>
        </header>

        <div class="mb-10 max-w-sm mx-auto text-center">
            <label class="block text-[11px] font-black text-slate-500 uppercase mb-4 tracking-widest text-center">SELECT CHURCH</label>
            <select id="churchSelect" class="w-full bg-slate-50 dark:bg-[#0f172a] border border-slate-200 dark:border-white/5 p-4 rounded-2xl text-[12px] font-bold text-slate-900 dark:text-white outline-none mb-4 text-center appearance-none cursor-pointer">
                <option value="" disabled selected>Choose a church...</option>
            </select>
            
            <button id="load-btn" onclick="fetchMembers()" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-xl shadow-indigo-600/30 active:scale-95 transition-all">
                Load Member List
            </button>
        </div>

        <div id="management-area" class="hidden">
            <div class="mb-8 relative max-w-md mx-auto">
                <input type="text" id="searchInput" onkeyup="filterMembers()" placeholder="Fuzzy search names..." class="w-full p-4 pl-12 bg-white dark:bg-[#0f172a] border border-slate-200 dark:border-white/5 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all dark:text-white text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 absolute left-4 top-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            </div>

            <section class="bg-white dark:bg-[#0f172a] rounded-2xl border border-slate-200 dark:border-white/5 overflow-hidden shadow-sm">
                <div class="px-6 py-4 border-b dark:border-white/5 bg-slate-50 dark:bg-slate-800/50">
                    <h3 id="roster-header-title" class="font-black text-[10px] uppercase text-slate-400 text-center tracking-[0.2em] transition-all duration-500">
                        Church Roster
                    </h3>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-[10px] text-slate-400 uppercase border-b dark:border-white/5">
                            <tr>
                                <th class="px-6 py-4">Member Info</th>
                                <th class="px-6 py-4 text-center">Status</th>
                                <th class="px-6 py-4 text-right">Details</th>
                            </tr>
                        </thead>
                        <tbody id="member-list" class="divide-y dark:divide-white/5 text-sm font-bold"></tbody>
                    </table>
                </div>
            </section>
        </div>

        <div id="initial-message" class="text-center py-20 text-slate-400 italic uppercase tracking-widest text-[11px] opacity-50">
            Select a church to view and manage its member access.
        </div>
    </main>

    <div id="member-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6 hidden z-[120]">
        <div class="modal-content bg-white dark:bg-[#0f172a] w-full max-w-sm rounded-[2.5rem] p-8 border border-slate-200 dark:border-white/5 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold dark:text-white uppercase tracking-tight">Account Access</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="space-y-4 text-left mb-8">
                <div>
                    <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Full Name</label>
                    <p id="det-name" class="text-sm font-bold dark:text-white">---</p>
                </div>
                <div>
                    <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Email Address</label>
                    <p id="det-email" class="text-sm text-slate-500">---</p>
                </div>
                <div>
                    <label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Account Role</label>
                    <p id="det-role" class="text-[10px] font-black uppercase text-indigo-500">---</p>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-4 bg-slate-100 dark:bg-slate-800 text-slate-500 font-black uppercase text-[10px] rounded-2xl">Close</button>
                <button id="det-action-btn" class="flex-1 py-4 font-black uppercase text-[10px] rounded-2xl transition-all active:scale-95">---</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-500 z-[150] pointer-events-none text-sm font-bold border border-white/10"></div>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { collection, query, where, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let allMembers = [];
        let userProfile = null;

        const initTheme = () => {
            const isDark = localStorage.getItem('theme') === 'dark';
            if (isDark) {
                document.getElementById('main-html').classList.add('dark');
                document.getElementById('sun-icon')?.classList.remove('hidden');
                document.getElementById('moon-icon')?.classList.add('hidden');
            }
        };
        initTheme();

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            if(!t) return;
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                t.classList.remove('opacity-100', 'translate-y-0');
                t.classList.add('opacity-0', 'translate-y-10');
            }, 3000);
        };

        window.toggleDarkMode = () => {
            const html = document.getElementById('main-html');
            const isDark = html.classList.toggle('dark');
            document.getElementById('sun-icon')?.classList.toggle('hidden', !isDark);
            document.getElementById('moon-icon')?.classList.toggle('hidden', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };
      
        onAuthStateChanged(auth, async (user) => {
            // 1. Basic Auth Guard
            if (!user) return window.location.replace('index.html');
            
            try {
                const cachedData = sessionStorage.getItem('userContext');
                let profile;
        
                if (cachedData) {
                    profile = JSON.parse(cachedData);
                } else {
                    const snap = await getDoc(doc(db, "profiles", user.uid));
                    // 2. Fresh Fetch Guard
                    if (!snap.exists()) return window.location.replace('index.html');
                    profile = snap.data();
                    
                    // Fetch church names for initial setup
                    const churches = {};
                    for(const id of (profile.churchId || [])) {
                        const c = await getDoc(doc(db, "churches", id));
                        if(c.exists()) churches[id] = c.data().name;
                    }
                    profile.churchNames = churches;
                    sessionStorage.setItem('userContext', JSON.stringify(profile));
                }
        
                // 3. THE HARD GATE: Centralized Role Check
                // This stops Members with cached data from seeing the page
                if (profile.role !== 'pastor') {
                    console.error("Unauthorized role detected. Redirecting...");
                    sessionStorage.clear(); // Wipe the cache to be safe
                    window.location.replace('index.html');
                    return;
                }
        
                // 4. AUTHORIZED: UI Logic
                userProfile = profile;
                renderHeader(userProfile.displayName, userProfile.role, userProfile.churchNames || {});
                await populateChurchDropdown();
        
            } catch (error) {
                console.error("Security Check Error:", error);
                window.location.replace('index.html');
            }
        });

        function renderHeader(name, role, churches) {
            document.getElementById('user-display-name').innerText = name || "...";
            const roleEl = document.getElementById('role-display');
            if(roleEl) roleEl.innerText = (role || "Pastor").toUpperCase();
            
            const tagContainer = document.getElementById('church-list-tags');
            let tagsHtml = "";
            Object.values(churches).forEach(c => {
                tagsHtml += `<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">${c}</span>`;
            });
            tagContainer.innerHTML = tagsHtml;
        }

        async function populateChurchDropdown() {
            const select = document.getElementById('churchSelect');
            if (!userProfile.churchId) return;
            select.innerHTML = '<option value="" disabled selected>Choose a church...</option>';
            for (const id of userProfile.churchId) {
                const opt = document.createElement('option');
                opt.value = id; 
                opt.textContent = userProfile.churchNames[id] || id;
                select.appendChild(opt);
            }
        }

        window.fetchMembers = async () => {
            const select = document.getElementById('churchSelect');
            const churchId = select.value;
            const churchName = select.options[select.selectedIndex].text;
            if(!churchId) return showToast("Select a church first");

            const btn = document.getElementById('load-btn');
            btn.disabled = true; btn.innerText = "Searching...";

            try {
                const q = query(collection(db, "profiles"), where("churchId", "array-contains", churchId));
                const snap = await getDocs(q);
                allMembers = [];
                snap.forEach(d => {
                    if (d.id !== auth.currentUser.uid) allMembers.push({ id: d.id, ...d.data() });
                });

                const headerTitle = document.getElementById('roster-header-title');
                headerTitle.innerText = churchName;
                headerTitle.classList.add('text-emerald-500', 'dark:text-emerald-400');

                document.getElementById('initial-message').classList.add('hidden');
                document.getElementById('management-area').classList.remove('hidden');
                renderList(allMembers);
            } catch (e) { showToast("Error loading members"); }
            finally { btn.disabled = false; btn.innerText = "Load Member List"; }
        };

        function renderList(members) {
            const listBody = document.getElementById('member-list');
            listBody.innerHTML = members.map(m => `
                <tr id="user-row-${m.id}" class="hover:bg-slate-50 dark:hover:bg-white/5 transition-colors">
                    <td class="px-6 py-4">
                        <p class="font-bold dark:text-white leading-tight">${m.displayName}</p>
                        <p class="text-[10px] text-slate-400">${m.email}</p>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-wider ${m.status === 'active' ? 'bg-emerald-500/10 text-emerald-500' : 'bg-rose-500/10 text-rose-500'}">
                            ${m.status || 'inactive'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <button onclick='viewMemberDetails(${JSON.stringify(m).replace(/'/g, "&apos;")})' class="text-slate-400 hover:text-indigo-500 p-2 transition-colors">
                            <i class="bi bi-search"></i>
                        </button>
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="3" class="text-center py-10 text-slate-400 font-black uppercase text-[10px] tracking-widest opacity-40">No members found.</td></tr>';
        }

        window.viewMemberDetails = (m) => {
            document.getElementById('det-name').innerText = m.displayName;
            document.getElementById('det-email').innerText = m.email;
            document.getElementById('det-role').innerText = m.role;
            const actionBtn = document.getElementById('det-action-btn');
            const isActive = m.status === 'active';
            actionBtn.innerText = isActive ? 'Deactivate Account' : 'Activate Account';
            actionBtn.className = `flex-1 py-4 font-black uppercase text-[10px] rounded-2xl transition-all ${isActive ? 'bg-rose-500/10 text-rose-500 border border-rose-500/20' : 'bg-indigo-500/10 text-indigo-500 border border-indigo-500/20'}`;
            actionBtn.onclick = () => toggleStatus(m.id, m.status, m.displayName);
            document.getElementById('member-modal').classList.remove('hidden');
        };

        window.toggleStatus = async (uid, currentStatus, name) => {
            const newStatus = currentStatus === 'active' ? 'inactive' : 'active';
            if (!confirm(`Change access for ${name} to ${newStatus.toUpperCase()}?`)) return;
            try {
                await updateDoc(doc(db, "profiles", uid), { status: newStatus });
                const index = allMembers.findIndex(m => m.id === uid);
                if (index !== -1) allMembers[index].status = newStatus;
                filterMembers(); closeModal();
                showToast(`${name} updated to ${newStatus}`);
            } catch (e) { showToast("Action failed"); }
        };

        window.filterMembers = () => {
            const term = document.getElementById('searchInput').value.toLowerCase();
            renderList(allMembers.filter(m => m.displayName.toLowerCase().includes(term) || m.email.toLowerCase().includes(term)));
        };

        window.toggleDarkMode = () => {
            const isDark = document.getElementById('main-html').classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };
        window.closeModal = () => document.getElementById('member-modal').classList.add('hidden');
    </script>
</body>
</html>
