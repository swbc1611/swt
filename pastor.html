<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastor - Soulwinning Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>        
        button, .preset-btn, .type-btn, [role="button"] {
            transition: all 0.2s ease-in-out !important;
        }
        button:active, .preset-btn:active, .type-btn:active, [role="button"]:active {
            transform: scale(0.98) !important;
        }
        /* Dashboard Row Style */
        .dash-row {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(255, 255, 255, 0.1);

</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-10">

        </div>

            <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all">
                <svg id="sun-icon" class="w-5 h-5 hidden text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
                <svg id="moon-icon" class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
            </button>
            <button onclick="handleLogout()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:text-red-500 transition-all ml-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 pb-40">
        <header class="flex flex-col items-center mb-10">

        <div class="mb-12">

                <div class="h-[1px] flex-1 bg-white/5"></div>

            </div>

            <div class="space-y-3">
                 <button onclick="openChurchManager()" class="w-full flex items-center justify-between p-5 dash-row rounded-2xl group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-emerald-500/10 text-emerald-400 rounded-xl flex items-center justify-center"><i class="bi bi-building-fill"></i></div>

                </button>

                <button onclick="window.location.href='members.html'" class="w-full flex items-center justify-between p-5 dash-row rounded-2xl group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-cyan-500/10 text-cyan-400 rounded-xl flex items-center justify-center"><i class="bi bi-people-fill"></i></div>
                        <span class="text-sm font-bold text-slate-300 group-hover:text-white transition-colors">Member management</span>
                    </div>
                    <i class="bi bi-chevron-right text-slate-600 group-hover:text-cyan-400"></i>

                <button onclick="window.location.href='legacy.html'" class="w-full flex items-center justify-between p-5 dash-row rounded-2xl group">
                    <div class="flex items-center gap-4">

        <div class="mt-20">

                <div class="h-[1px] flex-1 bg-indigo-500/10"></div>
                <label class="text-[11px] font-black text-indigo-400 uppercase tracking-[0.4em]">Analytics Report</label>

            </div>

            <div class="bg-slate-900/40 p-8 rounded-[2.5rem] border border-white/5">
                <select id="churchFilter" class="w-full bg-[#1e293b] border-none px-6 py-4 rounded-2xl text-xs font-bold mb-8 pr-10 text-white outline-none">
                    <option value="all">All Linked Churches</option>
                </select>

                <div class="space-y-10">
                    <div>
                        <label class="block text-[9px] font-black text-slate-500 uppercase mb-4 tracking-widest text-center">Filter by Category</label>
                        <div class="flex gap-2 p-1.5 bg-[#0f172a] rounded-2xl">
                            <button id="type-all" onclick="setActiveType('all')" class="type-btn flex-1 py-3 bg-indigo-600 text-white rounded-xl text-[10px] font-bold uppercase">All</button>
                            <button id="type-Regular" onclick="setActiveType('Regular')" class="type-btn flex-1 py-3 text-slate-500 rounded-xl text-[10px] font-bold uppercase">Regular</button>
                            <button id="type-School" onclick="setActiveType('School')" class="type-btn flex-1 py-3 text-slate-500 rounded-xl text-[10px] font-bold uppercase">School</button>
                            <button id="type-Event" onclick="setActiveType('Event')" class="type-btn flex-1 py-3 text-slate-500 rounded-xl text-[10px] font-bold uppercase">Event</button>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-white/5">
                        <label class="block text-[9px] font-black text-slate-500 uppercase mb-4 tracking-widest text-center">Quick Presets</label>
                        <div class="flex gap-2">
                            <button id="btn-today" onclick="setActivePreset('today')" class="preset-btn flex-1 py-3 bg-slate-800/40 text-slate-500 rounded-xl text-[10px] font-bold uppercase">Today</button>
                            <button id="btn-week" onclick="setActivePreset('week')" class="preset-btn flex-1 py-3 bg-slate-800/40 text-slate-500 rounded-xl text-[10px] font-bold uppercase">Week</button>
                            <button id="btn-month" onclick="setActivePreset('month')" class="preset-btn flex-1 py-3 bg-indigo-600 text-white rounded-xl text-[10px] font-bold uppercase">Month</button>

                    <button onclick="loadStats()" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black text-[11px] uppercase tracking-widest active:scale-95 transition-all shadow-xl shadow-indigo-600/20 mt-4">Generate Report</button>

        <div id="stats-container" class="hidden mt-12 animate-in fade-in slide-in-from-bottom-4 duration-700">
            <div class="text-center mb-6">
                <label class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Report for</label>
                <h3 id="reportDateLabel" class="text-indigo-400 font-black text-sm uppercase tracking-wider">...</h3>
            </div>
            
            <div class="bg-[#0f172a] border border-white/5 rounded-[2rem] overflow-hidden shadow-2xl">
                <table class="w-full">
                    <thead class="bg-slate-900/60 border-b border-white/5">
                        <tr class="text-[9px] uppercase font-black tracking-[0.2em] text-slate-500">
                            <th class="px-6 py-4 text-left">Type</th>
                            <th class="px-6 py-4 text-center">Total</th>
                            <th class="px-6 py-4 text-right">Members</th>
                        </tr>
                    </thead>
                    <tbody id="matrix-body" class="divide-y divide-white/5 text-slate-300 font-bold text-[13px]"></tbody>
                    <tfoot class="bg-indigo-600/10 border-t-2 border-indigo-500/20">
                        <tr class="text-indigo-400 font-black">
                            <td class="px-6 py-5 text-left text-xs">GRAND TOTAL</td>
                            <td id="matrix-grand-souls" class="px-6 py-5 text-center text-lg">0</td>
                            <td id="matrix-grand-sw" class="px-6 py-5 text-right text-lg">0</td>
                        </tr>

    <div class="fixed bottom-8 left-0 right-0 z-[100] flex justify-center">
        <button onclick="openModal()" class="w-16 h-16 bg-indigo-600 text-white rounded-full shadow-[0_0_40px_rgba(79,70,229,0.4)] hover:scale-110 active:scale-90 transition-all duration-300 flex items-center justify-center group relative">
            <i class="bi bi-plus-lg text-3xl"></i>
            <span class="absolute inset-0 rounded-full bg-indigo-400 animate-ping opacity-20 pointer-events-none"></span>
        </button>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-8 py-4 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-500 z-[250] pointer-events-none text-xs font-black uppercase tracking-widest"></div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, setDoc, updateDoc, arrayUnion, addDoc, serverTimestamp, getAggregateFromServer, sum, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let userProfile = null; 
        let churchNames = {};
        let currentPreset = 'month';
        let currentType = 'all';

        // THEME INIT (Standardized)
        const initTheme = () => {
            const isDark = localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);
            const html = document.getElementById('main-html');
            if (isDark) html.classList.add('dark');
            else html.classList.remove('dark');
        };
        initTheme();

        onAuthStateChanged(auth, async (user) => {
            if (!user) { sessionStorage.clear(); window.location.replace("index.html"); return; }
            
            const cachedData = sessionStorage.getItem('userContext');
            if (cachedData) {
                userProfile = JSON.parse(cachedData);
                updateIdentityUI();
                await renderChurchUI(); 
            } else {
                const snap = await getDoc(doc(db, "profiles", user.uid));
                if (!snap.exists()) return;
                userProfile = snap.data();
                updateIdentityUI();
                await refreshUI();
            }
            setActivePreset('month');
            setActiveType('all');
        });

        function updateIdentityUI() {
            document.getElementById('user-display-name').innerText = userProfile.displayName || "Pastor";
            document.getElementById('user-initials').innerText = (userProfile.displayName || "P").substring(0, 2).toUpperCase();
        }

        async function refreshUI() {
            const filter = document.getElementById('churchFilter');
            const tagContainer = document.getElementById('church-list-tags');
            filter.innerHTML = '<option value="all">All Linked Churches</option>';
            churchNames = {};
            let tagsHtml = "";
            for(const code of (userProfile.churchId || [])) {
                const d = await getDoc(doc(db, "churches", code));
                if(d.exists()) {
                    const name = d.data().name;
                    churchNames[code] = name;
                    tagsHtml += `<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">${name}</span>`;
                    filter.innerHTML += `<option value="${code}">${name}</option>`;
                }
            }
            tagContainer.innerHTML = tagsHtml;
            userProfile.churchNames = churchNames; 
            sessionStorage.setItem('userContext', JSON.stringify(userProfile));
        }

        async function renderChurchUI() {
            const filter = document.getElementById('churchFilter');
            const tagContainer = document.getElementById('church-list-tags');
            churchNames = userProfile.churchNames;
            let tagsHtml = "";
            filter.innerHTML = '<option value="all">All Linked Churches</option>';
            Object.entries(churchNames).forEach(([code, name]) => {
                tagsHtml += `<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">${name}</span>`;
                filter.innerHTML += `<option value="${code}">${name}</option>`;
            });
            tagContainer.innerHTML = tagsHtml;
        }

        window.loadStats = async () => {
            if (!userProfile?.churchId?.length) return;
            const selCh = document.getElementById('churchFilter').value;
            const dateLabel = document.getElementById('reportDateLabel');
            const matrixBody = document.getElementById('matrix-body');
            document.getElementById('stats-container').classList.remove('hidden');
            matrixBody.innerHTML = '<tr><td colspan="3" class="py-10 text-center text-slate-500 italic">Processing data...</td></tr>';

            try {
                const now = new Date();
                let startLimit = ""; let endLimit = ""; let bucketPaths = [];
                const getLocalDateStr = (d) => d.toLocaleDateString('en-CA');

                // Timeframe Logic (Surgical match to your date engine)
                if (currentPreset === 'today') {
                    const str = getLocalDateStr(now);
                    startLimit = str + "T00:00"; endLimit = str + "T23:59";
                    dateLabel.innerText = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    bucketPaths.push(`daily_stats/${str}`);
                } else if (currentPreset === 'week') {
                    let s = new Date(now); now.getDay() === 0 ? s.setDate(now.getDate() - 7) : s.setDate(now.getDate() - now.getDay());
                    let e = new Date(s); e.setDate(s.getDate() + 6);
                    startLimit = getLocalDateStr(s) + "T00:00"; endLimit = getLocalDateStr(e) + "T23:59";
                    dateLabel.innerText = `${s.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} – ${e.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`;
                    for(let i=0; i<7; i++) { let d = new Date(s); d.setDate(s.getDate() + i); bucketPaths.push(`daily_stats/${getLocalDateStr(d)}`); }
                } else if (currentPreset === 'month') {
                    const str = getLocalDateStr(now).substring(0, 7);
                    startLimit = str + "-01T00:00"; endLimit = str + "-31T23:59";
                    dateLabel.innerText = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                    bucketPaths.push(`monthly_stats/${str}`);
                }

                const churchIds = (selCh === 'all') ? userProfile.churchId : [selCh];
                const types = currentType === 'all' ? ['Regular', 'School', 'Event'] : [currentType];
                const totals = {}; const participants = {}; const globalUnique = new Set();
                let legacyTotal = 0;

                // --- NEW: SURGICAL LEGACY FETCH (Only if 'all' selected) ---
                if (currentType === 'all') {
                    for (const chId of churchIds) {
                        const q = query(collection(db, "churchHistoricalTotals"), 
                                  where("churchId", "==", chId), 
                                  where("year", "==", now.getFullYear()), 
                                  where("month", "==", now.getMonth() + 1));
                        const legSnap = await getDocs(q);
                        legSnap.forEach(d => legacyTotal += (d.data().salvationCount || 0));
                    }
                }

                for (const t of types) {
                    const q = query(collection(db, "salvations"), where("churchId", "in", churchIds), where("eventDate", ">=", startLimit), where("eventDate", "<=", endLimit), where("type", "==", t));
                    const snap = await getAggregateFromServer(q, { total: sum('count') });
                    totals[t] = snap.data().total || 0;
                    participants[t] = new Set();
                }

                for (const chId of churchIds) {
                    for (const path of bucketPaths) {
                        const bSnap = await getDoc(doc(db, `churches/${chId}/${path}`));
                        if (bSnap.exists()) {
                            const data = bSnap.data();
                            types.forEach(t => { (data[`${t}_members`] || []).forEach(id => { participants[t].add(id); globalUnique.add(id); }); });
                        }
                    }
                }

                let html = ""; let grandSouls = 0;
                for (const t of types) {
                    grandSouls += totals[t];
                    html += `<tr class="hover:bg-white/5 transition-colors border-l-2 border-transparent hover:border-indigo-500">
                        <td class="px-6 py-5 text-left">${t}</td>
                        <td class="px-6 py-5 text-center font-black text-indigo-400">${totals[t]}</td>
                        <td class="px-6 py-5 text-right font-black text-slate-500">${participants[t].size}</td>
                    </tr>`;
                }

                if (legacyTotal > 0) {
                    grandSouls += legacyTotal;
                    html += `<tr class="bg-amber-500/5 border-l-2 border-amber-500">
                        <td class="px-6 py-5 text-left text-amber-500">Legacy Records</td>
                        <td class="px-6 py-5 text-center font-black text-amber-500">${legacyTotal}</td>
                        <td class="px-6 py-5 text-right font-black text-slate-600">—</td>
                    </tr>`;
                }

                matrixBody.innerHTML = html;
                document.getElementById('matrix-grand-souls').innerText = grandSouls;
                document.getElementById('matrix-grand-sw').innerText = globalUnique.size;
            } catch (e) { console.error(e); }
        };

        window.setActivePreset = (p) => {
            currentPreset = p;
            const inactive = "preset-btn flex-1 py-3 bg-slate-800/40 text-slate-500 rounded-xl text-[10px] font-bold uppercase transition-all";
            const active = "preset-btn flex-1 py-3 bg-indigo-600 text-white rounded-xl text-[10px] font-bold uppercase transition-all shadow-lg shadow-indigo-600/40";
            document.querySelectorAll('.preset-btn').forEach(btn => btn.className = inactive);
            const activeBtn = document.getElementById(`btn-${p}`);
            if (activeBtn) activeBtn.className = active;
        };

        window.setActiveType = (type) => {
            currentType = type;
            const inactive = "type-btn flex-1 py-3 text-slate-500 rounded-xl text-[10px] font-bold uppercase transition-all";
            const active = "type-btn flex-1 py-3 bg-indigo-600 text-white rounded-xl text-[10px] font-bold uppercase transition-all";
            document.querySelectorAll('.type-btn').forEach(btn => btn.className = inactive);
            const activeBtn = document.getElementById(`type-${type}`);
            if (activeBtn) activeBtn.className = active;
        };

        window.toggleDarkMode = () => {
            const html = document.getElementById('main-html');
            const isDark = html.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        window.handleLogout = () => { sessionStorage.clear(); signOut(auth).then(() => window.location.replace("index.html")); };
        window.closeChurchManager = () => document.getElementById('church-modal').classList.add('hidden');
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
    </script>
</body>
</html>
