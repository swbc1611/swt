<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulwinning Tracker - Pastor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-2">
            <div class="w-10 h-8 bg-indigo-600 rounded-lg flex items-center justify-center overflow-hidden">
                <span class="font-bold text-white text-[10px] leading-none text-center">SWT</span>
            </div>
            <h1 class="text-lg brand-text"><span class="brand-word-1">Soulwinning</span><span class="brand-word-2">Tracker</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all">
                <svg id="sun-icon" class="w-5 h-5 hidden text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
                <svg id="moon-icon" class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
            </button>
            <button onclick="handleLogout()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:text-red-500 transition-all ml-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 pb-40 text-center">
        <header class="mb-10">
            <div id="role-display" class="badge-base badge-role mb-2 uppercase tracking-widest font-bold">PASTOR</div>
            
            <div class="flex items-center justify-center gap-2 mb-3">
                <h2 id="user-display-name" class="text-4xl font-extrabold tracking-tight">...</h2>
                <button onclick="openNameModal()" class="text-slate-400 hover:text-indigo-600 transition-all">
                    <i class="bi bi-pencil-square text-xl"></i>
                </button>
            </div>

            <div id="church-list-tags" class="flex flex-wrap justify-center gap-2 mt-2"></div>
            
            <div class="mt-10 max-w-sm mx-auto space-y-8">
                <div>
                    <label class="block text-[12px] font-bold text-slate-400 uppercase mb-3 tracking-widest">Personal</label>
                    <div class="p-8 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[3rem] shadow-sm flex flex-col gap-4">
                        
                        <div class="flex items-center gap-2">
                            <button onclick="goToGuide()" class="flex-1 flex items-center justify-center gap-2 py-4 bg-indigo-600 text-white rounded-2xl text-[10px] font-black uppercase transition-all shadow-lg shadow-indigo-500/30 active:scale-95">
                                <i class="bi bi-book-half text-sm"></i>
                                Soulwinning Guide
                            </button>
                            <button onclick="openGuideSettings()" class="w-12 h-12 flex items-center justify-center bg-slate-100 dark:bg-slate-800/50 text-slate-400 rounded-2xl hover:text-indigo-500 transition-all">
                                <i class="bi bi-gear-fill"></i>
                            </button>
                        </div>

                        <button onclick="window.open('https://forms.gle/bQvsGq9EgJ2PiHYP8', '_blank')" class="w-full flex items-center justify-center gap-2 py-4 bg-slate-100 dark:bg-slate-800/50 text-slate-500 dark:text-slate-300 rounded-2xl text-[10px] font-bold uppercase transition-all active:scale-95">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                            Record Prospect Contacts
                        </button>

                        <button onclick="window.location.href='history.html'" class="w-full flex items-center justify-center gap-2 py-4 bg-indigo-600 text-white rounded-2xl text-[10px] font-bold uppercase transition-all shadow-lg shadow-indigo-500/30 active:scale-95">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>
                            My History
                        </button>

                        <button onclick="window.location.href='avatar.html'" class="w-full flex items-center justify-center gap-2 py-4 bg-amber-500 text-white rounded-2xl text-[10px] font-bold uppercase transition-all shadow-lg shadow-amber-500/20 active:scale-95">
                            <i class="bi bi-star-fill text-sm"></i>
                            Achievements
                        </button>

                        <button onclick="openPasswordModal()" class="w-full flex items-center justify-center gap-2 py-4 bg-slate-100 dark:bg-slate-800/50 text-slate-500 dark:text-slate-400 rounded-2xl text-[10px] font-bold uppercase transition-all active:scale-95">
                            <i class="bi bi-key-fill"></i> Change Account Password
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-[12px] font-bold text-slate-400 uppercase mb-3 tracking-widest">Tools</label>
                    <div class="p-8 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[3rem] shadow-sm flex flex-col gap-4">
                        <button id="manage-churches-btn" onclick="openChurchManager()" class="w-full text-[10px] font-bold bg-indigo-600 text-white px-6 py-4 rounded-2xl uppercase active:scale-95 transition-all shadow-lg shadow-indigo-500/20 flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A4.833 4.833 0 0 1 12 9.432a4.833 4.833 0 0 1-7.5.9V21h15Z" /></svg>
                            Manage Churches & Codes
                        </button>
                        <button onclick="window.location.href='members.html'" class="w-full text-[10px] font-bold bg-indigo-600 text-white px-6 py-4 rounded-2xl uppercase active:scale-95 transition-all shadow-lg shadow-indigo-500/20 flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" /></svg>
                            Member Management
                        </button>
                    </div>
                </div>
            </div>
            </header>
        </main>

    <div id="nameModal" class="hidden fixed inset-0 z-[150] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-slate-900 border dark:border-slate-800 w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-center">
            <h2 class="text-xl font-bold dark:text-white mb-2">Edit Display Name</h2>
            <p class="text-[10px] text-slate-400 mb-6 uppercase tracking-widest">How should you appear in reports?</p>
            <input id="newNameInput" type="text" placeholder="Your Name" maxlength="20" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl outline-none text-sm dark:text-white mb-4">
            <div class="flex gap-2">
                <button onclick="closeNameModal()" class="flex-1 py-3 text-slate-500 font-bold text-xs uppercase tracking-widest">Cancel</button>
                <button id="saveNameBtn" onclick="saveDisplayName()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-indigo-500/20">Save</button>
            </div>
        </div>
    </div>

    <div id="guideSettingsModal" class="hidden fixed inset-0 z-[150] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-slate-900 border dark:border-slate-800 w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl text-center">
            <h2 class="text-xl font-bold dark:text-white mb-2">Guide Settings</h2>
            <p class="text-[10px] text-slate-400 mb-6 uppercase tracking-widest">Paste your Google Sheets URL</p>
            <input id="guideUrlInput" type="text" placeholder="https://docs.google.com/spreadsheets/..." class="w-full p-4 bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl outline-none text-[10px] dark:text-white mb-4">
            <div class="flex gap-2">
                <button onclick="closeGuideSettings()" class="flex-1 py-3 text-slate-500 font-bold text-xs uppercase tracking-widest">Cancel</button>
                <button id="saveGuideBtn" onclick="saveGuideUrl()" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg shadow-indigo-500/20">Save URL</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-500 z-[250] pointer-events-none text-sm font-bold"></div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, getDocs, collection, query, where, orderBy, setDoc, updateDoc, arrayUnion, addDoc, serverTimestamp, getAggregateFromServer, sum } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let userProfile = null; 
        let churchNames = {};
        let currentPreset = 'month';

        // --- NAME MODAL LOGIC ---
        window.openNameModal = () => {
            document.getElementById('newNameInput').value = userProfile.displayName || "";
            document.getElementById('nameModal').classList.remove('hidden');
        };
        window.closeNameModal = () => document.getElementById('nameModal').classList.add('hidden');
        window.saveDisplayName = async () => {
            const newName = document.getElementById('newNameInput').value.trim();
            if (!newName) return showToast("Name required.");
            const btn = document.getElementById('saveNameBtn');
            btn.innerText = "SAVING..."; btn.disabled = true;
            try {
                await updateDoc(doc(db, "profiles", auth.currentUser.uid), { displayName: newName });
                userProfile.displayName = newName;
                document.getElementById('user-display-name').innerText = newName;
                showToast("Name updated!");
                closeNameModal();
            } catch (e) { showToast("Error updating name."); }
            finally { btn.innerText = "SAVE"; btn.disabled = false; }
        };

        // --- GUIDE LOGIC ---
        window.openGuideSettings = () => {
            document.getElementById('guideUrlInput').value = userProfile.guideUrl || "";
            document.getElementById('guideSettingsModal').classList.remove('hidden');
        };
        window.closeGuideSettings = () => document.getElementById('guideSettingsModal').classList.add('hidden');
        window.saveGuideUrl = async () => {
            const url = document.getElementById('guideUrlInput').value.trim();
            if (url && !url.includes("docs.google.com")) return showToast("Invalid Google Sheets URL.");
            const btn = document.getElementById('saveGuideBtn');
            btn.innerText = "SAVING..."; btn.disabled = true;
            try {
                await updateDoc(doc(db, "profiles", auth.currentUser.uid), { guideUrl: url });
                userProfile.guideUrl = url;
                showToast("Guide URL saved!");
                closeGuideSettings();
            } catch (e) { showToast("Error saving URL."); }
            finally { btn.innerText = "SAVE URL"; btn.disabled = false; }
        };
        window.goToGuide = () => {
            if (!userProfile?.guideUrl) return showToast("No guides saved yet.");
            window.location.href = "guide.html";
        };

        // ... (Remaining original script logic for theme, auth, stats, etc.)
        onAuthStateChanged(auth, async (user) => {
            if (!user) { sessionStorage.clear(); window.location.replace("index.html"); return; }
            try {
                const snap = await getDoc(doc(db, "profiles", user.uid));
                if (!snap.exists()) { window.location.replace("onboarding.html"); return; }
                const data = snap.data();
                if (data.role !== 'pastor') { window.location.replace("index.html"); return; }
                userProfile = data;
                if (userProfile.status === 'inactive') { await signOut(auth); window.location.replace("index.html"); return; }
                document.getElementById('user-display-name').innerText = userProfile.displayName || "Soulwinner";
                await refreshUI();
                setActivePreset('month'); 
            } catch (e) { console.error("Auth Guard Error:", e); }
        });
        
        // ... (rest of your existing code)
    </script>
</body>
</html>
