<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastor - Soulwinning Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>        
        button, .preset-btn, .type-btn, [role="button"] {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }
        button:active, .preset-btn:active, .type-btn:active, [role="button"]:active {
            transform: scale(0.97) !important;
        }

        /* DASH-ROW: Core Adaptive Logic */
        .dash-row {
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            width: 100% !important;
            border-radius: 1.25rem !important;
            padding: 1.25rem !important;
            margin-bottom: 0.75rem !important;
            transition: all 0.3s ease;
            background: rgba(30, 41, 59, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
        }

        /* Light Mode Clean Up */
        #main-html:not(.dark) .dash-row {
            background: white !important;
            border-color: rgba(0,0,0,0.05) !important;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05) !important;
        }
        #main-html:not(.dark) .dash-row span { color: #1e293b !important; }

        /* SURGICAL FIX: Unified Button Logic (Image ea4b29) */
        .dash-row.unified-button {
            padding: 0 !important;
            overflow: hidden !important;
            align-items: stretch !important;
        }
        .unified-button button {
            transform: none !important;
            background: transparent !important;
            box-shadow: none !important;
        }

        /* REPORT SECTION ADAPTATION (Image ec1542) */
        #main-html:not(.dark) .analytics-card {
            background: #f8fafc !important;
            border-color: rgba(0,0,0,0.05) !important;
        }
        #main-html:not(.dark) #stats-container > div {
            background: white !important;
            border-color: rgba(0,0,0,0.05) !important;
        }
        #main-html:not(.dark) thead { background: #f1f5f9 !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-2">
            <div class="w-10 h-8 bg-indigo-600 rounded-lg flex items-center justify-center overflow-hidden">
                <span class="font-bold text-white text-[10px] leading-none text-center">SWT</span>
            </div>
            <h1 class="text-lg brand-text"><span class="brand-word-1">Soulwinning</span><span class="brand-word-2">Tracker</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all">
                <i class="bi bi-sun-fill text-amber-400 dark:hidden"></i>
                <i class="bi bi-moon-stars-fill hidden dark:block text-indigo-300"></i>
            </button>
            <button onclick="handleLogout()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:text-red-500 transition-all ml-2">
                <i class="bi bi-box-arrow-right"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 pb-60">
        <header class="mb-10 flex flex-col items-center">
            <div id="role-display" class="badge-base badge-role mb-4 uppercase tracking-[0.3em] text-[10px] font-black opacity-50">PASTOR</div>
            <div class="flex items-center justify-center gap-2 mb-3">
                <h2 id="user-display-name" class="text-4xl font-extrabold tracking-tight">...</h2>
                <button onclick="openNameModal()" class="ml-2 w-8 h-8 inline-flex items-center justify-center rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-400 border border-slate-200 dark:border-slate-700 active:scale-90">
                    <i class="bi bi-pencil-fill text-[12px]"></i>
                </button>
            </div>
            <div id="church-list-tags" class="flex flex-wrap justify-center gap-2 mt-2"></div>
        </header>

        <div class="mb-12 space-y-3">
            <button onclick="openChurchManager()" class="dash-row group">
                <div class="flex items-center gap-4 text-left">
                    <div class="w-10 h-10 bg-emerald-500/10 text-emerald-400 rounded-xl flex items-center justify-center"><i class="bi bi-building-fill"></i></div>
                    <span class="text-sm font-bold">Manage churches & codes</span>
                </div>
                <i class="bi bi-chevron-right text-slate-600 group-hover:text-emerald-400"></i>
            </button>

            <div class="dash-row unified-button border dark:border-white/5">
                <button onclick="goToGuide()" class="flex-1 flex items-center gap-4 p-5 hover:bg-white/5 dark:hover:bg-white/5 transition-all text-left group">
                    <div class="w-10 h-10 bg-indigo-500/10 text-indigo-400 rounded-xl flex items-center justify-center group-hover:bg-indigo-500/20"><i class="bi bi-book-half"></i></div>
                    <span class="text-sm font-bold">Soulwinning guide</span>
                </button>
                <button onclick="openGuideSettings()" class="w-16 flex items-center justify-center hover:bg-white/5 border-l border-white/10 text-slate-500 hover:text-white transition-all">
                    <i class="bi bi-gear-fill"></i>
                </button>
            </div>
        </div>

        <div class="analytics-card bg-slate-900/40 p-8 rounded-[2.5rem] border border-white/5 shadow-2xl">
            <select id="churchFilter" class="w-full bg-[#1e293b] dark:bg-[#0f172a] border border-white/10 px-6 py-4 rounded-2xl text-xs font-bold mb-10 text-white outline-none text-center appearance-none shadow-inner">
                <option value="all">All My Churches</option>
            </select>
            <button onclick="loadStats()" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black text-[11px] uppercase tracking-widest active:scale-95 shadow-xl shadow-indigo-600/30 transition-all mt-4">Generate Report</button>
        </div>

        <div id="stats-container" class="hidden mt-12 animate-in fade-in slide-in-from-bottom-4 duration-700">
            <h3 id="reportDateLabel" class="text-indigo-400 font-black text-xs uppercase tracking-wider mb-6 text-center">...</h3>
            <div class="bg-[#0f172a] border border-white/5 rounded-[2.5rem] overflow-hidden shadow-2xl">
                <table class="w-full">
                    <thead class="bg-slate-900/60 border-b border-white/5 text-[9px] uppercase font-black tracking-[0.2em] text-slate-500">
                        <tr>
                            <th class="px-6 py-5 text-left">Type</th>
                            <th class="px-6 py-5 text-center">Total</th>
                            <th class="px-6 py-5 text-right">Participants</th>
                        </tr>
                    </thead>
                    <tbody id="matrix-body" class="divide-y divide-white/5 text-slate-300 font-bold text-[13px]"></tbody>
                    <tfoot class="bg-indigo-600/10 border-t-2 border-indigo-500/20">
                        <tr class="text-indigo-400 font-black">
                            <td class="px-6 py-7 text-left text-[9px] uppercase tracking-widest">GRAND TOTAL</td>
                            <td id="matrix-grand-souls" class="px-6 py-7 text-center text-xl italic">0</td>
                            <td id="matrix-grand-sw" class="px-6 py-7 text-right pr-10 text-xl italic">0</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 z-[110] bg-white/80 dark:bg-[#0f172a]/80 backdrop-blur-xl border-t border-slate-200 dark:border-slate-800 px-6 py-5 flex justify-center items-center">
        <button onclick="openModal()" class="w-16 h-16 bg-indigo-600 text-white rounded-full shadow-[0_10px_35px_rgba(79,70,229,0.5)] active:scale-90 transition-all duration-300">
            <i class="bi bi-plus-lg text-3xl"></i>
        </button>
    </div>

    <script type="module">
        /* ... (rest of your Firebase logic stays here) ... */
        window.loadStats = async () => {
            /* ... (keep existing logic) ... */
            for (const t of types) { 
                grandSouls += totals[t]; 
                html += `
                <tr class="hover:bg-slate-50 dark:hover:bg-white/5 transition-colors border-l-2 border-transparent hover:border-indigo-500">
                    <td class="px-6 py-6 text-left font-extrabold text-slate-600 dark:text-slate-400">${t}</td>
                    <td class="px-6 py-6 text-center font-black text-indigo-600 dark:text-indigo-400 text-lg">${totals[t].toLocaleString()}</td>
                    <td class="px-6 py-6 text-right pr-10 font-black text-slate-600 dark:text-slate-300 text-lg">${participants[t].size}</td>
                </tr>`; 
            }
            matrixBody.innerHTML = html;
            document.getElementById('matrix-grand-souls').innerText = grandSouls.toLocaleString();
            document.getElementById('matrix-grand-sw').innerText = globalUnique.size.toLocaleString();
        };
    </script>
</body>
</html>
