<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastor - Soulwinning Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-2">
            <div class="w-10 h-8 bg-indigo-600 rounded-lg flex items-center justify-center overflow-hidden">
                <span class="font-bold text-white text-[10px] leading-none text-center">SWT</span>
            </div>
            <h1 class="text-lg brand-text"><span class="brand-word-1">Soulwinning</span><span class="brand-word-2">Tracker</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all">
                <svg id="sun-icon" class="w-5 h-5 hidden text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
                <svg id="moon-icon" class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
            </button>
            <button onclick="handleLogout()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:text-red-500 transition-all ml-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 pb-40 text-center">
        <header class="mb-10">
            <div id="role-display" class="badge-base badge-role mb-2 uppercase tracking-widest font-bold">PASTOR</div>
            <div class="flex items-center justify-center gap-2 mb-3">
                <h2 id="user-display-name" class="text-4xl font-extrabold tracking-tight">...</h2>
                <button onclick="openNameModal()" class="text-slate-400 hover:text-indigo-600 transition-all"><i class="bi bi-pencil-square text-xl"></i></button>
            </div>
            <div id="church-list-tags" class="flex flex-wrap justify-center gap-2 mt-2"></div>
            
            <div class="mt-10 max-w-sm mx-auto space-y-8">
                <div>
                    <label class="block text-[12px] font-bold text-slate-400 uppercase mb-3 tracking-widest">Personal</label>
                    <div class="p-8 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[3rem] shadow-sm flex flex-col gap-4">
                        <button onclick="window.location.href='prospects.html'" class="w-full flex items-center justify-center gap-3 py-5 bg-indigo-600 text-white rounded-2xl text-[10px] font-black uppercase transition-all shadow-lg active:scale-95">Record Prospect Contacts</button>
                        <button onclick="window.location.href='history.html'" class="w-full flex items-center justify-center gap-2 py-4 bg-indigo-600 text-white rounded-2xl text-[10px] font-bold uppercase transition-all active:scale-95">My History</button>
                        <button onclick="openPasswordModal()" class="w-full flex items-center justify-center gap-2 py-4 bg-slate-100 dark:bg-slate-800/50 text-slate-500 rounded-2xl text-[10px] font-bold uppercase transition-all active:scale-95">Change Password</button>
                    </div>
                </div>

                <div>
                    <label class="block text-[12px] font-bold text-slate-400 uppercase mb-3 tracking-widest text-center">Reports</label>
                    <div class="p-6 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[2.5rem] shadow-sm">
                        <select id="churchFilter" class="w-full bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 px-4 py-3 rounded-2xl text-xs font-bold mb-6 dark:text-white outline-none">
                            <option value="all">All My Churches</option>
                        </select>

                        <div class="space-y-6">
                            <div>
                                <label class="block text-[9px] font-bold text-slate-400 uppercase mb-3 tracking-widest text-center">Soulwinning Type</label>
                                <div class="flex gap-2">
                                    <button id="type-all" onclick="setActiveType('all')" class="type-btn flex-1 py-3 bg-indigo-600 text-white border rounded-2xl text-[10px] font-bold uppercase transition-all">All</button>
                                    <button id="type-Regular" onclick="setActiveType('Regular')" class="type-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800 border rounded-2xl text-[10px] font-bold uppercase text-slate-500 transition-all">Regular</button>
                                    <button id="type-School" onclick="setActiveType('School')" class="type-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800 border rounded-2xl text-[10px] font-bold uppercase text-slate-500 transition-all">School</button>
                                    <button id="type-Event" onclick="setActiveType('Event')" class="type-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800 border rounded-2xl text-[10px] font-bold uppercase text-slate-500 transition-all">Event</button>
                                </div>
                            </div>

                            <div>
                                <label class="block text-[9px] font-bold text-slate-400 uppercase mb-3 tracking-widest text-center">Quick Presets</label>
                                <div class="flex gap-2">
                                    <button id="btn-today" onclick="setActivePreset('today')" class="preset-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800 rounded-2xl text-[10px] font-bold uppercase text-slate-500 transition-all">Today</button>
                                    <button id="btn-week" onclick="setActivePreset('week')" class="preset-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800 rounded-2xl text-[10px] font-bold uppercase text-slate-500 transition-all">Week</button>
                                    <button id="btn-month" onclick="setActivePreset('month')" class="preset-btn flex-1 py-3 bg-indigo-600 text-white rounded-2xl text-[10px] font-bold uppercase transition-all">Month</button>
                                </div>
                            </div>

                            <div class="border-t dark:border-slate-800 pt-4">
                                <label class="block text-[9px] font-bold text-slate-400 uppercase mb-4 tracking-widest text-center">Custom Selection</label>
                                <div class="grid grid-cols-2 gap-3">
                                    <input type="date" id="customDate" oninput="handleCustomInput('date')" class="bg-slate-50 dark:bg-slate-800 border p-3 rounded-xl text-[10px] font-bold dark:text-white">
                                    <input type="month" id="customMonth" oninput="handleCustomInput('month')" class="bg-slate-50 dark:bg-slate-800 border p-3 rounded-xl text-[10px] font-bold dark:text-white">
                                </div>
                            </div>

                            <button onclick="loadStats()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold text-xs uppercase shadow-lg shadow-indigo-500/20 active:scale-95 transition-all">Generate Report</button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div id="stats-container" class="hidden mt-10">
            <div class="mb-6">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center mb-1">Report Data for</label>
                <h3 id="reportDateLabel" class="text-indigo-500 font-bold text-sm uppercase tracking-wider">...</h3>
            </div>
            <div class="p-10 bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[3rem] shadow-sm">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-8">
                    <div class="text-center py-4">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-2 tracking-widest">Total Salvations</p>
                        <span id="totalSouls" class="text-6xl font-black text-indigo-600">0</span>
                    </div>
                    <div class="text-center py-4 border-t sm:border-t-0 sm:border-l dark:border-slate-800">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-2 tracking-widest">Participating Members</p>
                        <span id="totalSW" class="text-6xl font-black text-indigo-600">0</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6 hidden z-[120]">
        <div class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 border text-center shadow-2xl">
            <h3 class="text-xl font-bold mb-6 dark:text-white">Log Salvation</h3>
            <select id="soulType" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border rounded-2xl text-sm mb-4 font-bold">
                <option value="Regular" selected>Regular</option><option value="School">School</option><option value="Event">Event</option>
            </select>
            <div class="flex items-center justify-between mb-6 bg-slate-50 dark:bg-slate-800/50 p-3 rounded-3xl">
                <button onclick="decrement()" class="w-12 h-12 rounded-2xl bg-white dark:bg-slate-700 font-bold text-xl">-</button>
                <input id="soulCount" type="number" value="1" readonly class="w-20 text-center text-5xl font-light bg-transparent text-indigo-600">
                <button onclick="increment()" class="w-12 h-12 rounded-2xl bg-indigo-600 text-white font-bold text-xl">+</button>
            </div>
            <input id="soulDateTime" type="datetime-local" class="w-full p-4 bg-slate-50 dark:bg-slate-800 border rounded-2xl text-sm mb-4 outline-none">
            <input id="soulNote" type="text" placeholder="Notes..." class="w-full p-4 bg-slate-50 dark:bg-slate-800 border rounded-2xl text-sm mb-8 outline-none">
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 py-4 text-slate-400 font-bold uppercase text-xs">Cancel</button>
                <button id="submit-btn" onclick="handleDataSubmit()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold uppercase text-xs">Submit</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-500 z-[250] pointer-events-none text-sm font-bold"></div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, setDoc, updateDoc, arrayUnion, addDoc, serverTimestamp, getAggregateFromServer, sum, collection, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let userProfile = null; 
        let churchNames = {};
        let currentPreset = 'month';
        let currentType = 'all';

        // --- TYPE SELECT LOGIC ---
        window.setActiveType = (type) => {
            currentType = type;
            document.querySelectorAll('.type-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-lg');
                btn.classList.add('bg-slate-100', 'dark:bg-slate-800', 'text-slate-500');
            });
            const activeBtn = document.getElementById(`type-${type}`);
            activeBtn.classList.remove('bg-slate-100', 'dark:bg-slate-800', 'text-slate-500');
            activeBtn.classList.add('bg-indigo-600', 'text-white', 'shadow-lg');
        };

        // --- SUBMISSION (TYPE-SENSITIVE BUCKETS) ---
        window.handleDataSubmit = async () => {
            const type = document.getElementById('soulType').value;
            if (!userProfile?.churchId?.length) return showToast("No church linked.");
            const btn = document.getElementById('submit-btn'); btn.disabled = true;
            try {
                const uid = auth.currentUser.uid; const churchId = userProfile.churchId[0];
                const eventDateStr = document.getElementById('soulDateTime').value;
                const dateId = eventDateStr.split('T')[0]; const monthId = dateId.substring(0, 7);
                
                await addDoc(collection(db, "salvations"), { 
                    count: Number(document.getElementById('soulCount').value), type, 
                    eventDate: eventDateStr, userId: uid, churchId, timestamp: serverTimestamp() 
                });

                // PORTED: Save to specific type bucket
                const typeKey = `${type}_members`; 
                const statsUpdate = {}; statsUpdate[typeKey] = arrayUnion(uid);

                await setDoc(doc(db, `churches/${churchId}/daily_stats`, dateId), statsUpdate, { merge: true });
                await setDoc(doc(db, `churches/${churchId}/monthly_stats`, monthId), statsUpdate, { merge: true });
                
                closeModal(); showToast("Record Saved.");
            } catch(e) { showToast("Error saving."); } finally { btn.disabled = false; }
        };

        // --- STATS (FILTER-AWARE) ---
        window.loadStats = async () => {
            if (!userProfile?.churchId?.length) return;
            const selCh = document.getElementById('churchFilter').value;
            const cDate = document.getElementById('customDate').value;
            const cMonth = document.getElementById('customMonth').value;
            document.getElementById('stats-container').classList.remove('hidden');
            
            const churchIds = (selCh === 'all') ? userProfile.churchId : [selCh];
            let constraints = [where("churchId", "in", churchIds)];
            if (currentType !== 'all') constraints.push(where("type", "==", currentType));

            let bucketPaths = [];
            if (cDate) { bucketPaths.push(`daily_stats/${cDate}`); constraints.push(where("eventDate", ">=", cDate + "T00:00"), where("eventDate", "<=", cDate + "T23:59")); }
            else if (cMonth) { bucketPaths.push(`monthly_stats/${cMonth}`); constraints.push(where("eventDate", ">=", cMonth + "-01T00:00"), where("eventDate", "<=", cMonth + "-31T23:59")); }
            else if (currentPreset === 'month') { const m = new Date().toISOString().substring(0, 7); bucketPaths.push(`monthly_stats/${m}`); constraints.push(where("eventDate", ">=", m + "-01T00:00"), where("eventDate", "<=", m + "-31T23:59")); }

            try {
                const soulSnap = await getAggregateFromServer(query(collection(db, "salvations"), ...constraints), { total: sum('count') });
                document.getElementById('totalSouls').innerText = soulSnap.data().total || "0";
                
                let uniqueUIDs = new Set();
                for (const chId of churchIds) {
                    for (const path of bucketPaths) {
                        const bSnap = await getDoc(doc(db, `churches/${chId}/${path}`));
                        if (bSnap.exists()) {
                            const d = bSnap.data();
                            if (currentType === 'all') {
                                (d.Regular_members || []).forEach(id => uniqueUIDs.add(id));
                                (d.School_members || []).forEach(id => uniqueUIDs.add(id));
                                (d.Event_members || []).forEach(id => uniqueUIDs.add(id));
                            } else {
                                (d[`${currentType}_members`] || []).forEach(id => uniqueUIDs.add(id));
                            }
                        }
                    }
                }
                document.getElementById('totalSW').innerText = uniqueUIDs.size;
            } catch(e) { console.error(e); }
        };

        // Standard Utility Bindings...
        window.increment = () => document.getElementById('soulCount').value++;
        window.decrement = () => { if(document.getElementById('soulCount').value > 1) document.getElementById('soulCount').value--; };
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        window.handleLogout = () => { sessionStorage.clear(); signOut(auth).then(() => window.location.replace("index.html")); };
        
        onAuthStateChanged(auth, async (user) => {
            if (!user) return;
            const snap = await getDoc(doc(db, "profiles", user.uid));
            userProfile = snap.data();
            document.getElementById('user-display-name').innerText = userProfile.displayName;
            setActivePreset('month'); setActiveType('all');
        });
    </script>
</body>
</html>
