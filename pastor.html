<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">

    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>        
        button, .preset-btn, .type-btn, [role="button"] {
            transition: all 0.3s ease-in-out !important;
        }
        button:active, .preset-btn:active, .type-btn:active, [role="button"]:active {
            transform: scale(0.98) !important;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.1) !important;
        }

        /* DASH-ROW Core logic */
        .dash-row {
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            width: 100% !important;
            border-radius: 1.25rem !important;
            padding: 1.25rem !important;
            margin-bottom: 0.75rem !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(30, 41, 59, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
        }

        /* Light Mode Adaptation */
        #main-html:not(.dark) .dash-row,
        #main-html:not(.dark) .bg-slate-900\/40 {
            background: white !important;
            border: 1px solid rgba(0, 0, 0, 0.05) !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.03) !important;
        }

        #main-html:not(.dark) .dash-row:hover { background: #f8fafc !important; }
        #main-html:not(.dark) .dash-row span { color: #1e293b !important; }
        #main-html:not(.dark) .dash-row i { color: #64748b !important; }
        #main-html:not(.dark) .bg-\[\#0f172a\] { background: #f1f5f9 !important; border: 1px solid rgba(0,0,0,0.05) !important; }

        /* SURGICAL FIX: Unified Guide Button (Image ea4b29) */
        .dash-row.unified-button {
            padding: 0 !important;
            overflow: hidden !important;
            align-items: stretch !important;
        }
        .unified-button button {
            transform: none !important;
            box-shadow: none !important;
            background: transparent !important;
        }
        
        #main-html:not(.dark) .unified-button span { color: #1e293b !important; }
        #main-html:not(.dark) .unified-button i { color: #64748b !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-10">

                <svg id="moon-icon" class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
            </button>
            <button onclick="handleLogout()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:text-red-500 transition-all ml-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
            </button>
        </div>
    </nav>

        </div>

        <div>
            <div class="flex items-center gap-4 mb-6 px-4">

                <div class="h-[1px] flex-1 bg-white/5"></div>

            <div class="bg-slate-900/40 p-8 rounded-[2.5rem] border border-white/5 shadow-2xl">
                <select id="churchFilter" class="w-full bg-[#0f172a] dark:bg-[#0f172a] border border-white/10 px-6 py-4 rounded-2xl text-xs font-bold mb-10 text-white outline-none text-center appearance-none shadow-inner">
                    <option value="all">All My Churches</option>

                <div class="space-y-12">
                    <div>

                        </tr>

    <div class="fixed bottom-0 left-0 right-0 z-[110] bg-white/80 dark:bg-[#0f172a]/80 backdrop-blur-xl border-t border-slate-200 dark:border-slate-800 px-6 py-5">

        </div>

            <h2 class="text-xl font-bold dark:text-white mb-2 text-center">Guide Settings</h2>

                <button onclick="decrement()" class="w-14 h-14 flex-shrink-0 rounded-2xl bg-white dark:bg-slate-700 font-bold text-xl hover:bg-slate-100 dark:text-white transition-all flex items-center justify-center">-</button>
                <input id="soulCount" type="number" value="1" min="1" max="999" class="w-full text-center text-5xl font-light bg-transparent text-indigo-600 outline-none">

        <div class="bg-[#111827] border border-white/5 w-full max-md rounded-[2.5rem] p-8 shadow-2xl text-center">

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-500 z-[400] pointer-events-none text-sm font-bold"></div>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged, signOut, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, getDoc, setDoc, updateDoc, arrayUnion, serverTimestamp, getAggregateFromServer, sum, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let userProfile = null; 
        let churchNames = {};
        let currentPreset = 'month';
        let currentType = 'all';

        const initYearSelector = () => {
            const yearSelect = document.getElementById('customYear');
            if (!yearSelect) return;
            const currentYear = new Date().getFullYear();
            const startYear = 2024;
            let options = '<option value="" disabled selected>YYYY</option>';
            for (let y = currentYear; y >= startYear; y--) { options += `<option value="${y}">${y}</option>`; }
            yearSelect.innerHTML = options;
        };
        
        const initTheme = () => {
            const isDark = localStorage.getItem('theme') === 'dark';
            const html = document.getElementById('main-html');
            const sun = document.getElementById('sun-icon');
            const moon = document.getElementById('moon-icon');
            if (isDark) { html.classList.add('dark'); sun?.classList.remove('hidden'); moon?.classList.add('hidden'); }
            else { html.classList.remove('dark'); sun?.classList.add('hidden'); moon?.classList.remove('hidden'); }
        };

        initTheme();
        initYearSelector();
        
        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            if(!t) return;
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-10'), 3000);
        };

        window.toggleDarkMode = () => {
            const html = document.getElementById('main-html');
            const sun = document.getElementById('sun-icon');
            const moon = document.getElementById('moon-icon');
            const isDark = html.classList.toggle('dark');
            sun?.classList.toggle('hidden', !isDark);
            moon?.classList.toggle('hidden', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };
        
        window.openNameModal = () => { document.getElementById('newNameInput').value = userProfile?.displayName || ""; document.getElementById('nameModal').classList.remove('hidden'); };
        window.closeNameModal = () => document.getElementById('nameModal').classList.add('hidden');
        window.saveDisplayName = async () => {
            const newName = document.getElementById('newNameInput').value.trim();
            if (!newName) return showToast("Name required.");
            try {
                await updateDoc(doc(db, "profiles", auth.currentUser.uid), { displayName: newName });
                userProfile.displayName = newName;
                sessionStorage.setItem('userContext', JSON.stringify(userProfile));
                document.getElementById('user-display-name').innerText = newName;
                showToast("Name updated!"); closeNameModal();
            } catch (e) { showToast("Error updating name."); }
        };

        window.openGuideSettings = () => { document.getElementById('guideUrlInput').value = userProfile?.guideUrl || ""; document.getElementById('guideSettingsModal').classList.remove('hidden'); };
        window.closeGuideSettings = () => document.getElementById('guideSettingsModal').classList.add('hidden');
        window.saveGuideUrl = async () => {
            const url = document.getElementById('guideUrlInput').value.trim();
            if (!url) return showToast("⚠️ URL required.");
            try {
                await updateDoc(doc(db, "profiles", auth.currentUser.uid), { guideUrl: url });
                userProfile.guideUrl = url;
                sessionStorage.setItem('userContext', JSON.stringify(userProfile));
                showToast("✅ Guide synced!"); closeGuideSettings();
            } catch (e) { showToast("❌ Error saving."); } 
        };

        window.goToGuide = () => { if (!userProfile?.guideUrl) return showToast("⚠️ No guide set."); window.location.href = "guide.html"; };

        window.setActiveType = (type) => {
            currentType = type;
            const inactive = "type-btn flex-1 py-3 bg-slate-800/40 text-slate-500 rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 active:scale-95";
            const active = "type-btn flex-1 py-3 bg-indigo-600 text-white border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 active:scale-95 shadow-lg";
            document.querySelectorAll('.type-btn').forEach(btn => btn.className = inactive);
            const activeBtn = document.getElementById(`type-${type}`);
            if (activeBtn) activeBtn.className = active;
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { sessionStorage.clear(); window.location.replace("index.html"); return; }
            const cachedData = sessionStorage.getItem('userContext');
            if (cachedData) {
                userProfile = JSON.parse(cachedData);
                document.getElementById('user-display-name').innerText = userProfile.displayName || "Pastor";
                await renderChurchUI(); 
            } else {
                const snap = await getDoc(doc(db, "profiles", user.uid));
                if (!snap.exists()) return window.location.replace("index.html");
                userProfile = snap.data();
                document.getElementById('user-display-name').innerText = userProfile.displayName || "Pastor";
                await refreshUI();
            }
            setActivePreset('month'); setActiveType('all');
        });

        async function refreshUI() {
            const filter = document.getElementById('churchFilter');
            const tagContainer = document.getElementById('church-list-tags');
            filter.innerHTML = '<option value="all">All My Churches</option>';
            churchNames = {}; let tagsHtml = "";
            for(const code of (userProfile.churchId || [])) {
                const d = await getDoc(doc(db, "churches", code));
                if(d.exists()) {
                    const name = d.data().name; churchNames[code] = name;
                    tagsHtml += `<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">${name}</span>`;
                    filter.innerHTML += `<option value="${code}">${name}</option>`;
                }
            }
            tagContainer.innerHTML = tagsHtml; userProfile.churchNames = churchNames;
            sessionStorage.setItem('userContext', JSON.stringify(userProfile));
        }

        async function renderChurchUI() {
            const filter = document.getElementById('churchFilter');
            const tagContainer = document.getElementById('church-list-tags');
            churchNames = userProfile.churchNames; let tagsHtml = "";
            filter.innerHTML = '<option value="all">All My Churches</option>';
            Object.entries(churchNames || {}).forEach(([code, name]) => {
                tagsHtml += `<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">${name}</span>`;
                filter.innerHTML += `<option value="${code}">${name}</option>`;
            });
            tagContainer.innerHTML = tagsHtml;
        }

        window.loadStats = async () => {
            if (!userProfile?.churchId?.length) return showToast("No linked churches."); 
            const selCh = document.getElementById('churchFilter').value;
            const cDate = document.getElementById('customDate').value;
            const cMonth = document.getElementById('customMonth').value;
            const cYear = document.getElementById('customYear').value;
            const dateLabel = document.getElementById('reportDateLabel');
            const matrixBody = document.getElementById('matrix-body');
            document.getElementById('stats-container').classList.remove('hidden');
            matrixBody.innerHTML = '<tr><td colspan="3" class="py-10 italic text-slate-400 text-center uppercase tracking-widest text-[10px]">Loading...</td></tr>';
            try {
                const now = new Date(); let startLimit = ""; let endLimit = ""; let bucketPaths = [];
                const getLocalDateStr = (d) => d.toLocaleDateString('en-CA');
                if (cDate) { startLimit = cDate + "T00:00"; endLimit = cDate + "T23:59"; dateLabel.innerText = new Date(cDate).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }); bucketPaths.push(`daily_stats/${cDate}`); }
                else if (cMonth) { startLimit = cMonth + "-01T00:00"; endLimit = cMonth + "-31T23:59"; dateLabel.innerText = new Date(cMonth + "-01").toLocaleDateString('en-US', { month: 'long', year: 'numeric' }); bucketPaths.push(`monthly_stats/${cMonth}`); }
                else if (cYear) { dateLabel.innerText = `Yearly Report: ${cYear}`; startLimit = `${cYear}-01-01T00:00`; endLimit = `${cYear}-12-31T23:59`; }
                else if (currentPreset === 'today') { const str = getLocalDateStr(now); startLimit = str + "T00:00"; endLimit = str + "T23:59"; dateLabel.innerText = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); bucketPaths.push(`daily_stats/${str}`); }
                else if (currentPreset === 'week') { let s = new Date(now); now.getDay() === 0 ? s.setDate(now.getDate() - 7) : s.setDate(now.getDate() - now.getDay()); let e = new Date(s); e.setDate(s.getDate() + 6); dateLabel.innerText = `${s.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} – ${e.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`; startLimit = getLocalDateStr(s) + "T00:00"; endLimit = getLocalDateStr(e) + "T23:59"; for(let i=0; i<7; i++) { let d = new Date(s); d.setDate(s.getDate() + i); bucketPaths.push(`daily_stats/${getLocalDateStr(d)}`); } }
                else if (currentPreset === 'month') { const str = getLocalDateStr(now).substring(0, 7); startLimit = str + "-01T00:00"; endLimit = str + "-31T23:59"; dateLabel.innerText = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }); bucketPaths.push(`monthly_stats/${str}`); }
                const churchIds = (selCh === 'all') ? userProfile.churchId : [selCh];
                const types = currentType === 'all' ? ['Regular', 'School', 'Event'] : [currentType];
                const totals = {}; const participants = {}; const globalUnique = new Set();
                for (const t of types) {
                    const snap = await getAggregateFromServer(query(collection(db, "salvations"), where("churchId", "in", churchIds), where("eventDate", ">=", startLimit), where("eventDate", "<=", endLimit), where("type", "==", t)), { total: sum('count') });
                    totals[t] = snap.data().total || 0; participants[t] = new Set();
                }
                for (const chId of churchIds) {
                    if (cYear) { const dailyRef = collection(db, `churches/${chId}/daily_stats`); const q = query(dailyRef, where("__name__", ">=", `${cYear}-01-01`), where("__name__", "<=", `${cYear}-12-31`)); const qSnap = await getDocs(q); qSnap.forEach(bSnap => { const data = bSnap.data(); types.forEach(t => { (data[`${t}_members`] || []).forEach(id => { participants[t].add(id); globalUnique.add(id); }); }); }); }
                    else { for (const path of bucketPaths) { const bSnap = await getDoc(doc(db, `churches/${chId}/${path}`)); if (bSnap.exists()) { const data = bSnap.data(); types.forEach(t => { (data[`${t}_members`] || []).forEach(id => { participants[t].add(id); globalUnique.add(id); }); }); } } }
                }
                let html = ""; let grandSouls = 0;
                for (const t of types) { 
                    grandSouls += totals[t]; 
                    html += `
                        <tr class="hover:bg-slate-50 dark:hover:bg-white/5 transition-colors">
                            <td class="px-6 py-6 text-left font-extrabold text-slate-500 dark:text-slate-400">${t}</td>
                            <td class="px-6 py-6 text-center font-black text-indigo-600 dark:text-indigo-400 text-lg">${totals[t].toLocaleString()}</td>
                            <td class="px-6 py-6 text-right pr-10 font-black text-slate-600 dark:text-slate-300 text-lg">${participants[t].size}</td>
                        </tr>`; 
                }
                matrixBody.innerHTML = html;
                document.getElementById('matrix-grand-souls').innerText = grandSouls.toLocaleString();
                document.getElementById('matrix-grand-sw').innerText = globalUnique.size.toLocaleString();
            } catch (e) { console.error(e); showToast("Load Error."); }
        };

        window.setActivePreset = (p) => {
            currentPreset = p; document.getElementById('customDate').value = ""; document.getElementById('customMonth').value = "";
            const inactive = "preset-btn flex-1 py-4 bg-slate-100 dark:bg-slate-800/50 text-slate-500 rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 active:scale-95";
            const active = "preset-btn flex-1 py-4 bg-indigo-600 text-white border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 active:scale-95 shadow-lg shadow-indigo-500/50";
            document.querySelectorAll('.preset-btn').forEach(btn => btn.className = inactive);
            const activeBtn = document.getElementById(`btn-${p}`);
            if (activeBtn) activeBtn.className = active;
        };

        window.handleCustomInput = (type) => { currentPreset = null; document.querySelectorAll('.preset-btn').forEach(btn => btn.className = "preset-btn flex-1 py-4 bg-slate-100 dark:bg-slate-800/50 text-slate-500 rounded-2xl text-[10px] font-bold uppercase"); };
        window.handleLogout = () => { sessionStorage.clear(); signOut(auth).then(() => window.location.replace("index.html")); };
        window.closeChurchManager = () => document.getElementById('church-modal').classList.add('hidden');
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        window.openPasswordModal = () => document.getElementById('password-modal').classList.remove('hidden');
        window.closePasswordModal = () => document.getElementById('password-modal').classList.add('hidden');
        window.limitInput = (el) => { let val = parseInt(el.value); if (val > 999) el.value = 999; if (val < 1) el.value = 1; };
        window.increment = () => { const el = document.getElementById('soulCount'); el.value = (parseInt(el.value) || 0) + 1; };
        window.decrement = () => { const el = document.getElementById('soulCount'); if (parseInt(el.value) > 1) el.value = (parseInt(el.value) || 0) - 1; };

        window.addNewChurch = async () => {
            const n = document.getElementById('newChurchName').value.trim(); if(!n) return;
            try {
                const q = query(collection(db, "churches"), where("name_lowercase", "==", n.toLowerCase()));
                const querySnapshot = await getDocs(q);
                if (!querySnapshot.empty) return showToast("❌ Church name exists!");
                const c = Math.random().toString(36).substring(2, 8).toUpperCase();
                await setDoc(doc(db, "churches", c), { name: n, name_lowercase: n.toLowerCase(), pastorId: auth.currentUser.uid, createdAt: serverTimestamp() });
                await updateDoc(doc(db, "profiles", auth.currentUser.uid), { churchId: arrayUnion(c) });
                userProfile.churchId.push(c); await refreshUI(); openChurchManager(); showToast("✅ Added");
            } catch(e) { showToast("❌ Error"); }
        };

        window.openChurchManager = () => {
            const list = document.getElementById('church-list'); list.innerHTML = "";
            userProfile.churchId.forEach(c => {
                const name = churchNames[c] || 'Church';
                list.innerHTML += `<div class="p-3 bg-white/5 border border-white/5 rounded-xl flex justify-between items-center mb-2"><div><p class="text-[9px] font-bold text-emerald-500 uppercase">${name}</p><p class="text-base font-mono font-bold text-white">${c}</p></div><button onclick="navigator.clipboard.writeText('${c}'); showToast('Copied!');" class="text-xs font-bold text-slate-500">Copy</button></div>`;
            });
            document.getElementById('church-modal').classList.remove('hidden');
        };

        window.openModal = () => { 
            if (!userProfile?.churchId?.length) return showToast("⚠️ No church found.");
            document.getElementById('modal').classList.remove('hidden'); 
            document.getElementById('soulDateTime').value = new Date(Date.now() - new Date().getTimezoneOffset()*60000).toISOString().slice(0, 16); 
            document.getElementById('soulType').value = ""; document.getElementById('soulCount').value = 1; document.getElementById('soulNote').value = "";
        };
    </script>
</body>
</html>
