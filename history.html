<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My History - Soulwinning Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>tailwind.config = { darkMode: 'class' }</script>

    <style>        
        button, .preset-btn, .type-btn, [role="button"] {
            transition: all 0.3s ease-in-out !important;
            box-sizing: border-box !important;
            border: 1px solid transparent;
        }
        button:active, .preset-btn:active, .type-btn:active, [role="button"]:active {
            transform: scale(0.98) !important;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.1) !important;
        }
    
        .dash-row {
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            width: 100% !important;
            border-radius: 1.25rem !important;
            padding: 1.25rem !important;
            margin-bottom: 0.75rem !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(30, 41, 59, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
        }
    
        #main-html:not(.dark) .dash-row {
            background: white !important;
            border: 1px solid rgba(0, 0, 0, 0.05) !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.03) !important;
        }
    
        .dash-row:hover { background: rgba(30, 41, 59, 0.7) !important; }
        #main-html:not(.dark) .dash-row:hover { background: #f8fafc !important; transform: translateY(-1px); }
    
        #main-html:not(.dark) .dash-row span,
        #main-html:not(.dark) .text-slate-300 { color: #1e293b !important; }
        #main-html:not(.dark) .dash-row i { color: #64748b !important; }

        /* LIGHT MODE THEME INTEGRITY */
        #main-html:not(.dark) .bg-[#111827], 
        #main-html:not(.dark) .bg-[#0f172a] { 
            background: white !important; 
            border: 1px solid rgba(0,0,0,0.05) !important;
        }
        #main-html:not(.dark) .modal-content { background: white !important; color: #1e293b !important; }
        #main-html:not(.dark) .text-slate-900 { color: #1e293b !important; }
        #main-html:not(.dark) .text-slate-400 { color: #64748b !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 transition-colors duration-300">

    <nav class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-[100] w-full">
        <div class="flex items-center gap-2">
            <button onclick="window.history.back()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all mr-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-600 dark:text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 19l-7-7 7-7" /></svg>
            </button>
            <div class="w-10 h-8 bg-indigo-600 rounded-lg flex items-center justify-center overflow-hidden">
                <span class="font-bold text-white text-[10px] leading-none text-center">SWT</span>
            </div>
            <h1 class="text-lg brand-text"><span class="brand-word-1">Soulwinning</span><span class="brand-word-2">Tracker</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all">
                <svg id="sun-icon" class="w-5 h-5 hidden text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
                <svg id="moon-icon" class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6 pb-20">
        <header class="mb-12 flex flex-col items-center text-center">
            <div id="role-display" class="mb-4 px-4 py-1 rounded-full bg-indigo-500/10 text-indigo-500 border border-indigo-500/20 uppercase tracking-[0.3em] text-[10px] font-black">...</div>
            <h2 id="user-display-name" class="text-4xl font-extrabold tracking-tight mb-3 text-slate-900 dark:text-white">...</h2>
            <div id="church-list-tags" class="flex flex-wrap justify-center gap-2 mt-2"></div>
        </header>

        <div class="space-y-12 px-2">
            <div>
                <label class="block text-[11px] font-black text-slate-500 uppercase mb-4 tracking-widest text-center">Soulwinning Type</label>
                <div class="flex gap-2">
                    <button id="type-all" onclick="setActiveType('all')" class="type-btn flex-1 py-4 bg-indigo-600 text-white rounded-xl text-[10px] font-black uppercase shadow-lg shadow-indigo-600/50">All</button>
                    <button id="type-Regular" onclick="setActiveType('Regular')" class="type-btn flex-1 py-4 bg-slate-100 dark:bg-slate-800/40 text-slate-500 rounded-xl text-[10px] font-bold uppercase transition-all">Regular</button>
                    <button id="type-School" onclick="setActiveType('School')" class="type-btn flex-1 py-4 bg-slate-100 dark:bg-slate-800/40 text-slate-500 rounded-xl text-[10px] font-bold uppercase transition-all">School</button>
                    <button id="type-Event" onclick="setActiveType('Event')" class="type-btn flex-1 py-4 bg-slate-100 dark:bg-slate-800/40 text-slate-500 rounded-xl text-[10px] font-bold uppercase transition-all">Event</button>
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-black text-slate-500 uppercase mb-4 tracking-widest text-center">Quick Presets</label>
                <div class="flex gap-2">
                    <button id="btn-today" onclick="setActivePreset('today')" class="preset-btn flex-1 py-4 bg-slate-100 dark:bg-slate-800/50 text-slate-500 rounded-xl text-[10px] font-bold uppercase transition-all">Today</button>
                    <button id="btn-week" onclick="setActivePreset('week')" class="preset-btn flex-1 py-4 bg-slate-100 dark:bg-slate-800/50 text-slate-500 rounded-xl text-[10px] font-bold uppercase transition-all">Week</button>
                    <button id="btn-month" onclick="setActivePreset('month')" class="preset-btn flex-1 py-4 bg-indigo-600 text-white rounded-xl text-[10px] font-bold uppercase shadow-lg shadow-indigo-500/50 transition-all">Month</button>
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-black text-slate-500 uppercase mb-4 tracking-widest text-center">Custom Selection</label>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-2 px-1 text-center">
                    <div class="flex flex-col gap-2">
                        <label class="text-[9px] font-bold text-slate-500 uppercase">Specific Day</label>
                        <input type="date" id="customDate" oninput="handleCustomInput('date')" class="w-full bg-slate-50 dark:bg-[#0f172a] border border-slate-200 dark:border-white/5 p-3 rounded-xl text-[12px] font-bold text-slate-900 dark:text-white outline-none transition-all duration-300 text-center h-[52px]">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="text-[9px] font-bold text-slate-500 uppercase">Specific Month</label>
                        <input type="month" id="customMonth" oninput="handleCustomInput('month')" class="w-full bg-slate-50 dark:bg-[#0f172a] border border-slate-200 dark:border-white/5 p-3 rounded-xl text-[12px] font-bold text-slate-900 dark:text-white outline-none transition-all duration-300 text-center h-[52px]">
                    </div>
                </div>
                <button onclick="loadHistory()" class="w-full mt-8 py-5 bg-indigo-600 text-white rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-xl shadow-indigo-600/30 active:scale-95 transition-all">Fetch Records</button>
            </div>
        </div>

        <div id="results-area" class="hidden mt-20 animate-in fade-in slide-in-from-bottom-4 duration-700">
            <div class="grid grid-cols-2 gap-4 mb-10 text-center">
                <div class="bg-white dark:bg-[#111827] p-8 rounded-[1.5rem] border dark:border-slate-800 shadow-sm">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] mb-1">Logs</p>
                    <span id="stat-reports" class="text-4xl font-black dark:text-white text-slate-900">0</span>
                </div>
                <div class="bg-white dark:bg-[#111827] p-8 rounded-[1.5rem] border dark:border-slate-800 shadow-sm">
                    <p class="text-[9px] font-black text-indigo-400 uppercase tracking-[0.2em] mb-1">Total Salvations</p>
                    <span id="stat-souls" class="text-4xl font-black text-indigo-500">0</span>
                </div>
            </div>

            <div class="bg-white dark:bg-[#0f172a] rounded-[1.5rem] border border-slate-200 dark:border-white/5 overflow-hidden shadow-2xl">
                <table class="w-full table-fixed">
                    <thead class="bg-indigo-600/10 border-b border-slate-200 dark:border-white/5 text-[10px] uppercase font-black tracking-[0.2em] text-indigo-400/80">
                        <tr>
                            <th class="px-6 py-6 text-center w-1/5">Date</th>
                            <th class="px-6 py-6 text-center w-1/5">Type</th>
                            <th class="px-6 py-6 text-center w-1/5">Count</th>
                            <th class="px-6 py-6 text-center w-1/5">Note</th>
                            <th class="px-6 py-6 text-center w-1/5">Action</th>
                        </tr>
                    </thead>
                    <tbody id="history-list" class="divide-y divide-slate-100 dark:divide-white/5 text-slate-600 dark:text-slate-300 font-bold text-[13px]"></tbody>
                </table>
            </div>

            <div class="text-center mt-12 mb-20">
                <button id="load-more-btn" onclick="fetchNextBatch()" class="hidden py-4 px-10 bg-slate-100 dark:bg-slate-800 border dark:border-slate-700 rounded-full text-[10px] font-black uppercase tracking-widest transition-all">Load More Records</button>
            </div>
        </div>

        <div id="initial-message" class="text-center py-24 text-slate-400 italic text-[11px] uppercase tracking-widest opacity-50">Select a period to manage your logs.</div>
    </main>

    <div id="delete-confirm-modal" class="hidden fixed inset-0 z-[500] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="modal-content bg-white dark:bg-slate-900 border dark:border-slate-800 w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl text-center">
            <div class="w-12 h-12 bg-red-100 dark:bg-red-900/30 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="bi bi-exclamation-triangle-fill text-xl"></i>
            </div>
            <h3 class="text-xl font-bold dark:text-white mb-2">Delete Record?</h3>
            <p class="text-[11px] text-slate-500 mb-8 leading-relaxed">This action cannot be undone.</p>
            <div class="flex flex-col gap-2">
                <button id="final-delete-btn" class="w-full py-4 bg-red-600 text-white rounded-2xl font-black uppercase text-[10px] tracking-widest">Delete Record</button>
                <button onclick="closeDeleteModal()" class="w-full py-4 text-slate-500 font-bold uppercase text-[10px]">Cancel</button>
            </div>
        </div>
    </div>

    <div id="details-modal" class="hidden fixed inset-0 z-[400] bg-black/80 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="modal-content bg-white dark:bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 border dark:border-slate-800 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-xl font-black uppercase tracking-widest dark:text-white">Log Detail</h3>
                <button onclick="closeDetailsModal()" class="text-slate-400 hover:text-slate-600 transition-colors"><i class="bi bi-x-lg"></i></button>
            </div>
            <div class="space-y-6 text-left mb-10">
                <div class="flex justify-between border-b dark:border-white/5 pb-4">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Date</span>
                    <span id="det-date" class="text-xs font-bold dark:text-white">---</span>
                </div>
                <div class="flex justify-between border-b dark:border-white/5 pb-4">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Type</span>
                    <span id="det-type" class="text-xs font-bold text-indigo-500 uppercase">---</span>
                </div>
                <div class="flex justify-between border-b dark:border-white/5 pb-4">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Salvations</span>
                    <span id="det-count" class="text-xl font-black dark:text-white">0</span>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3">Notes</label>
                    <div class="bg-slate-50 dark:bg-slate-800/50 p-5 rounded-2xl border dark:border-white/5 italic text-xs text-slate-500 dark:text-slate-300 leading-relaxed" id="det-note"></div>
                </div>
            </div>
            <button id="det-delete-btn" class="w-full py-4 bg-red-500/10 text-red-500 font-black uppercase text-[10px] tracking-widest rounded-2xl border border-red-500/20 active:bg-red-500 active:text-white transition-all">
                <i class="bi bi-trash3-fill mr-2"></i> Delete This Record
            </button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-500 z-[600] pointer-events-none text-sm font-bold border border-white/10"></div>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { collection, query, where, getDocs, orderBy, doc, deleteDoc, limit, startAfter, getAggregateFromServer, sum, count, getDoc, updateDoc, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let userProfile = null;
        let currentPreset = 'month';
        let currentType = 'all';
        let lastDoc = null;
        const PAGE_SIZE = 10;

        const initTheme = () => {
            const isDark = localStorage.getItem('theme') === 'dark';
            if (isDark) {
                document.getElementById('main-html').classList.add('dark');
                document.getElementById('sun-icon')?.classList.remove('hidden');
                document.getElementById('moon-icon')?.classList.add('hidden');
            }
        };
        initTheme();

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            if(!t) return;
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                t.classList.remove('opacity-100', 'translate-y-0');
                t.classList.add('opacity-0', 'translate-y-10');
            }, 3000);
        };

        window.toggleDarkMode = () => {
            const html = document.getElementById('main-html');
            const isDark = html.classList.toggle('dark');
            document.getElementById('sun-icon')?.classList.toggle('hidden', !isDark);
            document.getElementById('moon-icon')?.classList.toggle('hidden', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        window.setActivePreset = (p) => {
            currentPreset = p;
            const dateInput = document.getElementById('customDate');
            const monthInput = document.getElementById('customMonth');
            dateInput.value = ""; monthInput.value = "";
            [dateInput, monthInput].forEach(input => {
                input.classList.remove('border-indigo-500', 'ring-2', 'ring-indigo-500/50', 'bg-indigo-500/10');
            });
            const inactive = "preset-btn flex-1 py-4 bg-slate-100 dark:bg-slate-800/50 text-slate-500 rounded-xl text-[10px] font-bold uppercase transition-all duration-200 active:scale-95 border border-transparent";
            const active = "preset-btn flex-1 py-4 bg-indigo-600 text-white rounded-xl text-[10px] font-bold uppercase transition-all duration-200 active:scale-95 shadow-lg shadow-indigo-500/50 border border-transparent";
            document.querySelectorAll('.preset-btn').forEach(btn => btn.className = inactive);
            const activeBtn = document.getElementById(`btn-${p}`);
            if (activeBtn) activeBtn.className = active;
        };

        window.setActiveType = (type) => {
            currentType = type;
            const inactive = "type-btn flex-1 py-4 bg-slate-100 dark:bg-slate-800/50 text-slate-500 rounded-xl text-[10px] font-black uppercase transition-all duration-200 active:scale-95 border border-transparent";
            const active = "type-btn flex-1 py-4 bg-indigo-600 text-white border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 active:scale-95 shadow-lg shadow-indigo-600/50";
            document.querySelectorAll('.type-btn').forEach(btn => btn.className = inactive);
            const activeBtn = document.getElementById(`type-${type}`);
            if (activeBtn) activeBtn.className = active;
        };

        // RESTORED: PASTOR.HTML STYLE HIGHLIGHTING
        window.handleCustomInput = (type) => {
            currentPreset = null;
            const dateInput = document.getElementById('customDate');
            const monthInput = document.getElementById('customMonth');
            document.querySelectorAll('.preset-btn').forEach(btn => btn.className = "preset-btn flex-1 py-4 bg-slate-100 dark:bg-slate-800/50 text-slate-500 rounded-2xl text-[10px] font-black uppercase border border-transparent");
            
            [dateInput, monthInput].forEach(el => el.classList.remove('border-indigo-500', 'ring-2', 'ring-indigo-500/50', 'bg-indigo-500/10'));

            if (type === 'date') {
                dateInput.classList.add('border-indigo-500', 'ring-2', 'ring-indigo-500/50', 'bg-indigo-500/10');
                monthInput.value = "";
            } else {
                monthInput.classList.add('border-indigo-500', 'ring-2', 'ring-indigo-500/50', 'bg-indigo-500/10');
                dateInput.value = "";
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.replace('index.html'); return; }
            const cachedData = sessionStorage.getItem('userContext');
            if (cachedData) {
                userProfile = JSON.parse(cachedData);
                renderHeader(userProfile.displayName, userProfile.role, userProfile.churchNames || {});
            } else { fetchFreshProfile(user.uid); }
            setActivePreset('month');
            setActiveType('all');
        });

        async function fetchFreshProfile(uid) {
            const snap = await getDoc(doc(db, "profiles", uid));
            if (snap.exists()) {
                userProfile = snap.data();
                const churches = {};
                for(const code of (userProfile.churchId || [])) {
                    const d = await getDoc(doc(db, "churches", code));
                    if(d.exists()) churches[code] = d.data().name;
                }
                userProfile.churchNames = churches;
                renderHeader(userProfile.displayName, userProfile.role, churches);
                sessionStorage.setItem('userContext', JSON.stringify(userProfile));
            }
        }

        function renderHeader(name, role, churches) {
            document.getElementById('user-display-name').innerText = name || "...";
            const roleEl = document.getElementById('role-display');
            if(roleEl) roleEl.innerText = (role || "Member").toUpperCase();
            const tagContainer = document.getElementById('church-list-tags');
            let tagsHtml = "";
            Object.values(churches).forEach(c => tagsHtml += `<span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">${c}</span>`);
            tagContainer.innerHTML = tagsHtml;
        }

        window.loadHistory = async () => {
            lastDoc = null; 
            await fetchNextBatch(true);
        };

        window.fetchNextBatch = async (isNewSearch = false) => {
            const user = auth.currentUser;
            const tableBody = document.getElementById('history-list');
            const cDate = document.getElementById('customDate').value;
            const cMonth = document.getElementById('customMonth').value;
            const now = new Date();
            let startStr, endStr;

            if (cDate) { startStr = `${cDate}T00:00`; endStr = `${cDate}T23:59`; }
            else if (cMonth) { startStr = `${cMonth}-01T00:00`; endStr = `${cMonth}-31T23:59`; }
            else if (currentPreset === 'today') { const t = now.toLocaleDateString('en-CA'); startStr = `${t}T00:00`; endStr = `${t}T23:59`; }
            else if (currentPreset === 'week') {
                let s = new Date(now); s.setDate(now.getDate() - now.getDay());
                let e = new Date(s); e.setDate(s.getDate() + 6);
                startStr = `${s.toLocaleDateString('en-CA')}T00:00`; endStr = `${e.toLocaleDateString('en-CA')}T23:59`;
            } else if (currentPreset === 'month') {
                const m = now.toLocaleDateString('en-CA').substring(0, 7);
                startStr = `${m}-01T00:00`; endStr = `${m}-31T23:59`;
            }

            document.getElementById('initial-message').classList.add('hidden');
            document.getElementById('results-area').classList.remove('hidden');

            try {
                if (isNewSearch) {
                    let totalConstraints = [where("userId", "==", user.uid), where("eventDate", ">=", startStr), where("eventDate", "<=", endStr)];
                    if (currentType !== 'all') totalConstraints.push(where("type", "==", currentType));
                    const aggSnap = await getAggregateFromServer(query(collection(db, "salvations"), ...totalConstraints), { souls: sum('count'), reports: count() });
                    document.getElementById('stat-reports').innerText = aggSnap.data().reports;
                    document.getElementById('stat-souls').innerText = aggSnap.data().souls || 0;
                }

                let constraints = [where("userId", "==", user.uid), where("eventDate", ">=", startStr), where("eventDate", "<=", endStr)];
                if (currentType !== 'all') constraints.push(where("type", "==", currentType));
                constraints.push(orderBy("eventDate", "desc"), limit(PAGE_SIZE));
                if (lastDoc) constraints.push(startAfter(lastDoc));

                const snapshot = await getDocs(query(collection(db, "salvations"), ...constraints));
                if (isNewSearch) tableBody.innerHTML = ''; 

                if (snapshot.empty && isNewSearch) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="text-center py-20 text-slate-500 uppercase font-black text-[10px] tracking-widest opacity-40">No records found.</td></tr>';
                    document.getElementById('load-more-btn').classList.add('hidden'); return;
                }

                snapshot.forEach((snapDoc) => {
                    const data = snapDoc.data();
                    tableBody.insertAdjacentHTML('beforeend', `
                        <tr id="row-${snapDoc.id}" class="hover:bg-slate-50 dark:hover:bg-white/5 transition-colors">
                            <td class="px-6 py-6 text-center text-xs font-bold text-slate-500">${data.eventDate.split('T')[0]}</td>
                            <td class="px-6 py-6 text-center text-[9px] font-black uppercase text-indigo-400">${data.type || 'Regular'}</td>
                            <td class="px-6 py-6 text-center font-black text-lg dark:text-white text-slate-900">${data.count}</td>
                            <td class="px-6 py-6 text-center text-xs text-slate-400 italic truncate max-w-[120px]">${data.note || ''}</td>
                            <td class="px-6 py-6 text-center">
                                <button onclick='viewDetails(${JSON.stringify({id: snapDoc.id, ...data}).replace(/'/g, "&apos;")})' class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-400 hover:text-indigo-500 transition-all shadow-sm border border-slate-200 dark:border-white/5"><i class="bi bi-search"></i></button>
                            </td>
                        </tr>`);
                });
                lastDoc = snapshot.docs[snapshot.docs.length - 1];
                document.getElementById('load-more-btn').classList.toggle('hidden', snapshot.docs.length < PAGE_SIZE);
            } catch (error) { console.error(error); }
        };

        window.viewDetails = (data) => {
            document.getElementById('det-date').innerText = data.eventDate.replace('T', ' ');
            document.getElementById('det-type').innerText = data.type;
            document.getElementById('det-count').innerText = data.count;
            document.getElementById('det-note').innerText = data.note || "No notes provided.";
            document.getElementById('det-delete-btn').onclick = () => confirmDelete(data.id, data.eventDate, data.type); 
            document.getElementById('details-modal').classList.remove('hidden');
        };

        window.confirmDelete = (id, eventDate, type) => {
            document.getElementById('delete-confirm-modal').classList.remove('hidden');
            document.getElementById('final-delete-btn').onclick = () => deleteEntry(id, eventDate, type);
        };

        window.closeDeleteModal = () => document.getElementById('delete-confirm-modal').classList.add('hidden');
        window.closeDetailsModal = () => document.getElementById('details-modal').classList.add('hidden');

        window.deleteEntry = async (id, eventDate, type) => {
            const finalBtn = document.getElementById('final-delete-btn');
            finalBtn.disabled = true; finalBtn.innerText = "Deleting...";
            try {
                await deleteDoc(doc(db, "salvations", id));
                const sL = document.getElementById('stat-souls'); const rL = document.getElementById('stat-reports');
                if(sL) sL.innerText = Math.max(0, parseInt(sL.innerText) - (parseInt(document.getElementById('det-count').innerText) || 0));
                if(rL) rL.innerText = Math.max(0, parseInt(rL.innerText) - 1);
                const row = document.getElementById(`row-${id}`);
                if (row) { row.style.opacity = '0'; setTimeout(() => row.remove(), 300); }

                const typeCheckQ = query(collection(db, "salvations"), where("userId", "==", auth.currentUser.uid), where("eventDate", ">=", eventDate.split('T')[0] + "T00:00"), where("eventDate", "<=", eventDate.split('T')[0] + "T23:59"), where("type", "==", type));
                const typeSnap = await getAggregateFromServer(typeCheckQ, { remaining: count() });
                if (typeSnap.data().remaining === 0) {
                    const statsUpdate = {}; statsUpdate[`${type}_members`] = arrayRemove(auth.currentUser.uid);
                    await updateDoc(doc(db, `churches/${userProfile.churchId[0]}/daily_stats`, eventDate.split('T')[0]), statsUpdate).catch(() => {});
                    await updateDoc(doc(db, `churches/${userProfile.churchId[0]}/monthly_stats`, eventDate.substring(0, 7)), statsUpdate).catch(() => {});
                }

                closeDetailsModal(); closeDeleteModal(); showToast("Record deleted.");
            } catch (e) { showToast("Delete failed."); } 
            finally { finalBtn.disabled = false; finalBtn.innerText = "Delete Record"; }
        };

        window.fetchNextBatch = fetchNextBatch;
    </script>
</body>
</html>
