<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My History - Soulwinning Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script>tailwind.config = { darkMode: 'class' }</script>

    <style>        
        button, 
        .preset-btn, 
        .type-btn,
        [role="button"] {
            transition: all 0.2s ease-in-out !important;
        }
        
        button:active, 
        .preset-btn:active, 
        .type-btn:active,
        [role="button"]:active {
            transform: scale(0.95) !important;
            box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.7) !important;
            outline: none !important;
        }
        
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0f172a] dark:text-slate-100 transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-900 border-b dark:border-slate-800 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-2">
            <button onclick="window.history.back()" class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all mr-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-600 dark:text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M15 19l-7-7 7-7" /></svg>
            </button>
            <div class="w-10 h-8 bg-indigo-600 rounded-lg flex items-center justify-center overflow-hidden">
                <span class="font-bold text-white text-[10px] leading-none text-center">SWT</span>
            </div>
            <h1 class="text-lg brand-text"><span class="brand-word-1">Soulwinning</span><span class="brand-word-2">Tracker</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDarkMode()" class="p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 transition-all">
                <svg id="sun-icon" class="w-5 h-5 hidden text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M3 12h2.25m.386-6.364l1.591 1.591M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" /></svg>
                <svg id="moon-icon" class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <header class="mb-10 text-center">
            <div id="role-display" class="badge-base badge-role mb-2 uppercase text-[10px] tracking-widest font-bold">...</div>
            <h2 id="user-display-name" class="text-4xl font-extrabold tracking-tight mb-3">...</h2>
            <div id="church-list-tags" class="flex flex-wrap justify-center gap-2 mt-2"></div>
            
            <h3 class="text-2xl font-bold mt-8 text-indigo-600">Record Management</h3>
            <p class="text-xs text-slate-400 mt-1">View and manage your personal records.</p>
        </header>

        <div class="bg-white dark:bg-slate-900 border dark:border-slate-800 rounded-[2.5rem] p-6 shadow-sm mb-10 max-w-sm mx-auto">
            <div class="space-y-6">
                <div>
                    <label class="block text-[9px] font-bold text-slate-400 uppercase mb-3 ml-2 tracking-widest text-center">Time Period</label>
                    <div class="flex gap-2">
                        <button id="btn-today" onclick="setActivePreset('today')" class="preset-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800/50 border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 shadow-sm text-slate-500">Today</button>
                        <button id="btn-week" onclick="setActivePreset('week')" class="preset-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800/50 border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 shadow-sm text-slate-500">Week</button>
                        <button id="btn-month" onclick="setActivePreset('month')" class="preset-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800/50 border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 shadow-sm text-slate-500">Month</button>
                    </div>
                </div>

                <div>
                    <label class="block text-[9px] font-bold text-slate-400 uppercase mb-3 ml-2 tracking-widest text-center">Soulwinning Type</label>
                    <div class="flex gap-2">
                        <button id="type-all" onclick="setActiveType('all')" class="type-btn flex-1 py-3 bg-indigo-600 text-white border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200">All</button>
                        <button id="type-Regular" onclick="setActiveType('Regular')" class="type-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800/50 border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 shadow-sm text-slate-500">Regular</button>
                        <button id="type-School" onclick="setActiveType('School')" class="type-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800/50 border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 shadow-sm text-slate-500">School</button>
                        <button id="type-Event" onclick="setActiveType('Event')" class="type-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800/50 border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 shadow-sm text-slate-500">Event</button>
                    </div>
                </div>

                <div class="border-t dark:border-slate-800 pt-4">
                    <label class="block text-[9px] font-bold text-slate-400 uppercase mb-4 ml-2 tracking-widest text-center">Custom Selection</label>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="flex flex-col gap-1.5">
                            <label for="customDate" class="text-[8px] font-extrabold text-slate-400 uppercase ml-2">Specific Day</label>
                            <input type="date" id="customDate" oninput="handleCustomInput('date')" class="w-full bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 p-3 rounded-xl text-[10px] font-bold dark:text-white outline-none transition-all duration-300">
                        </div>
                        <div class="flex flex-col gap-1.5">
                            <label for="customMonth" class="text-[8px] font-extrabold text-slate-400 uppercase ml-2">Specific Month</label>
                            <input type="month" id="customMonth" oninput="handleCustomInput('month')" class="w-full bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 p-3 rounded-xl text-[10px] font-bold dark:text-white outline-none transition-all duration-300">
                        </div>
                    </div>
                </div>

                <button onclick="loadHistory()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold text-xs uppercase active:scale-95 transition-all shadow-lg shadow-indigo-500/50">Fetch Records</button>
            </div>
        </div>

        <div id="results-area" class="hidden">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-[2rem] border dark:border-slate-800 shadow-sm text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Logs</p>
                    <span id="stat-reports" class="text-3xl font-bold">0</span>
                </div>
                <div class="bg-white dark:bg-slate-900 p-6 rounded-[2rem] border dark:border-slate-800 shadow-sm text-center">
                    <p class="text-[10px] font-bold text-slate-400 uppercase text-indigo-600">Total Salvations</p>
                    <span id="stat-souls" class="text-3xl font-bold text-indigo-600">0</span>
                </div>
            </div>

            <section class="bg-white dark:bg-slate-900 rounded-3xl border dark:border-slate-800 overflow-hidden shadow-sm text-left mb-10">
                <div class="px-6 py-4 border-b dark:border-slate-800 bg-slate-50 dark:bg-slate-800/50 font-bold text-[10px] uppercase text-slate-400 text-center">Results</div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="text-[10px] text-slate-400 uppercase border-b dark:border-slate-800">
                            <tr>
                                <th class="px-6 py-4">Date</th>
                                <th class="px-6 py-4">Type</th>
                                <th class="px-6 py-4 text-center">Count</th>
                                <th class="px-6 py-4">Note</th>
                                <th class="px-6 py-4 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="history-list" class="divide-y dark:divide-slate-800 text-sm"></tbody>
                    </table>
                </div>
            </section>

            <div class="text-center mb-20">
                <button id="load-more-btn" onclick="fetchNextBatch()" class="hidden py-3 px-8 bg-slate-100 dark:bg-slate-800 border dark:border-slate-700 rounded-2xl text-[10px] font-bold uppercase transition-all hover:bg-slate-200 dark:hover:bg-slate-700">Show More Records</button>
            </div>
        </div>

        <div id="initial-message" class="text-center py-20 text-slate-400 italic">Select a time period above to manage your logs.</div>
    </main>

    <div id="delete-confirm-modal" class="hidden fixed inset-0 z-[160] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-slate-900 border dark:border-slate-800 w-full max-w-xs rounded-[2rem] p-8 shadow-2xl text-center">
            <div class="w-12 h-12 bg-red-100 dark:bg-red-900/30 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="bi bi-exclamation-triangle-fill text-xl"></i>
            </div>
            <h3 class="text-lg font-bold dark:text-white mb-2">Delete Record?</h3>
            <p class="text-xs text-slate-400 mb-6 leading-relaxed">This action cannot be undone. Are you sure?</p>
            <div class="flex gap-2">
                <button onclick="closeDeleteModal()" class="flex-1 py-3 text-slate-500 font-bold text-xs uppercase tracking-widest">Cancel</button>
                <button id="final-delete-btn" class="flex-1 py-3 bg-red-600 text-white rounded-xl font-bold text-xs uppercase tracking-widest">Delete</button>
            </div>
        </div>
    </div>

    <div id="details-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6 hidden z-[120]">
        <div class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 border dark:border-slate-800 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold dark:text-white">Record Details</h3>
                <button onclick="closeDetailsModal()" class="text-slate-400 hover:text-slate-600"><i class="bi bi-x-lg"></i></button>
            </div>
            
            <div class="space-y-4 text-left mb-8">
                <div>
                    <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Event Date</label>
                    <p id="det-date" class="text-sm font-bold dark:text-white">---</p>
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Type</label>
                        <p id="det-type" class="text-sm font-bold text-indigo-600">---</p>
                    </div>
                    <div class="flex-1">
                        <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Salvation Count</label>
                        <p id="det-count" class="text-sm font-bold dark:text-white">---</p>
                    </div>
                </div>
                <div>
                    <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Personal Note</label>
                    <div class="bg-slate-50 dark:bg-slate-800/50 p-4 rounded-2xl border dark:border-slate-700/50 min-h-[80px]">
                        <p id="det-note" class="text-xs text-slate-500 dark:text-slate-300 italic whitespace-pre-wrap leading-relaxed"></p>
                    </div>
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="closeDetailsModal()" class="flex-1 py-4 bg-slate-100 dark:bg-slate-800 text-slate-500 font-bold uppercase text-[10px] rounded-2xl">Close</button>
                <button id="det-delete-btn" class="flex-1 py-4 bg-red-50 dark:bg-red-500/10 text-red-500 font-bold uppercase text-[10px] rounded-2xl border border-red-100 dark:border-red-500/20 active:bg-red-500 active:text-white transition-all">
                    <i class="bi bi-trash mr-1"></i> Delete
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 dark:bg-indigo-600 text-white px-6 py-3 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-500 z-[150] pointer-events-none text-sm font-bold"></div>

    <script type="module">
        import { db, auth } from './firebase-config.js';
        import { collection, query, where, getDocs, orderBy, doc, getDoc, deleteDoc, updateDoc, arrayRemove, limit, startAfter, getAggregateFromServer, sum, count } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let userProfile = null;
        let currentPreset = 'month';
        let currentType = 'all';
        let lastDoc = null;
        const PAGE_SIZE = 5;

        const initTheme = () => {
            const isDark = localStorage.getItem('theme') === 'dark';
            if (isDark) {
                document.getElementById('main-html').classList.add('dark');
                document.getElementById('sun-icon')?.classList.remove('hidden');
                document.getElementById('moon-icon')?.classList.add('hidden');
            }
        };
        initTheme();

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-10'), 3000);
        };

        window.toggleDarkMode = () => {
            const html = document.getElementById('main-html');
            const isDark = html.classList.toggle('dark');
            document.getElementById('sun-icon')?.classList.toggle('hidden', !isDark);
            document.getElementById('moon-icon')?.classList.toggle('hidden', isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

/*        window.setActivePreset = (p) => {
            currentPreset = p;
            const dateInput = document.getElementById('customDate');
            const monthInput = document.getElementById('customMonth');
            dateInput.value = ""; monthInput.value = "";
            [dateInput, monthInput].forEach(input => {
                input.classList.remove('border-indigo-500', 'ring-2', 'ring-indigo-500/50', 'bg-indigo-500/10', 'opacity-100');
                input.classList.add('border-slate-700', 'opacity-100');
            });
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-lg', 'shadow-indigo-500/50');
                btn.classList.add('bg-slate-100', 'dark:bg-slate-800/50', 'text-slate-500');
            });
            const activeBtn = document.getElementById(`btn-${p}`);
            if (activeBtn) {
                activeBtn.classList.remove('bg-slate-100', 'dark:bg-slate-800/50', 'text-slate-500');
                activeBtn.classList.add('bg-indigo-600', 'text-white','shadow-lg', 'shadow-indigo-500/50');
            }
        };*/

        window.setActivePreset = (p) => {
            currentPreset = p;
            const dateInput = document.getElementById('customDate');
            const monthInput = document.getElementById('customMonth');
            dateInput.value = ""; 
            monthInput.value = "";
            [dateInput, monthInput].forEach(input => {
                input.classList.remove('border-indigo-500', 'ring-2', 'ring-indigo-500/50', 'bg-indigo-500/10');
            });

            // Standardized base and active classes
            const inactive = "preset-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800/50 text-slate-500 dark:text-slate-400 border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 active:scale-95";
            const active = "preset-btn flex-1 py-3 bg-indigo-600 text-white border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 active:scale-95 shadow-lg shadow-indigo-500/50";

            document.querySelectorAll('.preset-btn').forEach(btn => btn.className = inactive);
            const activeBtn = document.getElementById(`btn-${p}`);
            if (activeBtn) activeBtn.className = active;
        };

        window.setActiveType = (type) => {
            currentType = type;
            
            // Standardized base and active classes for Type Buttons
            const inactive = "type-btn flex-1 py-3 bg-slate-100 dark:bg-slate-800/50 text-slate-500 dark:text-slate-400 border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 active:scale-95 shadow-sm";
            const active = "type-btn flex-1 py-3 bg-indigo-600 text-white border border-transparent rounded-2xl text-[10px] font-bold uppercase transition-all duration-200 active:scale-95 shadow-lg shadow-indigo-500/50";

            document.querySelectorAll('.type-btn').forEach(btn => btn.className = inactive);
            const activeBtn = document.getElementById(`type-${type}`);
            if (activeBtn) activeBtn.className = active;
        };

        window.handleCustomInput = (type) => {
            currentPreset = null;
            const dateInput = document.getElementById('customDate');
            const monthInput = document.getElementById('customMonth');
            document.querySelectorAll('.preset-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white','shadow-lg', 'shadow-indigo-500/50');
                btn.classList.add('bg-slate-100', 'dark:bg-slate-800/50', 'text-slate-500');
            });
            if (type === 'date') {
                dateInput.classList.add('border-indigo-500', 'ring-2', 'ring-indigo-500/50', 'bg-indigo-500/10', 'opacity-100');
                dateInput.classList.remove('border-slate-700', 'opacity-40');
                monthInput.value = "";
                monthInput.classList.remove('border-indigo-500', 'ring-2', 'ring-indigo-500/50', 'bg-indigo-500/10', 'opacity-100');
                monthInput.classList.add('border-slate-700', 'opacity-40');
            } else {
                monthInput.classList.add('border-indigo-500', 'ring-2', 'ring-indigo-500/50', 'bg-indigo-500/10', 'opacity-100');
                monthInput.classList.remove('border-slate-700', 'opacity-40');
                dateInput.value = "";
                dateInput.classList.remove('border-indigo-500', 'ring-2', 'ring-indigo-500/50', 'bg-indigo-500/10', 'opacity-100');
                dateInput.classList.add('border-slate-700', 'opacity-40');
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.replace('index.html'); return; }
            const cachedData = sessionStorage.getItem('userContext');
            if (cachedData) {
                userProfile = JSON.parse(cachedData);
                renderHeader(userProfile.displayName, userProfile.role, userProfile.churchNames || {});
            } else { fetchFreshProfile(user.uid); }
            setActivePreset('month');
            setActiveType('all');
        });

        async function fetchFreshProfile(uid) {
            const snap = await getDoc(doc(db, "profiles", uid));
            if (snap.exists()) {
                userProfile = snap.data();
                const churches = {};
                for(const code of (userProfile.churchId || [])) {
                    const d = await getDoc(doc(db, "churches", code));
                    if(d.exists()) churches[code] = d.data().name;
                }
                userProfile.churchNames = churches;
                renderHeader(userProfile.displayName, userProfile.role, churches);
                sessionStorage.setItem('userContext', JSON.stringify(userProfile));
            }
        }

        function renderHeader(name, role, churches) {
            document.getElementById('user-display-name').innerText = name || "...";
            document.getElementById('role-display').innerText = (role || "Member").toUpperCase();
            const tagContainer = document.getElementById('church-list-tags');
            let tagsHtml = "";
            Object.values(churches).forEach(c => tagsHtml += `<span class="badge-base badge-church">${c}</span>`);
            tagContainer.innerHTML = tagsHtml || `<span class="text-slate-500 text-[10px]">No Church Assigned</span>`;
        }

        window.loadHistory = async () => {
            lastDoc = null; 
            document.getElementById('history-list').innerHTML = '<tr><td colspan="5" class="text-center py-10 text-slate-400 italic">Fetching records...</td></tr>';
            await fetchNextBatch(true);
        };

        window.fetchNextBatch = async (isNewSearch = false) => {
            const user = auth.currentUser;
            const tableBody = document.getElementById('history-list');
            const cDate = document.getElementById('customDate').value;
            const cMonth = document.getElementById('customMonth').value;
            const now = new Date();
            let startStr, endStr;

            if (cDate) { startStr = `${cDate}T00:00`; endStr = `${cDate}T23:59`; }
            else if (cMonth) { startStr = `${cMonth}-01T00:00`; endStr = `${cMonth}-31T23:59`; }
            else if (currentPreset === 'today') { const t = now.toLocaleDateString('en-CA'); startStr = `${t}T00:00`; endStr = `${t}T23:59`; }
            else if (currentPreset === 'week') {
                let s = new Date(now); s.setDate(now.getDate() - now.getDay());
                let e = new Date(s); e.setDate(s.getDate() + 6);
                startStr = `${s.toLocaleDateString('en-CA')}T00:00`; endStr = `${e.toLocaleDateString('en-CA')}T23:59`;
            } else if (currentPreset === 'month') {
                const m = now.toLocaleDateString('en-CA').substring(0, 7);
                startStr = `${m}-01T00:00`; endStr = `${m}-31T23:59`;
            }

            document.getElementById('initial-message').classList.add('hidden');
            document.getElementById('results-area').classList.remove('hidden');

            try {
                if (isNewSearch) {
                    let totalConstraints = [where("userId", "==", user.uid), where("eventDate", ">=", startStr), where("eventDate", "<=", endStr)];
                    if (currentType !== 'all') totalConstraints.push(where("type", "==", currentType));
                    const aggQuery = query(collection(db, "salvations"), ...totalConstraints);
                    const aggSnap = await getAggregateFromServer(aggQuery, { souls: sum('count'), reports: count() });
                    document.getElementById('stat-reports').innerText = aggSnap.data().reports;
                    document.getElementById('stat-souls').innerText = aggSnap.data().souls || 0;
                }

                let constraints = [where("userId", "==", user.uid), where("eventDate", ">=", startStr), where("eventDate", "<=", endStr)];
                if (currentType !== 'all') constraints.push(where("type", "==", currentType));
                constraints.push(orderBy("eventDate", "desc"), limit(PAGE_SIZE));

                if (lastDoc) constraints.push(startAfter(lastDoc));

                const q = query(collection(db, "salvations"), ...constraints);
                const snapshot = await getDocs(q);
                if (isNewSearch) tableBody.innerHTML = ''; 

                if (snapshot.empty && isNewSearch) {
                    tableBody.innerHTML = '<tr><td colspan="5" class="text-center py-10 text-slate-400">No records found.</td></tr>';
                    document.getElementById('load-more-btn').classList.add('hidden'); return;
                }

                snapshot.forEach((snapDoc) => {
                    const data = snapDoc.data();
                    tableBody.insertAdjacentHTML('beforeend', `
                        <tr id="row-${snapDoc.id}" class="hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors">
                            <td class="px-6 py-4 text-xs font-medium text-slate-500">${data.eventDate.split('T')[0]}</td>
                            <td class="px-6 py-4 text-[10px] font-bold uppercase text-slate-400"><span class="px-2 py-1 rounded bg-slate-100 dark:bg-slate-800 border dark:border-slate-700">${data.type || 'Regular'}</span></td>
                            <td class="px-6 py-4 text-center font-bold text-indigo-600">${data.count}</td>
                            <td class="px-6 py-4 text-xs text-slate-400 italic truncate max-w-[120px]">${data.note || ''}</td>
                            <td class="px-6 py-4 text-right">
                                <button onclick='viewDetails(${JSON.stringify({id: snapDoc.id, ...data}).replace(/'/g, "&apos;")})' class="text-slate-400 hover:text-indigo-500 p-2 transition-colors"><i class="bi bi-search"></i></button>
                            </td>
                        </tr>`);
                });
                lastDoc = snapshot.docs[snapshot.docs.length - 1];
                document.getElementById('load-more-btn').classList.toggle('hidden', snapshot.docs.length < PAGE_SIZE);

            } catch (error) { console.error(error); }
        };

        window.viewDetails = (data) => {
            document.getElementById('det-date').innerText = data.eventDate.replace('T', ' ');
            document.getElementById('det-type').innerText = data.type;
            document.getElementById('det-count').innerText = data.count;
            document.getElementById('det-note').innerText = data.note || "No notes provided.";
            
            const delBtn = document.getElementById('det-delete-btn');
            // SURGICAL CHANGE: Using custom confirmation modal
            delBtn.onclick = () => confirmDelete(data.id, data.eventDate, data.type); 
            document.getElementById('details-modal').classList.remove('hidden');
        };

        window.confirmDelete = (id, eventDate, type) => {
            document.getElementById('delete-confirm-modal').classList.remove('hidden');
            const finalDelBtn = document.getElementById('final-delete-btn');
            finalDelBtn.onclick = () => deleteEntry(id, eventDate, type);
        };

        window.closeDeleteModal = () => document.getElementById('delete-confirm-modal').classList.add('hidden');
        window.closeDetailsModal = () => document.getElementById('details-modal').classList.add('hidden');

        window.deleteEntry = async (id, eventDate, type) => {
            const finalBtn = document.getElementById('final-delete-btn');
            finalBtn.disabled = true; finalBtn.innerText = "Deleting...";
            try {
                const uid = auth.currentUser.uid; const churchId = userProfile.churchId[0];
                const dateId = eventDate.split('T')[0]; const monthId = dateId.substring(0, 7);
                const valToRemove = parseInt(document.getElementById('det-count').innerText) || 0;

                await deleteDoc(doc(db, "salvations", id));

                const sL = document.getElementById('stat-souls'); const rL = document.getElementById('stat-reports');
                if(sL) sL.innerText = Math.max(0, parseInt(sL.innerText) - valToRemove);
                if(rL) rL.innerText = Math.max(0, parseInt(rL.innerText) - 1);

                const row = document.getElementById(`row-${id}`);
                if (row) { row.style.opacity = '0'; setTimeout(() => row.remove(), 300); }

                const typeCheckQ = query(collection(db, "salvations"), where("userId", "==", uid), where("eventDate", ">=", dateId + "T00:00"), where("eventDate", "<=", dateId + "T23:59"), where("type", "==", type));
                const typeSnap = await getAggregateFromServer(typeCheckQ, { remaining: count() });

                if (typeSnap.data().remaining === 0) {
                    const statsUpdate = {}; statsUpdate[`${type}_members`] = arrayRemove(uid);
                    await updateDoc(doc(db, `churches/${churchId}/daily_stats`, dateId), statsUpdate).catch(() => {});
                    await updateDoc(doc(db, `churches/${churchId}/monthly_stats`, monthId), statsUpdate).catch(() => {});
                }

                closeDetailsModal(); closeDeleteModal(); showToast("Record deleted.");
            } catch (e) { showToast("Delete failed."); } 
            finally { finalBtn.disabled = false; finalBtn.innerText = "Delete"; }
        };

        window.fetchNextBatch = fetchNextBatch;
    </script>
</body>
</html>
